<body>

<option value="Africa/Lagos">Lagos 🇳🇬</option>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Time Zone Converter
</div>

<script>
var allCities=[
{tz:'Africa/Lagos',name:'Lagos',flag:'🇳🇬'},
{tz:'Europe/London',name:'London',flag:'🇬🇧'},
{tz:'America/New_York',name:'New York',flag:'🇺🇸'},
{tz:'America/Los_Angeles',name:'Los Angeles',flag:'🇺🇸'},
{tz:'Asia/Dubai',name:'Dubai',flag:'🇦🇪'},
{tz:'Asia/Tokyo',name:'Tokyo',flag:'🇯🇵'},
{tz:'Asia/Kolkata',name:'Mumbai',flag:'🇮🇳'},
{tz:'Africa/Nairobi',name:'Nairobi',flag:'🇰🇪'},
{tz:'Africa/Accra',name:'Accra',flag:'🇬🇭'},
{tz:'Europe/Berlin',name:'Berlin',flag:'🇩🇪'},
{tz:'Asia/Singapore',name:'Singapore',flag:'🇸🇬'},
{tz:'Australia/Sydney',name:'Sydney',flag:'🇦🇺'}
];

function convert(){
var fromTz=document.getElementById('fromCity').value;
var time=document.getElementById('fromTime').value;
if(!time)return;
var [hours,mins]=time.split(':').map(Number);
// Create a date for today at the specified time in the from timezone
var now=new Date();
// Get the offset of the from timezone
var fromDate=new Date(now.toLocaleString('en-US',{timeZone:fromTz}));
var fromDateOffset=new Date(now.toLocaleString('en-US'));
var tzOffset=fromDate.getTime()-fromDateOffset.getTime();
var baseDate=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hours,mins);
// Adjust to UTC
var utcDate=new Date(baseDate.getTime()-tzOffset);
// Actually, simpler approach: use Intl
var fromStr=now.toLocaleDateString('en-CA',{timeZone:fromTz});
var baseISO=fromStr+'T'+time+':00';

document.getElementById('results').innerHTML=allCities.filter(function(c){return c.tz!==fromTz}).map(function(c){
try{
var d=new Date(baseISO);
var localStr=d.toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:true});
var localDate=d.toLocaleDateString('en-US',{timeZone:c.tz,weekday:'short',month:'short',day:'numeric'});
var localHour=parseInt(d.toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',hour12:false}));
var good=localHour>=8&&localHour<20;
return '<div class="result"><div class="city">'+c.flag+' '+c.name+'</div><div class="time">'+localStr+'</div><div class="date">'+localDate+'</div><div class="badge '+(good?'good':'bad')+'">'+(good?'✓ Good time to meet':'✗ Too early/late')+'</div></div>';
}catch(e){return '<div class="result">Error</div>'}
}).join('');
}

convert();
</script>
