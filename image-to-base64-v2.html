<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Base64 Converter | Harz</title>
<meta name="description" content="Convert images to Base64 data URIs. Drag and drop, copy base64 string, or use in HTML/CSS.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.dropzone{border:2px dashed #2a2a2a;border-radius:12px;padding:40px;text-align:center;margin-bottom:16px;cursor:pointer;transition:all 0.2s}
.dropzone:hover{border-color:#10b981;background:rgba(16,185,129,0.05)}
.dropzone p{color:#a3a3a3;font-size:14px}
.dropzone .icon{font-size:36px;margin-bottom:8px}
#fileInput{display:none}
.preview{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px;display:none}
.preview.show{display:block}
.preview img{max-width:100%;border-radius:8px;margin-bottom:12px}
.preview .info{font-size:12px;color:#a3a3a3;margin-bottom:8px}
.preview .info span{font-weight:700;color:#10b981}
.output{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:#10b981;word-break:break-all;max-height:200px;overflow:auto;margin-bottom:12px}
.btn{width:100%;background:#10b981;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:15px;margin-bottom:8px}
.btn.secondary{background:#1c1c1c;color:#fff;border:1px solid #2a2a2a}
</style>
</head>
<body>
<h1>Image to Base64 Converter</h1>
<div class="app">
  <div class="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">IMG</div>
    <p>Click to select an image or drag and drop here</p>
    <p style="font-size:11px;margin-top:4px">PNG, JPG, GIF, SVG, WebP — max 2MB</p>
  </div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
  <div class="preview" id="preview">
    <img id="imgPreview" alt="Preview">
    <div class="info" id="fileInfo"></div>
    <div class="output" id="base64Output"></div>
    <button class="btn" onclick="copyBase64()">Copy Base64</button>
    <button class="btn secondary" onclick="copyDataURI()">Copy as Data URI</button>
    <button class="btn secondary" onclick="copyHTML()">Copy as HTML img tag</button>
  </div>
</div>
<script>
let base64Data='';
function handleFile(file){
  if(!file)return;
  if(file.size>2*1024*1024){alert('File too large. Max 2MB.');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    base64Data=e.target.result;
    document.getElementById('imgPreview').src=base64Data;
    const sizeKB=(file.size/1024).toFixed(1);
    const sizeKB64=(base64Data.length/1024).toFixed(1);
    document.getElementById('fileInfo').innerHTML=`File: <span>${file.name}</span> · Type: <span>${file.type}</span> · Size: <span>${sizeKB}KB</span> → Base64: <span>${sizeKB64}KB</span>`;
    document.getElementById('base64Output').textContent=base64Data.substring(0,500)+'...';
    document.getElementById('preview').classList.add('show');
  };
  reader.readAsDataURL(file);
}
function copyBase64(){navigator.clipboard.writeText(base64Data.split(',')[1]);alert('Base64 string copied!');}
function copyDataURI(){navigator.clipboard.writeText(base64Data);alert('Data URI copied!');}
function copyHTML(){const html=`<img src="${base64Data}" alt="image">`;navigator.clipboard.writeText(html);alert('HTML img tag copied!');}
</script>
</body>
</html>
