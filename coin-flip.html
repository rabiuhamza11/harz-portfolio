<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:400px;margin:0 auto}
.header{text-align:center;padding:12px 0}
.header h1{font-size:1.3rem;color:#00d4aa}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:12px}
.coin-container{text-align:center;padding:40px 20px;background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;margin-bottom:16px}
.coin{width:100px;height:100px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;cursor:pointer;transition:transform .3s}
.coin.heads{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#1a1a2e;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.coin.tails{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.coin.flipping{animation:flip .6s ease-out}
@keyframes flip{0%{transform:rotateY(0)}50%{transform:rotateY(900deg) scale(1.2)}100%{transform:rotateY(1800deg)}}
.result-text{font-size:1.5rem;font-weight:800;color:#00d4aa;margin-bottom:8px;min-height:30px}
.result-sub{font-size:.8rem;color:#6b6b80}
.btn{padding:14px 24px;border:none;border-radius:12px;font-weight:700;cursor:pointer;width:100%;font-size:1rem;background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;margin-bottom:12px}
.stats{display:flex;justify-content:space-around;padding:14px;background:#0e0e16;border:1px solid #1e1e2e;border-radius:12px;margin-bottom:12px}
.stat{text-align:center}
.stat .num{font-size:1.5rem;font-weight:800;color:#00d4aa}
.stat .lbl{font-size:.65rem;color:#6b6b80;text-transform:uppercase}
.decision-maker{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.decision-maker h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;margin-bottom:14px}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:4px}
.input-group input{width:100%;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.85rem}
</style>
</head>
<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>🪙 Coin Flip</h1></div>

<div class="coin-container">
<div class="coin heads" id="coin" onclick="flip()">H</div>
<div class="result-text" id="result">Tap the coin or button</div>
<div class="result-sub" id="resultSub">Make a decision!</div>
</div>

<button class="btn" onclick="flip()">🪙 Flip Coin</button>

<div class="stats">
<div class="stat"><div class="num" id="hCount">0</div><div class="lbl">Heads</div></div>
<div class="stat"><div class="num" id="tCount">0</div><div class="lbl">Tails</div></div>
<div class="stat"><div class="num" id="total">0</div><div class="lbl">Total</div></div>
</div>

<div class="decision-maker">
<h2>Decision Maker</h2>
<div class="input-group"><label>Heads means...</label><input type="text" id="headsChoice" value="Do it" oninput=""></div>
<div class="input-group"><label>Tails means...</label><input type="text" id="tailsChoice" value="Don't do it" oninput=""></div>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Coin Flip
</div>

<script>
var heads=0,tails=0;
function flip(){
var coin=document.getElementById('coin');
coin.className='coin flipping';
document.getElementById('result').textContent='...';
document.getElementById('resultSub').textContent='Flipping...';
if(navigator.vibrate)navigator.vibrate(30);
setTimeout(function(){
var isHeads=Math.random()<0.5;
if(isHeads){coin.className='coin heads';coin.textContent='H';heads++}
else{coin.className='coin tails';coin.textContent='T';tails++}
document.getElementById('hCount').textContent=heads;
document.getElementById('tCount').textContent=tails;
document.getElementById('total').textContent=heads+tails;
var choice=isHeads?document.getElementById('headsChoice').value:document.getElementById('tailsChoice').value;
document.getElementById('result').textContent=isHeads?'HEADS':'TAILS';
document.getElementById('resultSub').textContent='→ '+choice;
},600);
}
</script>

<span style="font-size:1.3rem;">🧙‍♂️</span> Chat with Magani
