<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitor Analysis Tool — Track Your Competition | Harz</title>
<meta name="description" content="Analyze competitors: pricing, strengths, weaknesses, and market position. Build your competitive advantage.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.add-bar{display:flex;gap:6px;margin-bottom:20px}
.add-bar input{flex:1;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px}
.add-bar button{background:#ef4444;color:#fff;padding:12px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.list{display:grid;gap:12px}
.comp-card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.comp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.comp-name{font-size:16px;font-weight:700}
.comp-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px}
.comp-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #2a2a2a}
.comp-row span:first-child{color:#a3a3a3}
.comp-row input,.comp-row select{background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px}
.swot{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.swot-box{padding:8px;border-radius:6px;font-size:11px}
.swot-s{background:rgba(16,185,129,0.1);color:#10b981}
.swot-w{background:rgba(239,68,68,0.1);color:#ef4444}
.swot-o{background:rgba(59,130,246,0.1);color:#3b82f6}
.swot-t{background:rgba(245,158,11,0.1);color:#f59e0b}
.swot-box h4{font-size:10px;margin-bottom:4px}
.swot-box textarea{width:100%;background:rgba(0,0,0,0.3);border:1px solid #2a2a2a;color:#fff;border-radius:4px;padding:4px;font-size:10px;resize:vertical;min-height:40px}
</style>
</head>
<body>
<h1>Competitor Analysis Tool</h1>
<div class="app">
  <div class="add-bar">
    <input type="text" id="compName" placeholder="Add competitor name..." onkeypress="if(event.key==='Enter')addComp()">
    <button onclick="addComp()">Add</button>
  </div>
  <div class="list" id="list"></div>
</div>
<script>
let comps = JSON.parse(localStorage.getItem('competitors')||'[]');
function addComp() {
  const n=document.getElementById('compName').value.trim();
  if(!n)return;
  comps.push({name:n,price:'',rating:'3',strengths:'',weaknesses:'',opportunities:'',threats:'',id:Date.now()});
  localStorage.setItem('competitors',JSON.stringify(comps));
  document.getElementById('compName').value='';
  render();
}
function delComp(i){comps.splice(i,1);localStorage.setItem('competitors',JSON.stringify(comps));render();}
function updateComp(i,f,v){comps[i][f]=v;localStorage.setItem('competitors',JSON.stringify(comps));}
function render() {
  if(!comps.length){document.getElementById('list').innerHTML='<p style="text-align:center;color:#555;padding:20px">No competitors added yet</p>';return;}
  document.getElementById('list').innerHTML=comps.map((c,i)=>`
    <div class="comp-card">
      <div class="comp-header"><span class="comp-name">${c.name}</span><button class="comp-del" onclick="delComp(${i})">Delete</button></div>
      <div class="comp-row"><span>Price Range</span><input type="text" value="${c.price}" placeholder="e.g N10K-N50K" oninput="updateComp(${i},'price',this.value)"></div>
      <div class="comp-row"><span>Rating (1-5)</span><select onchange="updateComp(${i},'rating',this.value)"><option value="1" ${c.rating==='1'?'selected':''}>1 star</option><option value="2" ${c.rating==='2'?'selected':''}>2 stars</option><option value="3" ${c.rating==='3'?'selected':''}>3 stars</option><option value="4" ${c.rating==='4'?'selected':''}>4 stars</option><option value="5" ${c.rating==='5'?'selected':''}>5 stars</option></select></div>
      <div class="swot">
        <div class="swot-box swot-s"><h4>Strengths</h4><textarea oninput="updateComp(${i},'strengths',this.value)" placeholder="What they do well...">${c.strengths}</textarea></div>
        <div class="swot-box swot-w"><h4>Weaknesses</h4><textarea oninput="updateComp(${i},'weaknesses',this.value)" placeholder="Where they fall short...">${c.weaknesses}</textarea></div>
        <div class="swot-box swot-o"><h4>Opportunities</h4><textarea oninput="updateComp(${i},'opportunities',this.value)" placeholder="Market gaps...">${c.opportunities}</textarea></div>
        <div class="swot-box swot-t"><h4>Threats</h4><textarea oninput="updateComp(${i},'threats',this.value)" placeholder="Risks to watch...">${c.threats}</textarea></div>
      </div>
    </div>
  `).join('');
}
render();
</script>
</body>
</html>
