.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;margin-bottom:14px}
textarea{width:100%;min-height:60px;padding:14px;background:#14141e;border:1px solid #1e1e2e;border-radius:12px;color:#e8e8f0;font-size:.9rem;resize:vertical;margin-bottom:8px}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>🔁 Text Repeater</h1></div>

<div class="card">
<h2>Text to Repeat</h2>
<textarea id="input" placeholder="Enter text to repeat..." oninput="gen()">🚀 Harz Digital Services</textarea>
<div class="input-group"><label>Repeat Count (max 1000)</label><input type="number" id="count" value="10" min="1" max="1000" oninput="gen()"></div>
<div class="input-group"><label>Separator</label>
<div class="sep-tabs">
<div class="sep-tab active" onclick="setSep('newline')" data-s="newline">New Line</div>
<div class="sep-tab" onclick="setSep('space')" data-s="space">Space</div>
<div class="sep-tab" onclick="setSep('none')" data-s="none">None</div>
<div class="sep-tab" onclick="setSep('custom')" data-s="custom">Custom</div>
</div>
<input type="text" id="customSep" value=" | " oninput="gen()" style="display:none;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.85rem;width:100%">
</div>
</div>

<div class="card">
<h2>Result</h2>
<div class="stats" id="stats">0 repetitions · 0 characters</div>
<div class="output-box"><textarea id="output" readonly></textarea></div>
<button class="btn copy" onclick="copy()">📋 Copy Result</button>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Text Repeater
</div>

<script>
var sep='newline';
function setSep(s){
sep=s;
document.querySelectorAll('.sep-tab').forEach(function(e){e.classList.toggle('active',e.dataset.s===s)});
document.getElementById('customSep').style.display=s==='custom'?'block':'none';
gen();
}

function gen(){
var text=document.getElementById('input').value;
var count=Math.min(parseInt(document.getElementById('count').value)||0,1000);
var separator='';
if(sep==='newline')separator='\n';
else if(sep==='space')separator=' ';
else if(sep==='none')separator='';
else if(sep==='custom')separator=document.getElementById('customSep').value;
var result=[];
for(var i=0;i<count;i++)result.push(text);
var output=result.join(separator);
document.getElementById('output').value=output;
document.getElementById('stats').textContent=count+' repetitions · '+output.length+' characters';
}

function copy(){
navigator.clipboard.writeText(document.getElementById('output').value);
alert('Copied!');
}
gen();
</script>
