<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Layout Generator | Harz</title>
<meta name="description" content="Generate CSS Grid layouts visually. Define columns, rows, gaps, and template areas with live preview.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.app{grid-template-columns:1fr}}
.controls{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.control{margin-bottom:10px}
.control label{font-size:12px;color:#a3a3a3;margin-bottom:3px;display:block}
.control input[type="range"]{width:100%}
.control input[type="text"]{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:8px;border-radius:6px;font-size:13px;font-family:monospace}
.control .val{font-size:12px;color:#f59e0b;font-weight:700;float:right}
.preview{background:#141414;border:1px solid #2a2a2a;border-radius:12px;min-height:300px;padding:20px}
.grid-container{display:grid;gap:8px;min-height:250px}
.grid-item{background:linear-gradient(135deg,#f59e0b,#ec4899);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px}
.code{grid-column:1/-1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:#f59e0b;word-break:break-all;white-space:pre-wrap}
.copy-btn{grid-column:1/-1;background:#f59e0b;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;text-align:center}
</style>
</head>
<body>
<h1>CSS Grid Generator</h1>
<div class="app">
  <div class="controls">
    <div class="control"><label>Columns <span class="val" id="colVal">3</span></label><input type="range" id="cols" min="1" max="12" value="3" oninput="update()"></div>
    <div class="control"><label>Rows <span class="val" id="rowVal">2</span></label><input type="range" id="rows" min="1" max="12" value="2" oninput="update()"></div>
    <div class="control"><label>Gap <span class="val" id="gapVal">8px</span></label><input type="range" id="gap" min="0" max="30" value="8" oninput="update()"></div>
    <div class="control"><label>Column Template</label><input type="text" id="colTemplate" placeholder="e.g. 1fr 2fr 1fr" oninput="update()"></div>
    <div class="control"><label>Row Template</label><input type="text" id="rowTemplate" placeholder="e.g. auto auto" oninput="update()"></div>
  </div>
  <div class="preview"><div class="grid-container" id="grid"></div></div>
  <div class="code" id="code"></div>
  <button class="copy-btn" onclick="copyCode()">Copy CSS</button>
</div>
<script>
function update(){
  const cols=parseInt(document.getElementById('cols').value);
  const rows=parseInt(document.getElementById('rows').value);
  const gap=document.getElementById('gap').value;
  const ct=document.getElementById('colTemplate').value;
  const rt=document.getElementById('rowTemplate').value;
  document.getElementById('colVal').textContent=cols;
  document.getElementById('rowVal').textContent=rows;
  document.getElementById('gapVal').textContent=gap+'px';
  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=ct||`repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows=rt||`repeat(${rows}, 1fr)`;
  grid.style.gap=gap+'px';
  const total=cols*rows;
  grid.innerHTML=Array.from({length:total},(_,i)=>`<div class="grid-item">${i+1}</div>`).join('');
  document.getElementById('code').textContent=`.grid-container {\n  display: grid;\n  grid-template-columns: ${ct||`repeat(${cols}, 1fr)`};\n  grid-template-rows: ${rt||`repeat(${rows}, 1fr)`};\n  gap: ${gap}px;\n}`;
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent);alert('Grid CSS copied!');}
update();
</script>
</body>
</html>
