<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to TypeScript Interface Generator | Harz</title>
<meta name="description" content="Convert JSON data to TypeScript interfaces. Paste JSON, get typed interfaces instantly.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:800px;margin:0 auto}
.input-section{margin-bottom:16px}
.input-section label{font-size:13px;color:#a3a3a3;margin-bottom:6px;display:block}
textarea{width:100%;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:14px;border-radius:8px;font-family:monospace;font-size:13px;resize:vertical;min-height:180px;margin-bottom:8px}
textarea:focus{outline:none;border-color:#3b82f6}
.controls{display:flex;gap:8px;margin-bottom:16px}
.btn{background:#3b82f6;color:#fff;padding:10px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:14px}
.btn.secondary{background:#1c1c1c;border:1px solid #2a2a2a}
.output{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:13px;color:#10b981;white-space:pre-wrap;min-height:100px;word-break:break-word}
.copy-btn{display:block;width:200px;margin:16px auto;background:#10b981;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;text-align:center}
</style>
</head>
<body>
<h1>JSON to TypeScript</h1>
<div class="app">
  <div class="input-section">
    <label>Paste your JSON here:</label>
    <textarea id="jsonInput" placeholder='{"name":"John","age":30,"items":[{"id":1,"title":"Item"}]}'></textarea>
  </div>
  <div class="controls">
    <button class="btn" onclick="convert()">Convert to TypeScript</button>
    <button class="btn secondary" onclick="document.getElementById('jsonInput').value='';document.getElementById('output').textContent=''">Clear</button>
  </div>
  <div class="output" id="output"></div>
  <button class="copy-btn" onclick="copyOutput()">Copy TypeScript</button>
</div>
<script>
function getTS(value,prefix){
  if(value===null) return 'null';
  if(Array.isArray(value)){
    if(value.length===0) return 'any[]';
    return getTS(value[0],prefix)+'[]';
  }
  if(typeof value==='object'){
    let props=[];
    for(let key in value){
      const tsType=getTS(value[key],prefix+capitalize(key));
      props.push(`  ${key}: ${tsType};`);
    }
    return `{\n${props.join('\n')}\n}`;
  }
  if(typeof value==='string') return 'string';
  if(typeof value==='number') return 'number';
  if(typeof value==='boolean') return 'boolean';
  return 'any';
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function convert(){
  try{
    const json=JSON.parse(document.getElementById('jsonInput').value);
    let result='';
    if(Array.isArray(json)){
      const ts=getTS(json[0]||{},'Root');
      result=`interface Root${ts}\n\nconst data: Root[] = [...]`;
    }else{
      const ts=getTS(json,'Root');
      result=`interface Root ${ts}\n\nconst data: Root = {...}`;
    }
    document.getElementById('output').textContent=result;
  }catch(e){document.getElementById('output').textContent='Error: '+e.message;}
}
function copyOutput(){navigator.clipboard.writeText(document.getElementById('output').textContent);alert('TypeScript copied!');}
</script>
</body>
</html>
