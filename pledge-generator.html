<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>🔐 OTP & PIN Generator</h1></div>
<div class="card">
<h2>Settings</h2>
<div class="input-group"><label>Type</label><select id="type" onchange="gen()"><option value="numeric">Numeric (PIN)</option><option value="alphanumeric">Alphanumeric</option><option value="hex">Hexadecimal</option></select></div>
<div class="input-group"><label>Length</label><input type="number" id="length" value="6" min="3" max="32" oninput="gen()"></div>
<div class="input-group"><label>Count (batch)</label><input type="number" id="count" value="1" min="1" max="20" oninput="gen()"></div>
</div>
<div class="output"><div class="code" id="otp">849321</div><div class="sub" id="otpSub">6-digit numeric</div></div>
<button class="btn" onclick="gen()">🎲 Generate New</button>
<button class="btn copy" onclick="copy()">📋 Copy</button>
<div class="card"><h2>History</h2><div class="history" id="history"></div></div>
<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">Harz Digital Services — RC 321424 | OTP Generator</div>
<script>
var history=[];
function gen(){
var type=document.getElementById('type').value;
var len=parseInt(document.getElementById('length').value)||6;
var count=parseInt(document.getElementById('count').value)||1;
var pool='0123456789';
if(type==='alphanumeric')pool='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
if(type==='hex')pool='0123456789ABCDEF';
var codes=[];
for(var c=0;c<count;c++){
var code='';
for(var i=0;i<len;i++)code+=pool[Math.floor(Math.random()*pool.length)];
codes.push(code);
}
document.getElementById('otp').textContent=codes[0];
document.getElementById('otpSub').textContent=len+'-digit '+type+(count>1?' · '+count+' codes':'');
history.unshift({codes:codes,type:type,len:len,time:new Date().toLocaleTimeString()});
if(history.length>10)history.pop();
document.getElementById('history').innerHTML=history.map(function(h){return '<div class="h-row"><span class="h-val">'+h.codes.join(', ')+'</span> — '+h.len+'-digit '+h.type+' at '+h.time+'</div>'}).join('');
}
function copy(){navigator.clipboard.writeText(document.getElementById('otp').textContent);alert('OTP copied!')}
gen();
</script>
