<body>

<div class="header"><h1>CSS Gradient Generator</h1><p>Create beautiful gradients</p></div>

<div class="card">
<h2>Gradient Type</h2>
<div class="type-tabs">
<div class="type-tab active" onclick="setType('linear')">↔ Linear</div>
<div class="type-tab" onclick="setType('radial')">◎ Radial</div>
<div class="type-tab" onclick="setType('conic')">🌀 Conic</div>
</div>
<div class="preview" id="preview"></div>
<div class="input-group" id="angleGroup">
<label>Angle: <span id="angleVal">135°</span></label>
<input type="range" id="angle" min="0" max="360" value="135" oninput="update()">
</div>
</div>

<div class="card">
<h2>Colors</h2>
<div id="colorList"></div>
<button class="btn add" onclick="addColor()">+ Add Color</button>
</div>

<div class="card">
<h2>CSS Code</h2>
<div class="code-box"><code id="cssCode"></code></div>
<button class="copy-btn" onclick="copyCSS()">📋 Copy CSS</button>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | CSS Gradient Generator
</div>

<script>
var type='linear';
var colors=['#00d4aa','#7c3aed','#f59e0b'];

function setType(t){
type=t;
document.querySelectorAll('.type-tab').forEach(function(e,i){e.classList.toggle('active',['linear','radial','conic'][i]===t)});
document.getElementById('angleGroup').style.display=t==='linear'?'block':'none';
update();
}

function update(){
var angle=document.getElementById('angle').value;
document.getElementById('angleVal').textContent=angle+'°';
var gradient;
if(type==='linear'){gradient='linear-gradient('+angle+'deg, '+colors.join(', ')+')'}
else if(type==='radial'){gradient='radial-gradient(circle, '+colors.join(', ')+')'}
else{gradient='conic-gradient(from '+angle+'deg, '+colors.join(', ')+')'}
document.getElementById('preview').style.background=gradient;
document.getElementById('cssCode').textContent='background: '+gradient+';';
}

function renderColors(){
document.getElementById('colorList').innerHTML=colors.map(function(c,i){
return '<div class="color-row"><input type="color" value="'+c+'" oninput="setColor('+i+',this.value)"><input type="text" value="'+c+'" oninput="setColor('+i+',this.value)">'+(colors.length>2?'<span class="rm" onclick="rmColor('+i+')">✕</span>':'')+'</div>';
}).join('');
}

function setColor(i,val){colors[i]=val;update();renderColors()}
function addColor(){if(colors.length<6){colors.push('#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'));renderColors();update()}}
function rmColor(i){colors.splice(i,1);renderColors();update()}

function copyCSS(){
navigator.clipboard.writeText(document.getElementById('cssCode').textContent);
alert('CSS copied!');
}

document.getElementById('angle').addEventListener('input',update);
renderColors();update();
</script>
