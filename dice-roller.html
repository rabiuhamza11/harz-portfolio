<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:450px;margin:0 auto}
.header{text-align:center;padding:12px 0}
.header h1{font-size:1.3rem;color:#00d4aa}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:12px}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;margin-bottom:14px}
.dice-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
.die{width:60px;height:60px;background:linear-gradient(135deg,#00d4aa,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#fff;cursor:pointer;transition:transform .3s;user-select:none}
.die.rolling{animation:roll .3s infinite}
@keyframes roll{0%{transform:rotate(0)}25%{transform:rotate(90deg) scale(.9)}50%{transform:rotate(180deg)}75%{transform:rotate(270deg) scale(.9)}100%{transform:rotate(360deg)}}
.dice-count{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.dc-btn{width:40px;height:40px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#c8c8d0;font-size:1rem;cursor:pointer}
.dc-btn.active{border-color:#00d4aa;color:#00d4aa}
.btn{padding:14px 24px;border:none;border-radius:12px;font-weight:700;cursor:pointer;width:100%;font-size:1rem;background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff}
.result{text-align:center;padding:16px;background:#14141e;border:1px solid #1e1e2e;border-radius:12px;margin-bottom:12px}
.result .total{font-size:2.5rem;font-weight:800;color:#00d4aa;font-family:monospace}
.result .lbl{font-size:.75rem;color:#6b6b80}
.history{font-size:.75rem;color:#6b6b80;line-height:1.8}
.history .h-entry{padding:4px 0;border-bottom:1px solid rgba(30,30,46,.5)}
.history .h-val{color:#00d4aa;font-weight:600}
</style>
</head>
<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>🎲 Dice Roller</h1></div>

<div class="card">
<h2>How Many Dice?</h2>
<div class="dice-count" id="diceCount">
<div class="dc-btn active" onclick="setCount(1)" data-n="1">1</div>
<div class="dc-btn" onclick="setCount(2)" data-n="2">2</div>
<div class="dc-btn" onclick="setCount(3)" data-n="3">3</div>
<div class="dc-btn" onclick="setCount(4)" data-n="4">4</div>
<div class="dc-btn" onclick="setCount(5)" data-n="5">5</div>
<div class="dc-btn" onclick="setCount(6)" data-n="6">6</div>
</div>
<div class="dice-row" id="diceRow"></div>
<button class="btn" onclick="roll()">🎲 Roll Dice</button>
</div>

<div class="result">
<div class="total" id="total">—</div>
<div class="lbl">Total</div>
</div>

<div class="card">
<h2>History</h2>
<div class="history" id="history"><span style="color:#4a4a5e">No rolls yet</span></div>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Dice Roller
</div>

<script>
var numDice=1;
var diceValues=[];
var history=[];

function setCount(n){
numDice=n;
document.querySelectorAll('.dc-btn').forEach(function(e){e.classList.toggle('active',parseInt(e.dataset.n)===n)});
renderDice();
}

function renderDice(){
var row=document.getElementById('diceRow');
row.innerHTML='';
diceValues=[];
for(var i=0;i<numDice;i++){
var d=document.createElement('div');
d.className='die';
d.textContent='?';
d.onclick=function(){roll()};
row.appendChild(d);
diceValues.push(0);
}
document.getElementById('total').textContent='—';
}

function roll(){
var dice=document.querySelectorAll('.die');
dice.forEach(function(d){d.classList.add('rolling')});
setTimeout(function(){
dice.forEach(function(d,i){
d.classList.remove('rolling');
var val=Math.floor(Math.random()*6)+1;
diceValues[i]=val;
d.textContent=val;
});
var total=diceValues.reduce(function(a,b){return a+b},0);
document.getElementById('total').textContent=total;
history.unshift({values:diceValues.slice(),total:total});
if(history.length>10)history.pop();
renderHistory();
if(navigator.vibrate)navigator.vibrate(50);
},600);
}

function renderHistory(){
document.getElementById('history').innerHTML=history.map(function(h){
return '<div class="h-entry">Roll: ['+h.values.join(', ')+'] → <span class="h-val">'+h.total+'</span></div>';
}).join('');
}

renderDice();
</script>
