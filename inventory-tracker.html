<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Tracker — Track Stock & Sales | Harz</title>
<meta name="description" content="Track inventory, stock levels, and sales for your small business. Get low-stock alerts.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.stat{text-align:center}
.stat .num{font-size:20px;font-weight:800;color:#10b981}
.stat .label{font-size:10px;color:#a3a3a3}
.add-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.add-bar input{background:#141414;border:1px solid #2a2a2a;color:#fff;padding:10px;border-radius:8px;font-size:13px}
.add-bar input:first-child{flex:2}
.add-bar input:nth-child(2){flex:1}
.add-bar input:nth-child(3){flex:1}
.add-bar input:nth-child(4){flex:1}
.add-bar button{background:#10b981;color:#000;padding:10px 20px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.list{display:grid;gap:8px}
.item{display:flex;justify-content:space-between;align-items:center;background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:12px}
.item-info{flex:1}
.item-name{font-weight:600;font-size:14px}
.item-price{font-size:12px;color:#a3a3a3}
.stock{display:flex;align-items:center;gap:8px}
.stock-btn{width:28px;height:28px;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;border-radius:6px;cursor:pointer;font-size:16px}
.stock-num{font-weight:700;min-width:30px;text-align:center}
.low{color:#ef4444 !important}
.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<h1>Inventory Tracker</h1>
<div class="stats">
  <div class="stat"><div class="num" id="totalItems">0</div><div class="label">Products</div></div>
  <div class="stat"><div class="num" id="totalValue">N0</div><div class="label">Stock Value</div></div>
  <div class="stat"><div class="num" id="lowStock">0</div><div class="label">Low Stock</div></div>
</div>
<div class="add-bar">
  <input type="text" id="pName" placeholder="Product name">
  <input type="number" id="pStock" placeholder="Qty" value="0">
  <input type="number" id="pPrice" placeholder="Price" value="0">
  <input type="number" id="pMin" placeholder="Min" value="5">
  <button onclick="addProduct()">Add</button>
</div>
<div class="list" id="list"></div>
<script>
let products = JSON.parse(localStorage.getItem('inventory') || '[]');
function formatN(n){return 'N'+Math.round(n).toLocaleString()}
function addProduct() {
  const n=document.getElementById('pName').value.trim();
  if(!n)return;
  products.push({name:n,stock:parseInt(document.getElementById('pStock').value)||0,price:parseFloat(document.getElementById('pPrice').value)||0,min:parseInt(document.getElementById('pMin').value)||5,id:Date.now()});
  localStorage.setItem('inventory',JSON.stringify(products));
  document.getElementById('pName').value='';document.getElementById('pStock').value=0;document.getElementById('pPrice').value=0;
  render();
}
function changeStock(i,d){products[i].stock=Math.max(0,products[i].stock+d);localStorage.setItem('inventory',JSON.stringify(products));render();}
function delProduct(i){products.splice(i,1);localStorage.setItem('inventory',JSON.stringify(products));render();}
function render() {
  document.getElementById('totalItems').textContent=products.length;
  document.getElementById('totalValue').textContent=formatN(products.reduce((s,p)=>s+p.stock*p.price,0));
  document.getElementById('lowStock').textContent=products.filter(p=>p.stock<=p.min).length;
  if(!products.length){document.getElementById('list').innerHTML='<p style="text-align:center;color:#555;padding:20px">No products yet</p>';return;}
  document.getElementById('list').innerHTML=products.map((p,i)=>`
    <div class="item">
      <div class="item-info"><div class="item-name">${p.name}</div><div class="item-price">Price: ${formatN(p.price)} · Min: ${p.min}</div></div>
      <div class="stock">
        <button class="stock-btn" onclick="changeStock(${i},-1)">-</button>
        <span class="stock-num ${p.stock<=p.min?'low':''}">${p.stock}</span>
        <button class="stock-btn" onclick="changeStock(${i},1)">+</button>
        <button class="del" onclick="delProduct(${i})">Del</button>
      </div>
    </div>
  `).join('');
}
render();
</script>
</body>
</html>
