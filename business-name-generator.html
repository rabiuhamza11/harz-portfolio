<script>
var prefixes={modern:['Neo','Quantum','Cyber','Digital','Hyper','Prime','Nexus','Vertex','Apex','Synth','Pulse','Flux'],classic:['Royal','Grand','Premier','Elite','Summit','Crown','Sterling','Pinnacle','Heritage','Classic','First','Prime'],creative:['Zappy','Bloop','Quirk','Fizz','Boom','Zing','Spark','Dash','Wink','Pop','Zoom','Glow'],african:['Naija','Sahara','Konga','Zumi','Afri','Nile','Savanna','Kente','Baobab','Djembe','Zaria','Kano'],luxury:['Gold','Platinum','Diamond','Velvet','Royal','Imperial','Prestige','Opulent','Luxe','Regal','Noble','Majestic']};
var suffixes={modern:['Labs','Tech','Hub','AI','Systems','Works','Stack','Code','Grid','Byte','Cloud','Sync'],classic:['Group','Partners','Associates','Holdings','Company','Ltd','Inc','Solutions','Services','Consulting','Enterprises','Co'],creative:['ly','ify','ster','oo','io','able','ish','ful','works','pop','buzz','box'],african:['Hub','Connect','Wave','Link','Ville','Port','Junction','Express','Way','Place','Square','Circle'],luxury:['Collection','Boutique','Atelier','House','Maison','Estate','Gallery','Reserve','Edition','Label','Lifestyle','Heritage']};

function setKey(kw){document.getElementById('keyword').value=kw;generate()}

function generate(){
var kw=document.getElementById('keyword').value.toLowerCase().trim()||'business';
var style=document.getElementById('style').value;
var pre=prefixes[style],suf=suffixes[style];
var names=[];
var used={};
while(names.length<12){
var p=pre[Math.floor(Math.random()*pre.length)];
var s=suf[Math.floor(Math.random()*suf.length)];
var name=p+kw.charAt(0).toUpperCase()+kw.slice(1)+s;
if(!used[name]){used[name]=1;names.push(name)}
// Also try keyword + suffix
var name2=kw.charAt(0).toUpperCase()+kw.slice(1)+s;
if(!used[name2]){used[name2]=1;names.push(name2)}
// Prefix + keyword
var name3=p+' '+kw.charAt(0).toUpperCase()+kw.slice(1);
if(!used[name3]){used[name3]=1;names.push(name3)}
}
names=names.slice(0,12);
var html=names.map(function(n){
return '<div class="name-item"><div><div class="nm">'+n+'</div><div class="tld">'+n.toLowerCase().replace(/\s/g,'')+'.com · '+n.toLowerCase().replace(/\s/g,'')+'.ng</div></div><div class="copy" onclick="copyName(\''+n+'\')">Copy</div></div>';
}).join('');
document.getElementById('nameList').innerHTML=html;
}

function copyName(n){navigator.clipboard.writeText(n);alert('Copied: '+n)}
</script>
