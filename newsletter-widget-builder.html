<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Signup Widget Builder | Harz</title>
<meta name="description" content="Generate embeddable newsletter signup widgets. Customize colors, text, and export HTML code.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.app{grid-template-columns:1fr}}
.controls{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.control{margin-bottom:10px}
.control label{font-size:12px;color:#a3a3a3;margin-bottom:3px;display:block}
.control input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px}
.control input[type="color"]{height:36px;cursor:pointer}
.preview{background:#fff;border-radius:12px;padding:30px;min-height:250px}
.widget{text-align:center;padding:20px}
.widget h2{font-size:18px;margin-bottom:8px}
.widget p{font-size:13px;color:#555;margin-bottom:14px}
.widget input{padding:10px 16px;border:1px solid #ddd;border-radius:8px;width:200px;font-size:14px}
.widget button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-left:4px}
.code{grid-column:1/-1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:#10b981;word-break:break-all;white-space:pre-wrap;max-height:200px;overflow:auto}
.copy-btn{grid-column:1/-1;background:#10b981;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;text-align:center}
</style>
</head>
<body>
<h1>Newsletter Widget Builder</h1>
<div class="app">
  <div class="controls">
    <div class="control"><label>Headline</label><input type="text" id="headline" value="Subscribe to Our Newsletter" oninput="update()"></div>
    <div class="control"><label>Subtext</label><input type="text" id="subtext" value="Get weekly tips and updates" oninput="update()"></div>
    <div class="control"><label>Button Text</label><input type="text" id="btnText" value="Subscribe" oninput="update()"></div>
    <div class="control"><label>Placeholder</label><input type="text" id="placeholder" value="Enter your email" oninput="update()"></div>
    <div class="control"><label>BG Color</label><input type="color" id="bgColor" value="#f5f5f5" oninput="update()"></div>
    <div class="control"><label>Heading Color</label><input type="color" id="headingColor" value="#000000" oninput="update()"></div>
    <div class="control"><label>Button Color</label><input type="color" id="btnColor" value="#ec4899" oninput="update()"></div>
    <div class="control"><label>Button Text Color</label><input type="color" id="btnTextColor" value="#ffffff" oninput="update()"></div>
    <div class="control"><label>Border Radius</label><input type="range" id="radius" min="0" max="30" value="12" oninput="update()"></div>
  </div>
  <div class="preview" id="preview">
    <div class="widget" id="widget"></div>
  </div>
  <div class="code" id="code"></div>
  <button class="copy-btn" onclick="copyCode()">Copy Embed Code</button>
</div>
<script>
function update(){
  const h=document.getElementById('headline').value;
  const s=document.getElementById('subtext').value;
  const b=document.getElementById('btnText').value;
  const p=document.getElementById('placeholder').value;
  const bg=document.getElementById('bgColor').value;
  const hc=document.getElementById('headingColor').value;
  const bc=document.getElementById('btnColor').value;
  const btc=document.getElementById('btnTextColor').value;
  const r=document.getElementById('radius').value;
  const w=document.getElementById('widget');
  w.style.background=bg;
  w.style.borderRadius=r+'px';
  w.innerHTML=`<h2 style="color:${hc}">${h}</h2><p>${s}</p><input type="email" placeholder="${p}"><button style="background:${bc};color:${btc}">${b}</button>`;
  const code=`<div style="background:${bg};border-radius:${r}px;padding:20px;text-align:center">
  <h2 style="color:${hc};font-size:18px;margin-bottom:8px">${h}</h2>
  <p style="color:#555;font-size:13px;margin-bottom:14px">${s}</p>
  <input type="email" placeholder="${p}" style="padding:10px 16px;border:1px solid #ddd;border-radius:8px;font-size:14px">
  <button style="padding:10px 24px;background:${bc};color:${btc};border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-left:4px">${b}</button>
</div>`;
  document.getElementById('code').textContent=code;
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent);alert('Widget code copied!');}
update();
</script>
</body>
</html>
