var currentFont='block';
var fonts={'block':'Block Font','binary':'Binary Font','banner':'Banner (Simple)'};

function renderFontTabs(){
document.getElementById('fontTabs').innerHTML=Object.keys(fonts).map(function(f){
return '<span class="font-tab '+(f===currentFont?'active':'')+'" onclick="setFont(\''+f+'\')">'+fonts[f]+'</span>';
}).join('');
}

function setFont(f){currentFont=f;renderFontTabs();gen()}

function gen(){
var text=document.getElementById('text').value.toUpperCase()||'HARZ';
if(currentFont==='block'){
genBlock(text);
}else if(currentFont==='binary'){
genBinary(text);
}else{
genBanner(text);
}
}

function genBlock(text){
var rows=6;
var lines=[];
for(var r=0;r<rows;r++){
var line='';
for(var i=0;i<text.length;i++){
var ch=text[i];
if(blockFont[ch]){line+=blockFont[ch][r]+' '}
else{line+='      '}
}
lines.push(line.replace(/\s+$/,''));
}
document.getElementById('asciiOutput').textContent=lines.join('\n');
}

function genBinary(text){
var rows=6;
var lines=[];
for(var r=0;r<rows;r++){
var line='';
for(var i=0;i<text.length;i++){
var ch=text[i];
if(binaryFont[ch]){line+=binaryFont[ch][r+1]+' '}
else if(ch===' '){line+='   '}
else{line+='     '}
}
lines.push(line.replace(/\s+$/,''));
}
document.getElementById('asciiOutput').textContent=lines.join('\n');
}

function genBanner(text){
var banner={};
var lines=[];
for(var i=0;i<3;i++){
var line='';
for(var j=0;j<text.length;j++){
var ch=text[j];
if(ch===' '){line+='     '}
else{
// Simple hash-like banner
var code=ch.charCodeAt(0);
var row='';
for(var b=0;b<5;b++){row+=(code&(1<<(b+i*5)))?'█':'░'}
line+=row+' ';
}
line=line.replace(/█/g,'#');
}
lines.push(line.replace(/\s+$/,''));
}
document.getElementById('asciiOutput').textContent=lines.join('\n');
}

function copy(){
navigator.clipboard.writeText('```\n'+document.getElementById('asciiOutput').textContent+'\n```');
alert('ASCII art copied!');
}
