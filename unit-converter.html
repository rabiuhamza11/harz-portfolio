<body>

<div class="card">
<div class="input-row">
<div class="input-group"><label>From</label><input type="number" id="fromVal" value="1" oninput="convert()"></div>
<div class="input-group"><label>Unit</label><select id="fromUnit" onchange="convert()"></select></div>
</div>

<div class="input-row">
<div class="input-group"><label>To</label><input type="number" id="toVal" value="0" readonly></div>
<div class="input-group"><label>Unit</label><select id="toUnit" onchange="convert()"></select></div>
</div>

</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Unit Converter
</div>

<script>
var categories={
length:{name:'📏 Length',units:{m:'Meter',km:'Kilometer',cm:'Centimeter',mm:'Millimeter',mi:'Mile',yd:'Yard',ft:'Foot',inch:'Inch'}},
weight:{name:'⚖️ Weight',units:{kg:'Kilogram',g:'Gram',mg:'Milligram',lb:'Pound',oz:'Ounce',ton:'Tonne',st:'Stone'}},
temperature:{name:'🌡️ Temperature',units:{c:'Celsius',f:'Fahrenheit',k:'Kelvin'}},
area:{name:'📐 Area',units:{sqm:'Sq Meter',sqkm:'Sq Kilometer',sqft:'Sq Foot',acre:'Acre',hectare:'Hectare',sqmi:'Sq Mile'}},
volume:{name:'🧊 Volume',units:{l:'Liter',ml:'Milliliter',gal:'Gallon',qt:'Quart',pt:'Pint',cup:'Cup',floz:'Fl Oz'}},
speed:{name:'🚀 Speed',units:{ms:'m/s',kmh:'km/h',mph:'mph',knot:'Knot',fts:'ft/s'}},
data:{name:'💾 Data',units:{b:'Byte',kb:'KB',mb:'MB',gb:'GB',tb:'TB',pb:'PB',bit:'Bit'}},
time:{name:'⏰ Time',units:{s:'Second',min:'Minute',hr:'Hour',day:'Day',week:'Week',month:'Month',year:'Year'}}
};

// Conversion factors (to base unit)
var factors={
length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.34,yd:0.9144,ft:0.3048,inch:0.0254},
weight:{kg:1000,g:1,mg:0.001,lb:453.592,oz:28.3495,ton:1000000,st:6350.29318},
temperature:null, // special handling
area:{sqm:1,sqkm:1000000,sqft:0.0929,acre:4046.86,hectare:10000,sqmi:2589988.11},
volume:{l:1000,ml:1,gal:3785.41,qt:946.353,pt:473.176,cup:236.588,floz:29.5735},
speed:{ms:1,kmh:0.277778,mph:0.44704,knot:0.514444,fts:0.3048},
data:{b:1,kb:1024,mb:1048576,gb:1073741824,tb:1099511627776,pb:1.125899907e15,bit:0.125},
time:{s:1,min:60,hr:3600,day:86400,week:604800,month:2629800,year:31557600}
};

var currentCat='length';

function renderCategories(){
document.getElementById('catTabs').innerHTML=Object.keys(categories).map(function(k){
return '<span class="cat-tab '+(k===currentCat?'active':'')+'" onclick="setCategory(\''+k+'\')">'+categories[k].name+'</span>';
}).join('');
}

function setCategory(cat){
currentCat=cat;
renderCategories();
var units=categories[cat].units;
var unitKeys=Object.keys(units);
var fromSel=document.getElementById('fromUnit');
var toSel=document.getElementById('toUnit');
fromSel.innerHTML=unitKeys.map(function(k){return'<option value="'+k+'">'+units[k]+'</option>'}).join('');
toSel.innerHTML=unitKeys.map(function(k){return'<option value="'+k+'">'+units[k]+'</option>'}).join('');
fromSel.selectedIndex=0;
toSel.selectedIndex=Math.min(1,unitKeys.length-1);
convert();
}

function convert(){
var from=document.getElementById('fromUnit').value;
var to=document.getElementById('toUnit').value;
var val=parseFloat(document.getElementById('fromVal').value)||0;
var result;

if(currentCat==='temperature'){
if(from==='c'){
result=to==='f'?val*9/5+32:to==='k'?val+273.15:val;
}else if(from==='f'){
result=to==='c'?(val-32)*5/9:to==='k'?(val-32)*5/9+273.15:val;
}else{result=to==='c'?val-273.15:to==='f'?(val-273.15)*9/5+32:val}
}else{
var factor=factors[currentCat];
result=val*factor[from]/factor[to];
}

document.getElementById('toVal').value=result;
document.getElementById('resultVal').textContent=result.toLocaleString(undefined,{maximumFractionDigits:6});
document.getElementById('resultUnit').textContent=val+' '+categories[currentCat].units[from]+' = '+result.toLocaleString(undefined,{maximumFractionDigits:6})+' '+categories[currentCat].units[to];

// Quick conversions
var unitKeys=Object.keys(categories[currentCat].units);
document.getElementById('quickGrid').innerHTML=unitKeys.slice(0,6).map(function(k){
var qv;
if(currentCat==='temperature'){
var temp=val;
if(from==='f')temp=(temp-32)*5/9;
else if(from==='k')temp=temp-273.15;
if(k==='c')qv=temp;
else if(k==='f')qv=temp*9/5+32;
else qv=temp+273.15;
}else{
qv=val*factors[currentCat][from]/factors[currentCat][k];
}
return '<div class="quick-item" onclick="setQuick(\''+k+'\')"><div class="qval">'+qv.toLocaleString(undefined,{maximumFractionDigits:4})+'</div>'+categories[currentCat].units[k]+'</div>';
}).join('');
}

function setQuick(unit){document.getElementById('toUnit').value=unit;convert()}

function swap(){
var f=document.getElementById('fromUnit');
var t=document.getElementById('toUnit');
var fv=f.value;
f.value=t.value;t.value=fv;
convert();
}

renderCategories();setCategory('length');
</script>
