<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transition Generator — Harz Tools</title>
<meta name="description" content="Generate smooth CSS transitions with live preview. Customize timing, duration, easing, and property. Copy clean code instantly.">
<meta name="keywords" content="css transition generator, css animation, easing, timing function, web design tool">
<meta property="og:title" content="CSS Transition Generator — Harz Tools">
<meta property="og:description" content="Generate smooth CSS transitions with live preview and copy code.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;padding:16px}
.header{text-align:center;padding:20px 0 30px}
.header h1{font-size:1.6rem;background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#888;font-size:0.85rem;margin-top:6px}
.container{max-width:600px;margin:0 auto}
.preview-box{background:#1a1d29;border:1px solid #2a2d3a;border-radius:14px;padding:40px;text-align:center;margin-bottom:20px}
.preview-element{width:100px;height:100px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);border-radius:12px;margin:0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;user-select:none}
.preview-label{margin-top:16px;color:#666;font-size:0.8rem}
.controls{background:#1a1d29;border:1px solid #2a2d3a;border-radius:14px;padding:20px;margin-bottom:20px}
.control-group{margin-bottom:18px}
.control-group label{display:block;font-size:0.8rem;color:#999;margin-bottom:8px;font-weight:600}
.control-group select,.control-group input[type="number"]{width:100%;padding:10px 12px;background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;color:#e0e0e0;font-size:0.9rem;outline:none}
.control-group select:focus,.control-group input:focus{border-color:#00d4ff}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type="range"]{flex:1;accent-color:#00d4ff}
.range-val{font-size:0.85rem;color:#00d4ff;min-width:50px;text-align:right;font-weight:600}
.cubic-row{display:flex;gap:8px}
.cubic-row input{flex:1;padding:10px;background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;color:#e0e0e0;font-size:0.85rem;text-align:center;outline:none}
.cubic-row input:focus{border-color:#00d4ff}
.cubic-col{flex:1}
.cubic-col label{display:block;text-align:center;font-size:0.7rem;color:#666;margin-top:4px}
.cubic-label{font-size:0.8rem;color:#999;margin-bottom:8px;font-weight:600}
.btn-row{display:flex;gap:10px;margin-bottom:20px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-copy{background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff}
.btn-copy:active{transform:scale(0.97)}
.btn-reset{background:#2a2d3a;color:#e0e0e0}
.btn-reset:active{transform:scale(0.97)}
.code-output{background:#0a0c12;border:1px solid #2a2d3a;border-radius:12px;padding:16px;font-family:'Courier New',monospace;font-size:0.8rem;line-height:1.6;overflow-x:auto;color:#00ff88;white-space:pre-wrap;word-break:break-all}
.chat-btn{position:fixed;bottom:20px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,212,255,0.4);z-index:999;text-decoration:none}
.nav-back{display:inline-block;margin-bottom:16px;color:#00d4ff;text-decoration:none;font-size:0.85rem}
.footer{text-align:center;color:#444;font-size:0.75rem;margin-top:30px;padding:20px 0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#00d4ff;color:#000;padding:10px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:400px){.preview-box{padding:24px}.controls{padding:14px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<a href="tools.html" class="nav-back">← Back to Tools</a>
<h1>🎬 CSS Transition Generator</h1>
<p>Visual transitions with live preview</p>
</div>
<div class="preview-box">
<div class="preview-element" id="previewEl" onclick="togglePreview()">✨</div>
<div class="preview-label">Tap the box to see the transition</div>
</div>
<div class="controls">
<div class="control-group">
<label>Transition Property</label>
<select id="property" onchange="updateCode()">
<option value="all">all</option>
<option value="transform">transform</option>
<option value="opacity">opacity</option>
<option value="background">background</option>
<option value="color">color</option>
<option value="width">width</option>
<option value="height">height</option>
<option value="border-radius">border-radius</option>
<option value="box-shadow">box-shadow</option>
<option value="filter">filter</option>
</select>
</div>
<div class="control-group">
<label>Duration (seconds)</label>
<div class="range-row">
<input type="range" id="duration" min="0.05" max="3" step="0.05" value="0.5" oninput="updateCode()">
<span class="range-val" id="durationVal">0.5s</span>
</div>
</div>
<div class="control-group">
<label>Timing Function</label>
<select id="easing" onchange="updateCode()">
<option value="ease">ease</option>
<option value="ease-in">ease-in</option>
<option value="ease-out">ease-out</option>
<option value="ease-in-out">ease-in-out</option>
<option value="linear">linear</option>
<option value="step-start">step-start</option>
<option value="step-end">step-end</option>
<option value="cubic-bezier">cubic-bezier (custom)</option>
</select>
</div>
<div class="control-group" id="cubicGroup" style="display:none">
<div class="cubic-label">Cubic Bezier Values</div>
<div class="cubic-row">
<div class="cubic-col"><input type="number" id="cb1" value="0.42" step="0.01" oninput="updateCode()"><label>x1</label></div>
<div class="cubic-col"><input type="number" id="cb2" value="0" step="0.01" oninput="updateCode()"><label>y1</label></div>
<div class="cubic-col"><input type="number" id="cb3" value="0.58" step="0.01" oninput="updateCode()"><label>x2</label></div>
<div class="cubic-col"><input type="number" id="cb4" value="1" step="0.01" oninput="updateCode()"><label>y2</label></div>
</div>
</div>
<div class="control-group">
<label>Delay (seconds)</label>
<div class="range-row">
<input type="range" id="delay" min="0" max="2" step="0.1" value="0" oninput="updateCode()">
<span class="range-val" id="delayVal">0s</span>
</div>
</div>
</div>
<div class="btn-row">
<button class="btn btn-copy" onclick="copyCode()">📋 Copy CSS</button>
<button class="btn btn-reset" onclick="resetAll()">↻ Reset</button>
</div>
<div class="code-output" id="codeOutput"></div>
<div class="footer">Built by <strong>Harz Digital Services</strong> · <a href="index.html" style="color:#00d4ff;text-decoration:none">harz-portfolio</a></div>
</div>
<a href="chat.html" class="chat-btn">💬</a>
<div class="toast" id="toast">Copied!</div>
<script>
let toggled=false;
function getEasing(){const e=document.getElementById('easing').value;if(e==='cubic-bezier'){return `cubic-bezier(${document.getElementById('cb1').value}, ${document.getElementById('cb2').value}, ${document.getElementById('cb3').value}, ${document.getElementById('cb4').value})`;}return e;}
function updateCode(){const prop=document.getElementById('property').value;const dur=document.getElementById('duration').value;const delay=document.getElementById('delay').value;const easing=getEasing();document.getElementById('durationVal').textContent=dur+'s';document.getElementById('delayVal').textContent=delay+'s';document.getElementById('cubicGroup').style.display=document.getElementById('easing').value==='cubic-bezier'?'block':'none';document.getElementById('codeOutput').textContent=`transition: ${prop} ${dur}s ${easing} ${delay}s;`;document.getElementById('previewEl').style.transition=`${prop} ${dur}s ${easing} ${delay}s`;}
function togglePreview(){toggled=!toggled;const el=document.getElementById('previewEl');if(toggled){el.style.transform='scale(1.5) rotate(180deg)';el.style.borderRadius='50%';el.style.background='linear-gradient(135deg,#ff6b6b,#feca57)';el.style.boxShadow='0 0 30px rgba(255,107,107,0.5)';el.style.filter='brightness(1.2)';el.style.width='120px';el.style.height='120px';el.style.opacity='0.8';}else{el.style.transform='scale(1) rotate(0deg)';el.style.borderRadius='12px';el.style.background='linear-gradient(135deg,#00d4ff,#7b2ff7)';el.style.boxShadow='none';el.style.filter='brightness(1)';el.style.width='100px';el.style.height='100px';el.style.opacity='1';}}
function copyCode(){navigator.clipboard.writeText(document.getElementById('codeOutput').textContent).then(()=>showToast('Copied!'));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function resetAll(){document.getElementById('property').value='all';document.getElementById('duration').value=0.5;document.getElementById('delay').value=0;document.getElementById('easing').value='ease';document.getElementById('cb1').value=0.42;document.getElementById('cb2').value=0;document.getElementById('cb3').value=0.58;document.getElementById('cb4').value=1;toggled=false;document.getElementById('previewEl').style='';updateCode();}
updateCode();
</script>
</body>
</html>
