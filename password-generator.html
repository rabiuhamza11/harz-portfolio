*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}

.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.pwd-display{background:#14141e;border:1px solid #1e1e2e;border-radius:12px;padding:16px;margin-bottom:16px;position:relative}
.pwd-display .pwd{font-family:monospace;font-size:1.3rem;color:#00d4aa;word-break:break-all;letter-spacing:1px}
.pwd-display .copy{position:absolute;top:12px;right:12px;padding:6px 12px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);border-radius:8px;color:#00d4aa;font-size:.75rem;cursor:pointer}
.strength{height:6px;border-radius:3px;margin-top:10px;transition:all .3s}
.strength-bar{height:100%;border-radius:3px;transition:width .3s}

.option-row label{font-size:.85rem;color:#c8c8d0}
.option-row input[type=checkbox]{width:22px;height:22px;accent-color:#00d4aa}
.option-row input[type=range]{flex:1;margin-left:12px}
.length-val{font-weight:700;color:#00d4aa;width:30px;text-align:right}
.btn{padding:12px 24px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%}
.btn.gen{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;margin-top:12px}
.strength-label{font-size:.75rem;margin-top:4px;text-align:center}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Password Generator</h1><p>Create strong, secure passwords</p></div>

<div class="card">
<h2>Your Password</h2>
<div class="pwd-display">
<div class="pwd" id="pwd">Click Generate</div>
<div class="copy" onclick="copyPwd()">Copy</div>
</div>
<div class="strength"><div class="strength-bar" id="strengthBar" style="width:0%"></div></div>
<div class="strength-label" id="strengthLabel">—</div>
<div class="pass-count" id="passCount"></div>
</div>

<div class="card">
<h2>Settings</h2>
<div class="option-row"><label>Length: <span class="length-val" id="lenVal">16</span></label><input type="range" id="length" min="6" max="64" value="16" oninput="updateLen()"></div>
<div class="option-row"><label>Uppercase (A-Z)</label><input type="checkbox" id="upper" checked></div>
<div class="option-row"><label>Lowercase (a-z)</label><input type="checkbox" id="lower" checked></div>
<div class="option-row"><label>Numbers (0-9)</label><input type="checkbox" id="nums" checked></div>
<div class="option-row"><label>Symbols (!@#$)</label><input type="checkbox" id="syms" checked></div>
<div class="option-row"><label>Exclude lookalikes (0O1lI)</label><input type="checkbox" id="exclude"></div>
<button class="btn gen" onclick="generate()">Generate Password</button>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Password Generator
</div>

<script>
function updateLen(){document.getElementById('lenVal').textContent=document.getElementById('length').value}

function generate(){
var len=parseInt(document.getElementById('length').value);
var chars='';
var upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var lower='abcdefghijklmnopqrstuvwxyz';
var nums='0123456789';
var syms='!@#$%^&*()_+-=[]{}|;:,.<>?';
if(document.getElementById('exclude').checked){
upper=upper.replace(/[OI]/g,'');lower=lower.replace(/[ol]/g,'');nums=nums.replace(/[01]/g,'')}
if(document.getElementById('upper').checked)chars+=upper;
if(document.getElementById('lower').checked)chars+=lower;
if(document.getElementById('nums').checked)chars+=nums;
if(document.getElementById('syms').checked)chars+=syms;
if(!chars){alert('Select at least one option');return}
var pwd='';
for(var i=0;i<len;i++){pwd+=chars[Math.floor(Math.random()*chars.length)]}
document.getElementById('pwd').textContent=pwd;
// Strength
var score=0;
if(len>=8)score+=1;if(len>=12)score+=1;if(len>=20)score+=1;
var types=document.getElementById('upper').checked+document.getElementById('lower').checked+document.getElementById('nums').checked+document.getElementById('syms').checked;
score+=types-1;
var colors=['#ef4444','#f59e0b','#f59e0b','#00d4aa','#00d4aa','#00d4aa'];
var labels=['Weak','Fair','Fair','Strong','Very Strong','Very Strong'];
var pct=Math.min(100,score*20);
document.getElementById('strengthBar').style.width=pct+'%';
document.getElementById('strengthBar').style.background=colors[score]||'#00d4aa';
document.getElementById('strengthLabel').textContent=labels[score]||'—';
document.getElementById('strengthLabel').style.color=colors[score]||'#00d4aa';
// Crack time estimate
var combos=Math.pow(chars.length,len);
var seconds=combos/1e10;
var timeText='';
if(seconds<1)timeText='Instant';
else if(seconds<60)timeText=Math.round(seconds)+'s';
else if(seconds<3600)timeText=Math.round(seconds/60)+'min';
else if(seconds<86400)timeText=Math.round(seconds/3600)+'hours';
else if(seconds<31536000)timeText=Math.round(seconds/86400)+'days';
else if(seconds<31536000*1000)timeText=Math.round(seconds/31536000)+'years';
else if(seconds<31536000*1e9)timeText=Math.round(seconds/31536000/1e6)+'M years';
else timeText='Billion+ years';
document.getElementById('passCount').textContent='Time to crack: '+timeText;
}

function copyPwd(){var p=document.getElementById('pwd').textContent;if(p&&p!=='Click Generate'){navigator.clipboard.writeText(p);alert('Password copied!')}}
generate();
</script>
