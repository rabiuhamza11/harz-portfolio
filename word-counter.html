.keyword{display:inline-block;padding:4px 10px;background:#14141e;border:1px solid #1e1e2e;border-radius:20px;font-size:.75rem;color:#c8c8d0;margin:3px}

<body>

<div class="header"><h1>Word Counter</h1><p>Count words, characters, reading time & more</p></div>

<div class="card">
<h2>Paste Your Text</h2>
<textarea id="textArea" placeholder="Start typing or paste your content here..." oninput="analyze()">Start typing or paste your content here to see live stats...</textarea>
<div class="stats">
<div class="stat"><div class="num" id="wordCount">0</div><div class="lbl">Words</div></div>
<div class="stat"><div class="num" id="charCount">0</div><div class="lbl">Characters</div></div>
<div class="stat"><div class="num" id="charNoSpace">0</div><div class="lbl">No Spaces</div></div>
<div class="stat"><div class="num" id="sentCount">0</div><div class="lbl">Sentences</div></div>
<div class="stat"><div class="num" id="paraCount">0</div><div class="lbl">Paragraphs</div></div>
<div class="stat"><div class="num" id="lineCount">0</div><div class="lbl">Lines</div></div>
</div>

<div class="icon">⏱️</div>

</div>
</div>

<div class="card">
<h2>Top Keywords</h2>
<div class="keyword-list" id="keywords"></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Word Counter & Text Analyzer
</div>

<script>
var stopWords=['the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','can','this','that','these','those','i','you','he','she','it','we','they','them','their','what','which','who','when','where','why','how','all','each','every','both','few','more','most','other','some','such','no','nor','not','only','own','same','so','than','too','very','just','as','if','about','your','here','there'];

function analyze(){
var text=document.getElementById('textArea').value;
var words=text.trim().split(/\s+/).filter(function(w){return w.length>0});
var chars=text.length;
var charsNoSpace=text.replace(/\s/g,'').length;
var sentences=text.split(/[.!?]+/).filter(function(s){return s.trim().length>0});
var paragraphs=text.split(/\n\n+/).filter(function(p){return p.trim().length>0});
if(paragraphs.length===0&&text.trim().length>0)paragraphs=[text.trim()];
var lines=text.split('\n').filter(function(l){return l.trim().length>0});

document.getElementById('wordCount').textContent=words.length;
document.getElementById('charCount').textContent=chars;
document.getElementById('charNoSpace').textContent=charsNoSpace;
document.getElementById('sentCount').textContent=sentences.length;
document.getElementById('paraCount').textContent=paragraphs.length;
document.getElementById('lineCount').textContent=lines.length;

// Reading time (200 wpm)
var mins=words.length/200;
var secs=Math.round(mins*60);
var timeText;
if(secs<60)timeText=secs+' sec';
else if(secs<3600)timeText=Math.floor(secs/60)+' min '+(secs%60)+' sec';
else timeText=Math.floor(secs/3600)+' hr '+Math.floor((secs%3600)/60)+' min';
document.getElementById('readTime').textContent=timeText;

// Keywords
var freq={};
words.forEach(function(w){
w=w.toLowerCase().replace(/[^a-z0-9]/g,'');
if(w.length<3||stopWords.includes(w))return;
freq[w]=(freq[w]||0)+1;
});
var sorted=Object.entries(freq).sort(function(a,b){return b[1]-a[1]}).slice(0,15);
document.getElementById('keywords').innerHTML=sorted.map(function(k){
return '<span class="keyword">'+k[0]+' <span class="count">'+k[1]+'</span></span>';
}).join('');
}

analyze();
</script>
