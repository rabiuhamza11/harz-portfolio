<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:550px;margin:0 auto}
.header{text-align:center;padding:12px 0}
.header h1{font-size:1.2rem;color:#00d4aa}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:12px}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;margin-bottom:14px}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:4px}
.input-group input,.input-group textarea{width:100%;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.85rem}
.input-group textarea{min-height:50px;resize:vertical}
.checks{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.check{display:flex;align-items:center;gap:8px;font-size:.8rem;color:#c8c8d0}
.check input{accent-color:#00d4aa}
.output{background:#14141e;border:1px solid rgba(0,212,170,.3);border-radius:12px;padding:16px;max-height:300px;overflow-y:auto;margin-bottom:10px}
.output h3{font-size:.8rem;color:#00d4aa;margin:10px 0 4px}
.output p{font-size:.75rem;color:#c8c8d0;line-height:1.6;margin-bottom:8px}
.btn{padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%;background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;margin-bottom:8px}
.btn.copy{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:#00d4aa}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>📋 Privacy Policy Generator</h1></div>

<div class="card">
<h2>Company Info</h2>
<div class="input-group"><label>Company Name</label><input type="text" id="company" value="Harz Digital Services" oninput="gen()"></div>
<div class="input-group"><label>Website URL</label><input type="text" id="website" value="https://rabiuhamza11.github.io/harz-portfolio/" oninput="gen()"></div>
<div class="input-group"><label>Contact Email</label><input type="text" id="email" value="harzco.business@gmail.com" oninput="gen()"></div>
<div class="input-group"><label>Country</label><input type="text" id="country" value="Nigeria" oninput="gen()"></div>
</div>

<div class="card">
<h2>Data Collected</h2>
<div class="checks">
<label class="check"><input type="checkbox" id="dName" checked onchange="gen()"> Names</label>
<label class="check"><input type="checkbox" id="dEmail" checked onchange="gen()"> Email addresses</label>
<label class="check"><input type="checkbox" id="dPhone" checked onchange="gen()"> Phone numbers</label>
<label class="check"><input type="checkbox" id="dPayment" checked onchange="gen()"> Payment information</label>
<label class="check"><input type="checkbox" id="dLocation" onchange="gen()"> Location data</label>
<label class="check"><input type="checkbox" id="dCookies" checked onchange="gen()"> Cookies & usage data</label>
<label class="check"><input type="checkbox" id="dDevice" onchange="gen()"> Device information</label>
</div>
</div>

<div class="card">
<h2>Third-Party Services</h2>
<div class="checks">
<label class="check"><input type="checkbox" id="tPaystack" checked onchange="gen()"> Paystack (payments)</label>
<label class="check"><input type="checkbox" id="tStripe" checked onchange="gen()"> Stripe (payments)</label>
<label class="check"><input type="checkbox" id="tGoogle" checked onchange="gen()"> Google Analytics</label>
<label class="check"><input type="checkbox" id="tWhatsapp" onchange="gen()"> WhatsApp Business</label>
<label class="check"><input type="checkbox" id="tFirebase" onchange="gen()"> Firebase</label>
</div>
</div>

<div class="card">
<h2>Generated Privacy Policy</h2>
<div class="output" id="policyOutput"></div>
<button class="btn copy" onclick="copy()">📋 Copy Privacy Policy</button>
<button class="btn" onclick="download()">📥 Download as HTML</button>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | NDPR/GDPR Compliant Template
</div>

<script>
function gen(){
var company=document.getElementById('company').value;
var website=document.getElementById('website').value;
var email=document.getElementById('email').value;
var country=document.getElementById('country').value;
var today=new Date().toLocaleDateString('en',{year:'numeric',month:'long',day:'numeric'});

var data=[];
if(document.getElementById('dName').checked)data.push('Names and contact details');
if(document.getElementById('dEmail').checked)data.push('Email addresses');
if(document.getElementById('dPhone').checked)data.push('Phone numbers');
if(document.getElementById('dPayment').checked)data.push('Payment information (processed by third-party payment gateways)');
if(document.getElementById('dLocation').checked)data.push('Location data');
if(document.getElementById('dCookies').checked)data.push('Cookies and website usage data');
if(document.getElementById('dDevice').checked)data.push('Device and browser information');

var third=[];
if(document.getElementById('tPaystack').checked)third.push('Paystack (payment processing)');
if(document.getElementById('tStripe').checked)third.push('Stripe (payment processing)');
if(document.getElementById('tGoogle').checked)third.push('Google Analytics (website analytics)');
if(document.getElementById('tWhatsapp').checked)third.push('WhatsApp Business (customer communication)');
if(document.getElementById('tFirebase').checked)third.push('Firebase (app analytics and authentication)');

var html='<h1>Privacy Policy</h1>';
html+='<p><strong>Last updated:</strong> '+today+'</p>';
html+='<p>This Privacy Policy describes how '+company+' ("we", "us", or "our") collects, uses, and protects your information when you use our website at '+website+' and our services.</p>';

html+='<h3>1. Information We Collect</h3>';
html+='<p>We may collect the following types of information:</p>';
html+='<p>• '+data.join('<br>• ')+'</p>';

html+='<h3>2. How We Use Your Information</h3>';
html+='<p>We use the collected information to:</p>';
html+='<p>• Provide and maintain our services<br>• Process transactions and payments<br>• Send notifications and updates<br>• Respond to inquiries and provide support<br>• Improve our website and services<br>• Comply with legal obligations under '+country+' law</p>';

html+='<h3>3. Data Storage and Security</h3>';
html+='<p>We implement appropriate technical and organizational measures to protect your personal data. Your data is stored securely and access is restricted to authorized personnel only. We comply with the '+country+' Data Protection Regulation (NDPR) and where applicable, the General Data Protection Regulation (GDPR).</p>';

if(third.length>0){
html+='<h3>4. Third-Party Services</h3>';
html+='<p>We use the following third-party services that may collect and process your data:</p>';
html+='<p>• '+third.join('<br>• ')+'</p>';
html+='<p>These services have their own privacy policies governing how they handle your data.</p>';
}

html+='<h3>5. Cookies</h3>';
html+='<p>Our website may use cookies to improve your browsing experience. You can control cookies through your browser settings. Disabling cookies may affect functionality.</p>';

html+='<h3>6. Data Retention</h3>';
html+='<p>We retain your personal data only for as long as necessary to fulfill the purposes outlined in this policy or as required by law.</p>';

html+='<h3>7. Your Rights</h3>';
html+='<p>You have the right to:<br>• Access your personal data<br>• Request correction of inaccurate data<br>• Request deletion of your data<br>• Withdraw consent at any time<br>• Lodge a complaint with the relevant data protection authority</p>';

html+='<h3>8. Children\'s Privacy</h3>';
html+='<p>Our services are not directed to individuals under 16 years of age. We do not knowingly collect personal data from children.</p>';

html+='<h3>9. Changes to This Policy</h3>';
html+='<p>We may update this Privacy Policy from time to time. Changes will be posted on this page with an updated revision date.</p>';

html+='<h3>10. Contact Us</h3>';
html+='<p>If you have questions about this Privacy Policy, contact us at:<br>'+email+'<br>'+company+'</p>';

document.getElementById('policyOutput').innerHTML=html;
}

function copy(){
var text=document.getElementById('policyOutput').innerText;
navigator.clipboard.writeText(text);
alert('Privacy Policy copied!');
}

function download(){
var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Privacy Policy Generator — Legal Tool | Harz Digital Services</title></head><body>'+document.getElementById('policyOutput').innerHTML+'<!-- Magani Chat Widget -->
<div id="magani-chat-float" style="position:fixed;bottom:20px;right:20px;z-index:9999;">
<a href="chat.html" style="display:flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#00d4aa,#7c3aed);border-radius:30px;color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,212,170,.3);transition:transform .2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
<span style="font-size:1.3rem;">🧙‍♂️</span> Chat with Magani
</a>
</div>
</body></html>';
var blob=new Blob([html],{type:'text/html'});
var a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='privacy-policy.html';
a.click();
}

gen();
</script>
<!-- Magani Chat Widget -->
<div id="magani-chat-float" style="position:fixed;bottom:20px;right:20px;z-index:9999;">
<a href="chat.html" style="display:flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#00d4aa,#7c3aed);border-radius:30px;color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,212,170,.3);transition:transform .2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
<span style="font-size:1.3rem;">🧙‍♂️</span> Chat with Magani
</a>
</div>
</body>
</html>
