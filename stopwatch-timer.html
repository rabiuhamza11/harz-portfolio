<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:450px;margin:0 auto}
.header{text-align:center;padding:12px 0}
.header h1{font-size:1.2rem;color:#00d4aa}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:12px}
.mode-tabs{display:flex;gap:6px;margin-bottom:16px}
.mtab{flex:1;padding:10px;text-align:center;background:#0e0e16;border:1px solid #1e1e2e;border-radius:10px;font-size:.8rem;color:#6b6b80;cursor:pointer}
.mtab.active{border-color:#00d4aa;color:#00d4aa;background:rgba(0,212,170,.05)}
.timer-display{text-align:center;padding:40px 0}
.time{font-size:3.5rem;font-weight:800;font-family:monospace;color:#00d4aa}
.time.timer{color:#7c3aed}
.controls{display:flex;gap:12px;justify-content:center;margin:20px 0}
.ctrl{width:70px;height:70px;border-radius:50%;border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.ctrl:active{transform:scale(.9)}
.ctrl.start{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff}
.ctrl.stop{background:#ef4444;color:#fff}
.ctrl.reset{background:#1e1e2e;color:#6b6b80}
.laps{margin-top:12px;max-height:200px;overflow-y:auto}
.lap-row{display:flex;justify-content:space-between;padding:8px 14px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;margin-bottom:4px;font-size:.8rem}
.lap-row .num{color:#6b6b80}
.lap-row .time{font-size:.8rem;color:#00d4aa;font-family:monospace}
.timer-input{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.timer-input input{width:70px;padding:12px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:1.2rem;text-align:center;font-family:monospace}
.timer-input label{font-size:.7rem;color:#6b6b80;text-align:center}
.ti-group{text-align:center}
.ti-group input{display:block;margin:0 auto}
</style>
</head>
<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>⏱️ Stopwatch & Timer</h1></div>

<div class="mode-tabs">
<div class="mtab active" onclick="setMode('stopwatch')">Stopwatch</div>
<div class="mtab" onclick="setMode('timer')">Countdown Timer</div>
</div>

<div id="stopwatchMode">
<div class="timer-display">
<div class="time" id="swDisplay">00:00.00</div>
</div>
<div class="controls">
<button class="ctrl start" id="swStart" onclick="swToggle()">▶</button>
<button class="ctrl reset" onclick="swReset()">↻</button>
<button class="ctrl" style="background:#14141e;border:1px solid #1e1e2e;color:#7c3aed" onclick="swLap()">🏁</button>
</div>
<div class="laps" id="swLaps"></div>
</div>

<div id="timerMode" style="display:none">
<div class="timer-input">
<div class="ti-group"><label>Hours</label><input type="number" id="tHours" value="0" min="0" max="23"></div>
<div class="ti-group"><label>Minutes</label><input type="number" id="tMin" value="5" min="0" max="59"></div>
<div class="ti-group"><label>Seconds</label><input type="number" id="tSec" value="0" min="0" max="59"></div>
</div>
<div class="timer-display">
<div class="time timer" id="tDisplay">05:00</div>
</div>
<div class="controls">
<button class="ctrl start" id="tStart" onclick="tToggle()">▶</button>
<button class="ctrl reset" onclick="tReset()">↻</button>
</div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Stopwatch & Timer
</div>

<script>
var mode='stopwatch';
var swRunning=false,swStart=0,swElapsed=0,swInterval=null,swLaps=[];
var tRunning=false,tRemaining=300,tInterval=null;

function setMode(m){
mode=m;
document.querySelectorAll('.mtab').forEach(function(e,i){e.classList.toggle('active',['stopwatch','timer'][i]===m)});
document.getElementById('stopwatchMode').style.display=m==='stopwatch'?'block':'none';
document.getElementById('timerMode').style.display=m==='timer'?'block':'none';
}

// Stopwatch
function swToggle(){
if(swRunning){swRunning=false;clearInterval(swInterval);document.getElementById('swStart').textContent='▶';document.getElementById('swStart').className='ctrl start'}
else{swRunning=true;swStart=Date.now()-swElapsed;document.getElementById('swStart').textContent='⏸';document.getElementById('swStart').className='ctrl stop';swInterval=setInterval(swUpdate,10)}
}
function swUpdate(){swElapsed=Date.now()-swStart;document.getElementById('swDisplay').textContent=swFormat(swElapsed)}
function swFormat(ms){
var m=Math.floor(ms/60000);var s=Math.floor(ms%60000/1000);var cs=Math.floor(ms%1000/10);
return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(cs).padStart(2,'0');
}
function swReset(){swRunning=false;clearInterval(swInterval);swElapsed=0;swLaps=[];document.getElementById('swDisplay').textContent='00:00.00';document.getElementById('swStart').textContent='▶';document.getElementById('swStart').className='ctrl start';document.getElementById('swLaps').innerHTML=''}
function swLap(){if(!swRunning)return;swLaps.unshift(swFormat(swElapsed));document.getElementById('swLaps').innerHTML=swLaps.map(function(t,i){return '<div class="lap-row"><span class="num">Lap '+(swLaps.length-i)+'</span><span class="time">'+t+'</span></div>'}).join('')}

// Timer
function tToggle(){
if(tRunning){tRunning=false;clearInterval(tInterval);document.getElementById('tStart').textContent='▶';document.getElementById('tStart').className='ctrl start'}
else{
var h=parseInt(document.getElementById('tHours').value)||0;
var m=parseInt(document.getElementById('tMin').value)||0;
var s=parseInt(document.getElementById('tSec').value)||0;
if(tRemaining<=0)tRemaining=h*3600+m*60+s;
if(tRemaining<=0)return;
tRunning=true;document.getElementById('tStart').textContent='⏸';document.getElementById('tStart').className='ctrl stop';
tInterval=setInterval(tUpdate,1000);
}
}
function tUpdate(){
tRemaining--;
document.getElementById('tDisplay').textContent=tFormat(tRemaining);
if(tRemaining<=0){
tRunning=false;clearInterval(tInterval);
document.getElementById('tStart').textContent='▶';document.getElementById('tStart').className='ctrl start';
document.getElementById('tDisplay').textContent='⏰ DONE!';
if(navigator.vibrate)navigator.vibrate([300,150,300,150,300]);
}
}
function tFormat(s){
var h=Math.floor(s/3600);var m=Math.floor(s%3600/60);var sec=s%60;
if(h>0)return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function tReset(){tRunning=false;clearInterval(tInterval);tRemaining=0;document.getElementById('tDisplay').textContent='00:00';document.getElementById('tStart').textContent='▶';document.getElementById('tStart').className='ctrl start'}
</script>
