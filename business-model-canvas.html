<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Model Canvas — Plan Your Business | Harz</title>
<meta name="description" content="Create a Business Model Canvas for your startup or business. 9 key building blocks to plan your strategy.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.canvas{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.block{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:12px;min-height:120px}
.block h3{font-size:13px;color:#06b6d4;margin-bottom:6px;font-weight:700}
.block textarea{width:100%;background:transparent;border:none;color:#fff;font-size:12px;resize:vertical;min-height:80px;font-family:inherit}
.block textarea:focus{outline:none}
.block textarea::placeholder{color:#333}
.big{grid-row:span 2}
.full{grid-column:span 3}
.export-btn{display:block;width:200px;margin:20px auto;background:#06b6d4;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;text-align:center}
@media(max-width:600px){.canvas{grid-template-columns:1fr}.big{grid-row:span 1}.full{grid-column:span 1}}
</style>
</head>
<body>
<h1>Business Model Canvas</h1>
<div class="canvas">
  <div class="block big"><h3>Key Partners</h3><textarea id="partners" placeholder="Suppliers, partners, alliances..."></textarea></div>
  <div class="block"><h3>Key Activities</h3><textarea id="activities" placeholder="Production, problem solving, platform..."></textarea></div>
  <div class="block big"><h3>Value Propositions</h3><textarea id="value" placeholder="What problem do you solve? What makes you different?"></textarea></div>
  <div class="block"><h3>Customer Relationships</h3><textarea id="relationships" placeholder="Self-service, automated, personal..."></textarea></div>
  <div class="block big"><h3>Customer Segments</h3><textarea id="segments" placeholder="Who are your customers?"></textarea></div>
  <div class="block"><h3>Key Resources</h3><textarea id="resources" placeholder="Physical, intellectual, human, financial..."></textarea></div>
  <div class="block"><h3>Channels</h3><textarea id="channels" placeholder="How do you reach customers?"></textarea></div>
  <div class="block"><h3>Cost Structure</h3><textarea id="costs" placeholder="Fixed costs, variable costs..."></textarea></div>
  <div class="block"><h3>Revenue Streams</h3><textarea id="revenue" placeholder="Subscription, one-time, usage fees..."></textarea></div>
</div>
<button class="export-btn" onclick="exportCanvas()">Export to WhatsApp</button>
<script>
const blocks = ['partners','activities','value','relationships','segments','resources','channels','costs','revenue'];
const titles = ['Key Partners','Key Activities','Value Propositions','Customer Relationships','Customer Segments','Key Resources','Channels','Cost Structure','Revenue Streams'];
blocks.forEach(b => {
  const saved = localStorage.getItem('bmc_' + b);
  if (saved) document.getElementById(b).value = saved;
  document.getElementById(b).addEventListener('input', function() {
    localStorage.setItem('bmc_' + b, this.value);
  });
});
function exportCanvas() {
  let text = 'Business Model Canvas\n\n';
  blocks.forEach((b, i) => {
    const v = document.getElementById(b).value || '(empty)';
    text += titles[i] + ':\n' + v + '\n\n';
  });
  window.open('https://wa.me/2348028687857?text=' + encodeURIComponent(text), '_blank');
}
</script>
</body>
</html>
