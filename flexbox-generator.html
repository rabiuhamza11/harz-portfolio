<div class="card">
<h2>Container Settings</h2>
<div class="input-group"><label>Flex Direction</label>
<div class="btn-group">
<div class="btn-opt active" onclick="set('direction','row')" data-v="row">→ Row</div>
<div class="btn-opt" onclick="set('direction','column')" data-v="column">↓ Column</div>
<div class="btn-opt" onclick="set('direction','row-reverse')" data-v="row-reverse">← Rev</div>
<div class="btn-opt" onclick="set('direction','column-reverse')" data-v="column-reverse">↑ Rev</div>
</div></div>
<div class="input-group"><label>Justify Content</label>
<div class="btn-group">
<div class="btn-opt active" onclick="set('justify','flex-start')" data-v="flex-start">Start</div>
<div class="btn-opt" onclick="set('justify','center')" data-v="center">Center</div>
<div class="btn-opt" onclick="set('justify','flex-end')" data-v="flex-end">End</div>
<div class="btn-opt" onclick="set('justify','space-between')" data-v="space-between">Between</div>
</div></div>
<div class="input-group"><label>Align Items</label>
<div class="btn-group">
<div class="btn-opt active" onclick="set('align','stretch')" data-v="stretch">Stretch</div>
<div class="btn-opt" onclick="set('align','flex-start')" data-v="flex-start">Start</div>
<div class="btn-opt" onclick="set('align','center')" data-v="center">Center</div>
<div class="btn-opt" onclick="set('align','flex-end')" data-v="flex-end">End</div>
</div></div>

<div class="btn-opt active" onclick="set('wrap','nowrap')" data-v="nowrap">No Wrap</div>
<div class="btn-opt" onclick="set('wrap','wrap')" data-v="wrap">Wrap</div>
</div></div>
<div class="slider-row"><label>Gap <span class="val" id="gapVal">8px</span></label><input type="range" id="gap" min="0" max="40" value="8" oninput="gen()"></div>
</div>

<div class="card">
<h2>Items</h2>
<div class="item-count"><button onclick="addItem()">+</button><span id="itemCount">3 items</span><button onclick="rmItem()">−</button></div>
</div>

<div class="card">
<h2>CSS Code</h2>
<div class="output"><div class="code" id="cssCode"></div></div>
<button class="btn" onclick="copy()">📋 Copy CSS</button>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Flexbox Generator
</div>

<script>
var settings={direction:'row',justify:'flex-start',align:'stretch',wrap:'nowrap'};
var items=3;

function set(prop,val){
settings[prop]=val;
document.querySelectorAll('[data-v]').forEach(function(e){
if(e.parentElement.previousElementSibling&&e.parentElement.previousElementSibling.textContent.includes(prop)){
e.classList.toggle('active',e.dataset.v===val);
}
});
// Update active state on clicked group
event.target.parentElement.querySelectorAll('.btn-opt').forEach(function(e){e.classList.remove('active')});
event.target.classList.add('active');
gen();
}

function addItem(){if(items<8){items++;gen()}}
function rmItem(){if(items>1){items--;gen()}}

function gen(){
var gap=document.getElementById('gap').value;
document.getElementById('gapVal').textContent=gap+'px';
document.getElementById('itemCount').textContent=items+' items';
var preview=document.getElementById('preview');
preview.style.flexDirection=settings.direction;
preview.style.justifyContent=settings.justify;
preview.style.alignItems=settings.align;
preview.style.flexWrap=settings.wrap;
preview.style.gap=gap+'px';
preview.innerHTML='';
for(var i=1;i<=items;i++){
var d=document.createElement('div');
d.className='flex-item';d.textContent=i;
preview.appendChild(d);
}
var css='.container {\n  display: flex;\n  flex-direction: '+settings.direction+';\n  justify-content: '+settings.justify+';\n  align-items: '+settings.align+';\n  flex-wrap: '+settings.wrap+';\n  gap: '+gap+'px;\n}\n\n.item {\n  background: linear-gradient(135deg, #00d4aa, #7c3aed);\n  color: #ffffff;\n  padding: 12px 20px;\n  border-radius: 8px;\n  font-weight: 600;\n}';
document.getElementById('cssCode').textContent=css;
}

function copy(){navigator.clipboard.writeText(document.getElementById('cssCode').textContent);alert('CSS copied!')}
gen();
</script>
