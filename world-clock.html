Harz Digital Services — RC 321424 | World Clock

<script>
var cities=[
{city:'Lagos',country:'Nigeria 🇳🇬',tz:'Africa/Lagos',offset:1},
{city:'London',country:'UK 🇬🇧',tz:'Europe/London',offset:0},
{city:'New York',country:'USA 🇺🇸',tz:'America/New_York',offset:-5},
{city:'San Francisco',country:'USA 🇺🇸',tz:'America/Los_Angeles',offset:-8},
{city:'Dubai',country:'UAE 🇦🇪',tz:'Asia/Dubai',offset:4},
{city:'Accra',country:'Ghana 🇬🇭',tz:'Africa/Accra',offset:0},
{city:'Nairobi',country:'Kenya 🇰🇪',tz:'Africa/Nairobi',offset:3},
{city:'Mumbai',country:'India 🇮🇳',tz:'Asia/Kolkata',offset:5.5},
{city:'Tokyo',country:'Japan 🇯🇵',tz:'Asia/Tokyo',offset:9},
{city:'Berlin',country:'Germany 🇩🇪',tz:'Europe/Berlin',offset:1}
];

function getTimeInTz(tz){
return new Date().toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true,weekday:'short',month:'short',day:'numeric'});
}

function updateClocks(){
var now=new Date();
// Local time
document.getElementById('localTime').textContent=now.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
document.getElementById('localDate').textContent=now.toLocaleDateString('en',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// City clocks
document.getElementById('clocks').innerHTML=cities.map(function(c){
var timeStr=new Date().toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:true});
var dateStr=new Date().toLocaleDateString('en-US',{timeZone:c.tz,weekday:'short',month:'short',day:'numeric'});
var hour=parseInt(new Date().toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',hour12:false}));
var cls=hour>=6&&hour<18?'am':'pm';
return '<div class="clock-card"><div class="clock-info"><div class="clock-city">'+c.city+'</div><div class="clock-country">'+c.country+'</div><div class="clock-day">'+dateStr+'</div></div><div class="clock-time '+cls+'">'+timeStr+'</div></div>';
}).join('');

// Meeting times
var lagosHour=parseInt(new Date().toLocaleTimeString('en-US',{timeZone:'Africa/Lagos',hour:'2-digit',hour12:false}));
var mtHtml='';
cities.slice(1).forEach(function(c){
var cityHour=parseInt(new Date().toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',hour12:false}));
var goodHour=cityHour>=8&&cityHour<20;
mtHtml+='<div class="'+(goodHour?'good-time':'bad-time')+'">'+(goodHour?'✓':'✗')+' '+c.city+': '+new Date().toLocaleTimeString('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:true})+(goodHour?' — Good time to call':' — Too early/late')+'</div>';
});
document.getElementById('meetingTimes').innerHTML=mtHtml;
}

updateClocks();
setInterval(updateClocks,1000);
</script>
