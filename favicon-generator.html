<div class="header"><h1>Favicon Generator</h1></div>

<canvas id="canvas" width="64" height="64"></canvas>
</div>

<div class="card">
<h2>Design</h2>
<div class="input-group"><label>Text (1-2 chars recommended)</label><input type="text" id="favText" value="H" maxlength="3" oninput="draw()"></div>
<div class="input-group"><label>Background Color</label><input type="color" id="bgColor" value="#00d4aa" oninput="draw()"></div>
<div class="input-group"><label>Text Color</label><input type="color" id="textColor" value="#050508" oninput="draw()"></div>
<div class="shape-tabs">
<div class="shape-tab active" onclick="setShape('square')" data-shape="square">⬛ Square</div>
<div class="shape-tab" onclick="setShape('rounded')" data-shape="rounded">🔲 Rounded</div>
<div class="shape-tab" onclick="setShape('circle')" data-shape="circle">⚪ Circle</div>
</div>

Harz Digital Services — RC 321424 | Favicon Generator

<script>
var size=64;
var shape='square';

function setSize(s){
size=s;
document.querySelectorAll('.size-tab').forEach(function(e){e.classList.toggle('active',parseInt(e.dataset.size)===s)});
draw();
}

function setShape(s){
shape=s;
document.querySelectorAll('.shape-tab').forEach(function(e){e.classList.toggle('active',e.dataset.shape===s)});
draw();
}

function draw(){
var canvas=document.getElementById('canvas');
canvas.width=size;canvas.height=size;
var ctx=canvas.getContext('2d');
var bg=document.getElementById('bgColor').value;
var text=document.getElementById('favText').value||'H';
var txtColor=document.getElementById('textColor').value;

// Background
ctx.fillStyle=bg;
if(shape==='square'){ctx.fillRect(0,0,size,size)}
else if(shape==='rounded'){var r=size*0.2;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.fill()}
else{ctx.beginPath();ctx.arc(size/2,size/2,size/2,0,Math.PI*2);ctx.fill()}

// Text
ctx.fillStyle=txtColor;
ctx.font='bold '+Math.round(size*0.65)+'px -apple-system,sans-serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(text,size/2,size/2+size*0.05);
}

function downloadPNG(s){
var c=document.createElement('canvas');
c.width=s;c.height=s;
var ctx=c.getContext('2d');
var bg=document.getElementById('bgColor').value;
var text=document.getElementById('favText').value||'H';
var txtColor=document.getElementById('textColor').value;
ctx.fillStyle=bg;
if(shape==='square'){ctx.fillRect(0,0,s,s)}
else if(shape==='rounded'){var r=s*0.2;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.fill()}
else{ctx.beginPath();ctx.arc(s/2,s/2,s/2,0,Math.PI*2);ctx.fill()}
ctx.fillStyle=txtColor;
ctx.font='bold '+Math.round(s*0.65)+'px -apple-system,sans-serif';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(text,s/2,s/2+s*0.05);
c.toBlob(function(blob){
var a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='favicon-'+s+'.png';
a.click();
});
}

draw();
</script>
