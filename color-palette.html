<body>

<span class="scheme-tab" onclick="setScheme('triadic')">Triadic</span>

Harz Digital Services — RC 321424 | Color Palette Generator
</div>

<script>
var scheme='analogous';
var colors=[];
var locked=[false,false,false,false,false];

function setScheme(s){scheme=s;document.querySelectorAll('.scheme-tab').forEach(function(e){e.classList.remove('active')});event.target.classList.add('active');generate()}

function hslToHex(h,s,l){
l/=100;s/=100;
var c=(1-Math.abs(2*l-1))*s;
var x=c*(1-Math.abs((h/60)%2-1));
var m=l-c/2;
var r,g,b;
if(h<60){r=c;g=x;b=0}
else if(h<120){r=x;g=c;b=0}
else if(h<180){r=0;g=c;b=x}
else if(h<240){r=0;g=x;b=c}
else if(h<300){r=x;g=0;b=c}
else{r=c;g=0;b=x}
r=Math.round((r+m)*255);g=Math.round((g+m)*255);b=Math.round((b+m)*255);
return'#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0')}).join('');
}

function generate(){
var baseHue=Math.floor(Math.random()*360);
var newColors=[];
for(var i=0;i<5;i++){
if(locked[i]&&colors[i]){newColors.push(colors[i]);continue}
var h,s,l;
if(scheme==='analogous'){h=(baseHue+i*30)%360;s=70;l=50+i*5}
else if(scheme==='complementary'){h=i<3?baseHue:(baseHue+180)%360;s=70;l=i%2===0?55:40}
else if(scheme==='triadic'){h=i<2?baseHue:i===2?(baseHue+120)%360:(baseHue+240)%360;s=75;l=50+i*5}
else if(scheme==='monochrome'){h=baseHue;s=30+i*10;l=25+i*15}
else{h=Math.floor(Math.random()*360);s=50+Math.random()*40;l=30+Math.random()*50}
newColors.push(hslToHex(h,s,l));
}
colors=newColors;
render();
}

function render(){
var html=colors.map(function(c,i){
return '<div class="color-col" style="background:'+c+'" onclick="copy('+i+')"><div class="color-hex">'+(locked[i]?'🔒 ':'')+c.toUpperCase()+'</div></div>';
}).join('');
document.getElementById('palette').innerHTML=html;
}

function copy(i){
navigator.clipboard.writeText(colors[i]);
alert('Copied: '+colors[i].toUpperCase());
}
function copyAll(){
navigator.clipboard.writeText(colors.join(', '));
alert('All colors copied!');
}
function lockAll(){
locked=locked.map(function(){return true});
alert('All colors locked! Click Generate to unlock.');
locked=locked.map(function(){return false});
}

generate();
</script>
