.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:3px}
.input-group input{width:100%;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.9rem}
.btn{padding:12px 24px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%}

.countdown-display{text-align:center;padding:30px 0}

.time-box .num{font-size:2rem;font-weight:800;color:#00d4aa;font-family:monospace}

.preset-btn{padding:8px 14px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#c8c8d0;font-size:.75rem;cursor:pointer}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Countdown Timer</h1><p>Track launches, deadlines & events</p></div>

<div class="card">
<h2>Set Your Countdown</h2>
<div class="preset-btns">
<button class="preset-btn" onclick="setPreset(1)">+1 Day</button>
<button class="preset-btn" onclick="setPreset(7)">+1 Week</button>
<button class="preset-btn" onclick="setPreset(30)">+1 Month</button>
<button class="preset-btn" onclick="setPreset(90)">+3 Months</button>
</div>
<div class="input-group"><label>Event Name</label><input type="text" id="eventName" value="Product Launch"></div>
<div class="input-group"><label>Target Date & Time</label><input type="datetime-local" id="targetDate"></div>
<button class="btn gen" onclick="startCountdown()">Start Countdown</button>
</div>

<div class="card" id="displayCard" style="display:none">
<div class="countdown-display">
<div class="event-name" id="displayName"></div>
<div class="time-grid">
<div class="time-box"><div class="num" id="days">00</div><div class="lbl">Days</div></div>
<div class="time-box"><div class="num" id="hours">00</div><div class="lbl">Hours</div></div>
<div class="time-box"><div class="num" id="mins">00</div><div class="lbl">Minutes</div></div>
<div class="time-box"><div class="num" id="secs">00</div><div class="lbl">Seconds</div></div>
</div>
</div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Countdown Timer
</div>

<script>
var interval=null;
// Default to 7 days from now
var def=new Date(Date.now()+7*24*60*60*1000);
var localISO=new Date(def.getTime()-def.getTimezoneOffset()*60000).toISOString().slice(0,16);
document.getElementById('targetDate').value=localISO;

function setPreset(days){
var d=new Date(Date.now()+days*24*60*60*1000);
var iso=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
document.getElementById('targetDate').value=iso;
document.getElementById('eventName').value=days+' Day Countdown';
startCountdown();
}

function startCountdown(){
var name=document.getElementById('eventName').value||'Countdown';
var target=document.getElementById('targetDate').value;
if(!target){alert('Set a date');return}
var targetTime=new Date(target).getTime();
clearInterval(interval);
document.getElementById('displayCard').style.display='block';
document.getElementById('displayName').textContent=name;

function update(){
var now=Date.now();
var diff=targetTime-now;
if(diff<=0){
clearInterval(interval);
document.getElementById('displayCard').innerHTML='<div class="ended">🎉 '+name+' has arrived! 🎉</div>';
return;
}
var d=Math.floor(diff/86400000);
var h=Math.floor(diff%86400000/3600000);
var m=Math.floor(diff%3600000/60000);
var s=Math.floor(diff%60000/1000);
document.getElementById('days').textContent=String(d).padStart(2,'0');
document.getElementById('hours').textContent=String(h).padStart(2,'0');
document.getElementById('mins').textContent=String(m).padStart(2,'0');
document.getElementById('secs').textContent=String(s).padStart(2,'0');
}
update();
interval=setInterval(update,1000);
}

startCountdown();
</script>
