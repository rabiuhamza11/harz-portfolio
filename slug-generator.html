<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Slug Generator</h1><p>Create SEO-friendly URL slugs</p></div>

<div class="card">
<h2>Generate Slug</h2>
<div class="input-group"><label>Text to Slugify</label><input type="text" id="input" value="Harz Digital Services — 259 Products & 24 Platforms!" oninput="generate()"></div>
<div class="options">
<div class="opt"><label>Separator: <select id="separator" onchange="generate()"><option value="-">Hyphen (-)</option><option value="_">Underscore (_)</option></select></label></div>
<div class="opt"><label>Lowercase</label><input type="checkbox" id="lowercase" checked onchange="generate()"></div>
<div class="opt"><label>Remove special characters</label><input type="checkbox" id="stripSpecial" checked onchange="generate()"></div>
<div class="opt"><label>Remove numbers</label><input type="checkbox" id="stripNumbers" onchange="generate()"></div>
</div>
<div class="output-slug">
<div class="slug" id="output">harz-digital-services-259-products-24-platforms</div>
<div class="copy" onclick="copyMain()">Copy</div>
</div>
</div>

<div class="card">
<h2>Batch Slugify (one per line)</h2>
<textarea id="batchInput" rows="5" style="width:100%;padding:12px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;font-family:monospace" placeholder="Enter text, one per line...">React Pro UI Kit
SaaS Starter Kit
AI Agent Boilerplate
Construction Cost Estimator
WhatsApp Bot Starter Kit</textarea>
<button class="btn" style="margin-top:10px" onclick="batchGenerate()">Generate All Slugs</button>
<div class="multi-results" id="batchResults"></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Slug Generator
</div>

<script>
function generate(){
var text=document.getElementById('input').value;
var sep=document.getElementById('separator').value;
var lower=document.getElementById('lowercase').checked;
var stripSpecial=document.getElementById('stripSpecial').checked;
var stripNumbers=document.getElementById('stripNumbers').checked;
var slug=text;
if(lower)slug=slug.toLowerCase();
if(stripNumbers)slug=slug.replace(/\d+/g,'');
if(stripSpecial)slug=slug.replace(/[^a-zA-Z0-9\u00C0-\u024F\u4e00-\u9fff]+/g,sep);
else slug=slug.replace(/\s+/g,sep);
slug=slug.replace(new RegExp(sep+'+','g'),sep).replace(new RegExp('^'+sep+'|'+sep+'$','g'),'');
document.getElementById('output').textContent=slug;
}

function batchGenerate(){
var lines=document.getElementById('batchInput').value.split('\n').filter(function(l){return l.trim()});
document.getElementById('batchResults').innerHTML=lines.map(function(line){
var slug=line.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
return '<div class="multi-item"><span class="slug">'+slug+'</span><span class="copy" onclick="copyText(\''+slug+'\')">Copy</span></div>';
}).join('');
}

function copyMain(){navigator.clipboard.writeText(document.getElementById('output').textContent);alert('Slug copied!')}
function copyText(text){navigator.clipboard.writeText(text);alert('Copied!')}
generate();
</script>
