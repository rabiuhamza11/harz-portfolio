<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Selar Quick Upload Helper — 259 Products Ready | Harz</title>
<meta name="description" content="Quick upload helper for Selar.co. All 259 products pre-loaded with copy-paste fields.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;line-height:1.5}
.top-bar{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.top-bar h1{font-size:1.1rem;color:#5c1b50}
.top-bar .count{font-size:.8rem;color:#888}
.open-selar{padding:8px 16px;background:#5c1b50;border:none;border-radius:8px;color:#fff;font-size:.85rem;cursor:pointer;text-decoration:none;white-space:nowrap}
.progress{background:rgba(255,255,255,.05);height:4px;border-radius:2px;margin-top:8px}
.progress-bar{background:linear-gradient(135deg,#5c1b50,#10b981);height:100%;border-radius:2px;transition:width .3s;width:0%}
.filters{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:50px;font-size:.8rem;white-space:nowrap;cursor:pointer}
.chip.active{background:#5c1b50;color:#fff;border-color:transparent}
.search-row{padding:10px 16px}
.search-row input{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e0e0e0;font-size:.95rem;outline:none}
.product-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin:8px 16px;transition:border-color .2s}
.product-card.uploaded{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.03)}
.product-card .num{font-size:.7rem;color:#555;margin-bottom:4px}
.product-card .title{font-size:.9rem;font-weight:600;margin-bottom:6px}
.product-card .desc{font-size:.8rem;color:#888;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-card .price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.product-card .price{color:#10b981;font-weight:bold;font-size:.9rem}
.product-card .cat{color:#666;font-size:.75rem}
.product-card .actions{display:flex;gap:6px;flex-wrap:wrap}
.copy-btn{padding:6px 10px;background:rgba(92,27,80,.2);border:1px solid rgba(92,27,80,.3);border-radius:6px;color:#c084a0;font-size:.75rem;cursor:pointer;white-space:nowrap}
.copy-btn:active{background:rgba(92,27,80,.4)}
.copy-btn.copied{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.3);color:#10b981}
.mark-uploaded{padding:6px 10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:6px;color:#10b981;font-size:.75rem;cursor:pointer;white-space:nowrap}
.mark-uploaded.done{background:rgba(16,185,129,.2)}
.load-more{text-align:center;padding:20px}
.load-more button{padding:10px 24px;background:rgba(92,27,80,.15);border:1px solid rgba(92,27,80,.3);border-radius:10px;color:#c084a0;cursor:pointer;font-size:.9rem}
.summary{padding:16px;text-align:center}
.summary .num{font-size:1.5rem;font-weight:bold;color:#10b981}
.summary .lbl{font-size:.8rem;color:#666}
.summary-row{display:flex;justify-content:center;gap:30px}
.empty{text-align:center;color:#666;padding:40px}
.fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 15px rgba(0,0,0,.3);z-index:999;text-decoration:none}
</style>
</head>
<body>
<div class="top-bar">
<div>
<h1>🛒 Selar Upload Helper</h1>
<div class="count" id="count">Loading 259 products...</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
</div>
<a href="https://selar.co/dashboard/products" target="_blank" class="open-selar">Open Selar →</a>
</div>

<div class="search-row">
<input type="text" id="search" placeholder="Search products..." oninput="filterProducts()">
</div>

<div class="filters" id="filters">
<div class="chip active" onclick="setCat('all',this)">All</div>
<div class="chip" onclick="setCat('Developer Tools',this)">Dev Tools</div>
<div class="chip" onclick="setCat('Construction Tools',this)">Construction</div>
<div class="chip" onclick="setCat('Template',this)">Templates</div>
<div class="chip" onclick="setCat('AI Prompts',this)">AI Prompts</div>
<div class="chip" onclick="setCat('AI Automation',this)">AI Auto</div>
<div class="chip" onclick="setCat('Ebook',this)">Ebooks</div>
<div class="chip" onclick="setCat('Notion OS',this)">Notion</div>
<div class="chip" onclick="setCat('Business-in-a-Box',this)">Biz-in-Box</div>
<div class="chip" onclick="setCat('Real Estate Tools',this)">Real Estate</div>
<div class="chip" onclick="setCat('Security',this)">Security</div>
<div class="chip" onclick="setCat('Music',this)">Music</div>
<div class="chip" onclick="setCat('FinTech',this)">FinTech</div>
<div class="chip" onclick="setCat('Health',this)">Health</div>
</div>

<div class="summary" id="summary" style="display:none">
<div class="summary-row">
<div><div class="num" id="uploadedCount">0</div><div class="lbl">Uploaded</div></div>
<div><div class="num" id="remainingCount">0</div><div class="lbl">Remaining</div></div>
<div><div class="num" id="totalCount">0</div><div class="lbl">Total</div></div>
</div>
</div>

<div id="productList"></div>
<div class="load-more" id="loadMore" style="display:none">
<button onclick="loadMore()">Load More</button>
</div>

<a href="https://wa.me/2348028687857" class="fab">💬</a>

<script>
let allProducts=[];
let filtered=[];
let currentCat='all';
let displayCount=20;
let uploaded=new Set();

// Load uploaded from localStorage
try{uploaded=new Set(JSON.parse(localStorage.getItem('selarUploaded')||'[]'))}catch(e){}

async function loadProducts(){
try{
const res=await fetch('https://superagent-2286fb2f.base44.app/functions/harzdmCatalog?action=products');
const data=await res.json();
if(data.ok&&data.products){
allProducts=data.products;
filtered=[...allProducts];
document.getElementById('count').textContent=allProducts.length+' products loaded';
updateSummary();
renderProducts();
}
}catch(e){
document.getElementById('productList').innerHTML='<div class="empty">Loading... If this takes too long, refresh the page.</div>';
}
}

function updateSummary(){
const total=allProducts.length;
const up=uploaded.size;
document.getElementById('uploadedCount').textContent=up;
document.getElementById('remainingCount').textContent=total-up;
document.getElementById('totalCount').textContent=total;
document.getElementById('summary').style.display='block';
document.getElementById('progressBar').style.width=(total>0?(up/total*100):0)+'%';
}

function setCat(cat,el){
currentCat=cat;
document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
filterProducts();
}

function filterProducts(){
const s=document.getElementById('search').value.toLowerCase();
filtered=allProducts.filter(p=>{
const mc=currentCat==='all'||p.category===currentCat;
const ms=!s||p.title.toLowerCase().includes(s)||(p.description||'').toLowerCase().includes(s);
return mc&&ms;
});
displayCount=20;
renderProducts();
}

function renderProducts(){
const list=document.getElementById('productList');
const toShow=filtered.slice(0,displayCount);
if(toShow.length===0){list.innerHTML='<div class="empty">No products found.</div>';document.getElementById('loadMore').style.display='none';return}
list.innerHTML=toShow.map((p,idx)=>{
const sym=p.currency==='USD'?'$':'₦';
const val=p.currency==='USD'?(p.price/100):p.price;
const isUp=uploaded.has(p.id);
const num=allProducts.indexOf(p)+1;
return '<div class="product-card'+(isUp?' uploaded':'')+'" id="card-'+p.id+'">'+
'<div class="num">Product #'+num+' of '+allProducts.length+'</div>'+
'<div class="title">'+p.title+'</div>'+
'<div class="desc">'+(p.description||'').substring(0,150)+'</div>'+
'<div class="price-row"><span class="price">'+sym+val.toLocaleString()+'</span><span class="cat">'+(p.category||'Digital')+'</span></div>'+
'<div class="actions">'+
'<button class="copy-btn" onclick="copyField(this,\'title\',\''+escapeQuotes(p.title)+'\')">Copy Title</button>'+
'<button class="copy-btn" onclick="copyField(this,\'desc\',\''+escapeQuotes((p.description||'').substring(0,500))+'\')">Copy Description</button>'+
'<button class="copy-btn" onclick="copyField(this,\'price\',\''+sym+val.toLocaleString()+'\')">Copy Price</button>'+
'<button class="copy-btn" onclick="copyField(this,\'cat\',\''+escapeQuotes(p.category||'Digital Products')+'\')">Copy Category</button>'+
(isUp?'<button class="mark-uploaded done">✓ Uploaded</button>':'<button class="mark-uploaded" onclick="markUploaded(\''+p.id+'\')">Mark Uploaded</button>')+
'</div>'+
'</div>';
}).join('');
document.getElementById('loadMore').style.display=filtered.length>displayCount?'block':'none';
}

function loadMore(){displayCount+=20;renderProducts()}

function copyField(btn,field,text){
navigator.clipboard.writeText(text).then(()=>{
btn.classList.add('copied');
const orig=btn.textContent;
btn.textContent='Copied!';
setTimeout(()=>{btn.classList.remove('copied');btn.textContent=orig},1500);
});
}

function markUploaded(id){
uploaded.add(id);
localStorage.setItem('selarUploaded',JSON.stringify([...uploaded]));
updateSummary();
renderProducts();
}

function escapeQuotes(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

loadProducts();
</script>
</body>
</html>
