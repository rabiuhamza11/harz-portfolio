<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:520px;margin:0 auto}
.header{text-align:center;padding:12px 0}
.header h1{font-size:1.2rem;color:#00d4aa}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:12px}
.preview{background:#14141e;border:2px dashed #1e1e2e;border-radius:12px;padding:16px;min-height:120px;margin-bottom:16px}
.grid-item{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;padding:14px;border-radius:8px;font-size:.8rem;font-weight:600;text-align:center}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;margin-bottom:14px}
.slider-row{margin-bottom:10px}
.slider-row label{display:flex;justify-content:space-between;font-size:.75rem;color:#c8c8d0;margin-bottom:4px}
.slider-row label .val{color:#00d4aa;font-weight:600}
.slider-row input[type=range]{width:100%;accent-color:#00d4aa}
.preset-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.preset{padding:8px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;font-size:.65rem;color:#c8c8d0;cursor:pointer;text-align:center}
.preset:hover{border-color:#00d4aa}
.output{background:#14141e;border:1px solid rgba(0,212,170,.3);border-radius:12px;padding:14px}
.output .code{font-family:monospace;font-size:.72rem;color:#00d4aa;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.btn{padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%;background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;margin-top:8px}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>CSS Grid Generator</h1></div>

<div class="preview" id="preview"></div>

<div class="card">
<h2>Grid Settings</h2>
<div class="slider-row"><label>Columns <span class="val" id="colVal">3</span></label><input type="range" id="cols" min="1" max="12" value="3" oninput="gen()"></div>
<div class="slider-row"><label>Rows <span class="val" id="rowVal">2</span></label><input type="range" id="rows" min="1" max="8" value="2" oninput="gen()"></div>
<div class="slider-row"><label>Column Gap <span class="val" id="cgapVal">8px</span></label><input type="range" id="cgap" min="0" max="40" value="8" oninput="gen()"></div>
<div class="slider-row"><label>Row Gap <span class="val" id="rgapVal">8px</span></label><input type="range" id="rgap" min="0" max="40" value="8" oninput="gen()"></div>
</div>

<div class="card">
<h2>Responsive Presets</h2>
<div class="preset-row">
<div class="preset" onclick="setResponsive('1fr')">1 Col</div>
<div class="preset" onclick="setResponsive('repeat(2, 1fr)')">2 Col</div>
<div class="preset" onclick="setResponsive('repeat(3, 1fr)')">3 Col</div>
<div class="preset" onclick="setResponsive('repeat(4, 1fr)')">4 Col</div>
<div class="preset" onclick="setResponsive('repeat(auto-fit, minmax(200px, 1fr))')">Auto-fit</div>
<div class="preset" onclick="setResponsive('1fr 2fr 1fr')">Sidebar</div>
</div>
</div>

<div class="card">
<h2>CSS Code</h2>
<div class="output"><div class="code" id="cssCode"></div></div>
<button class="btn" onclick="copy()">📋 Copy CSS</button>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Grid Generator
</div>

<script>
var customCols='';

function gen(){
var cols=document.getElementById('cols').value;
var rows=document.getElementById('rows').value;
var cgap=document.getElementById('cgap').value;
var rgap=document.getElementById('rgap').value;
document.getElementById('colVal').textContent=cols;
document.getElementById('rowVal').textContent=rows;
document.getElementById('cgapVal').textContent=cgap+'px';
document.getElementById('rgapVal').textContent=rgap+'px';

var colTpl=customCols||('repeat('+cols+', 1fr)');
var preview=document.getElementById('preview');
preview.style.display='grid';
preview.style.gridTemplateColumns=colTpl;
preview.style.gridTemplateRows='repeat('+rows+', auto)';
preview.style.columnGap=cgap+'px';
preview.style.rowGap=rgap+'px';
preview.innerHTML='';
for(var i=1;i<=cols*rows;i++){
var d=document.createElement('div');
d.className='grid-item';d.textContent=i;
preview.appendChild(d);
}

var css='.container {\n  display: grid;\n  grid-template-columns: '+colTpl+';\n  grid-template-rows: repeat('+rows+', auto);\n  column-gap: '+cgap+'px;\n  row-gap: '+rgap+'px;\n}\n\n.item {\n  background: linear-gradient(135deg, #00d4aa, #7c3aed);\n  color: #ffffff;\n  padding: 14px;\n  border-radius: 8px;\n  font-weight: 600;\n}';
document.getElementById('cssCode').textContent=css;
}

function setResponsive(tpl){
customCols=tpl;
gen();
}

function copy(){navigator.clipboard.writeText(document.getElementById('cssCode').textContent);alert('CSS copied!')}
gen();
</script>
