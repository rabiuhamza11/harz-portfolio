<script>
var themes={
'teal':['#00d4aa','#7c3aed','#22c55e','#f59e0b','#3b82f6','#ef4444','#ec4899'],
'fire':['#ef4444','#f59e0b','#fb923c','#fbbf24','#dc2626','#b91c1c','#f97316'],
'ocean':['#3b82f6','#06b6d4','#0ea5e9','#2563eb','#0891b2','#1d4ed8','#0284c7'],
'forest':['#22c55e','#16a34a','#15803d','#166534','#4ade80','#65a30d','#84cc16'],
'sunset':['#f59e0b','#ef4444','#ec4899','#fb923c','#f97316','#dc2626','#e11d48'],
'mono':['#e8e8f0','#c8c8d0','#a8a8b0','#888890','#6b6b80','#9c9ca8','#b8b8c8']
};
var currentTheme='teal';

function renderThemes(){
document.getElementById('colorThemes').innerHTML=Object.keys(themes).map(function(t){
var bg=themes[t][0];
return '<div class="color-chip '+(t===currentTheme?'active':'')+'" style="background:linear-gradient(135deg,'+themes[t][0]+','+themes[t][1]+')" onclick="setTheme(\''+t+'\')" title="'+t+'"></div>';
}).join('');
}

function setTheme(t){currentTheme=t;renderThemes();gen()}

var stopWords=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','by','is','are','was','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','can','this','that','these','those','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','as','if','then','than','so','not','no','yes','also','more','most','some','any','all','each','every','other','new','one','two','from']);

function gen(){
var text=document.getElementById('text').value;
var maxWords=parseInt(document.getElementById('maxWords').value);
var minSize=parseInt(document.getElementById('minSize').value);
var maxSize=parseInt(document.getElementById('maxSize').value);
document.getElementById('maxVal').textContent=maxWords;
document.getElementById('minVal').textContent=minSize+'px';
document.getElementById('maxFVal').textContent=maxSize+'px';

var words=text.toLowerCase().replace(/[^\w\s]/g,'').split(/\s+/).filter(function(w){
return w.length>2&&!stopWords.has(w);
});

var freq={};
words.forEach(function(w){freq[w]=(freq[w]||0)+1});

var sorted=Object.keys(freq).map(function(k){return{word:k,count:freq[k]}})
.sort(function(a,b){return b.count-a.count})
.slice(0,maxWords);

if(sorted.length===0)return;

var max=sorted[0].count;
var min=sorted[sorted.length-1].count;
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#14141e';
ctx.fillRect(0,0,canvas.width,canvas.height);

var placed=[];
var colors=themes[currentTheme];

sorted.forEach(function(item,idx){
var size=minSize+(maxSize-minSize)*((item.count-min)/(max-min||1));
ctx.font='bold '+Math.round(size)+'px -apple-system,sans-serif';
var metrics=ctx.measureText(item.word);
var w=metrics.width;
var h=size;
var color=colors[idx%colors.length];

// Find position
var tries=0,x,y,found=false;
while(tries<100&&!found){
x=Math.random()*(canvas.width-w-20)+10;
y=Math.random()*(canvas.height-h-20)+h+10;
found=true;
for(var p=0;p<placed.length;p++){
var pp=placed[p];
if(x<pp.x+pp.w+4&&x+w>pp.x-4&&y-h<pp.y+pp.h+4&&y>pp.y-4){found=false;break}
}
tries++;
}
placed.push({x:x,y:y-h,w:w,h:h});
ctx.fillStyle=color;
ctx.fillText(item.word,x,y);
});
}

function download(){
var canvas=document.getElementById('canvas');
var a=document.createElement('a');
a.href=canvas.toDataURL('image/png');
a.download='word-cloud.png';
a.click();
}

renderThemes();gen();
</script>
