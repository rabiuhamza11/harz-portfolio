<script>

],

],

{platform:"YouTube",time:"3:00 PM",content:"Rotating: tutorial / music video / trailer / lesson / tour",tags:"#HarzContent"},
{platform:"Instagram",time:"6:00 PM",content:"Rotating: carousel / poster / certificate / property / BTS",tags:"#HarzEcosystem"}
]
};

var days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function generateCalendar(){
var focus=document.getElementById('contentFocus').value;
var templates=contentTemplates[focus]||contentTemplates.mixed;
var posts=[];

// Generate 7 days x posts
for(var d=0;d<7;d++){
templates.forEach(function(t,i){
var platIdx=i%templates.length;
posts.push({
day:days[d],
dayIdx:d,
platform:t.platform,
time:t.time,
content:t.content,
tags:t.tags,
tagClass:getTagClass(t.platform)
});
});
}

document.getElementById('postCount').textContent=posts.length;

// Render calendar grid
var grid='<div class="cal-header"></div>';
days.forEach(function(day){grid+='<div class="cal-header">'+day+'</div>'});

var times=["7:00 AM","9:00 AM","12:00 PM","3:00 PM","6:00 PM","8:00 PM"];
times.forEach(function(time){
grid+='<div class="cal-time">'+time+'</div>';
days.forEach(function(day){
var slot=posts.find(function(p){return p.day===day&&p.time===time});
if(slot){
grid+='<div class="cal-slot filled"><div class="platform">'+slot.platform+'</div><div class="content">'+slot.content.substring(0,40)+'...</div></div>';
}else{
grid+='<div class="cal-slot"></div>';
}
});
});
document.getElementById('calGrid').innerHTML=grid;

// Render post list
var html='';
var currentDay='';
posts.forEach(function(p){
if(p.day!==currentDay){currentDay=p.day;html+='<div style="margin:16px 0 8px;font-size:.85rem;color:#7c3aed;font-weight:600;text-transform:uppercase">'+p.day+'</div>'}
html+='<div class="post-card"><div class="top"><span class="platform-tag '+p.tagClass+'">'+p.platform+'</span><span class="time">'+p.day+' '+p.time+'</span></div><div class="content">'+p.content+'</div><div class="hashtags">'+p.tags+'</div></div>';
});
document.getElementById('postList').innerHTML=html;

document.getElementById('calendarSection').style.display='block';
}

function getTagClass(platform){
var map={YouTube:'tag-yt',Facebook:'tag-fb',Instagram:'tag-ig',TikTok:'tag-tt',WhatsApp:'tag-wa','X (Twitter)':'tag-x'};
return map[platform]||'tag-fb';
}
</script>
