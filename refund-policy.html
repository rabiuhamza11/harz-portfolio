<p>Harz Digital Services — HI Water/Block Industry (RC 321424)</p>

<div class="highlight">
<p>Quick summary: Digital products are non-refundable due to their nature. If something is broken or doesn't work as described, we'll fix it or replace it within 48 hours. Consultations can be cancelled 24 hours before the session.</p>
</div>

<div class="section">
<h2>Digital Products (Templates, Guides, Tools)</h2>
<ul>
<li>All sales are final once the download link is sent</li>
<li>Digital products cannot be "returned" once downloaded</li>
<li>If a product is defective or doesn't match its description, contact us within 48 hours</li>
<li>We will either fix the issue or provide a replacement product of equal value</li>
<li>No cash refunds for digital products</li>
</ul>
</div>

<div class="section">
<h2>Music & Film Downloads</h2>
<ul>
<li>Non-refundable once download link is accessed</li>
<li>If the file is corrupted, we'll provide a new download link</li>
<li>Rental films: 48-hour viewing window, no refund once rental starts</li>
</ul>
</div>

<div class="section">
<h2>Consulting Services</h2>
<ul>
<li>Full refund if cancelled 24+ hours before scheduled session</li>
<li>50% refund if cancelled 12-24 hours before</li>
<li>No refund if cancelled less than 12 hours before or no-show</li>
<li>Rescheduling: free if done 24+ hours before, counts as new booking otherwise</li>
</ul>
</div>

<div class="section">
<h2>Subscriptions (Newsletter, ContentPilot)</h2>
<ul>
<li>Cancel anytime — no charges after cancellation</li>
<li>No refund for the current billing period</li>
<li>Access continues until the end of the paid period</li>
</ul>
</div>

<div class="section">

<ul>
<li>Full refund within 7 days if less than 20% of course completed</li>

<li>No refund after 14 days or 50% completion</li>
<li>Certificate not issued for refunded courses</li>
</ul>
</div>
