<style>

body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}

.header p{font-size:.8rem;color:#6b6b80;margin-top:4px}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:16px}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:3px}
.input-group label .req{color:#ef4444}
.input-group input,.input-group select{width:100%;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.85rem}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset{padding:6px 10px;background:#14141e;border:1px solid #1e1e2e;border-radius:6px;font-size:.7rem;color:#c8c8d0;cursor:pointer}
.preset:hover{border-color:#00d4aa;color:#00d4aa}

.copy-btn{margin-top:8px;padding:8px 16px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);border-radius:8px;color:#00d4aa;font-size:.8rem;cursor:pointer}
.copy-btn:active{transform:scale(.97)}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>UTM Link Builder</h1><p>Track your marketing campaigns</p></div>

<div class="card">
<h2>Build Tracking URL</h2>
<div class="input-group"><label>Website URL <span class="req">*</span></label><input type="text" id="url" value="https://rabiuhamza11.github.io/harz-portfolio/harz-store.html" placeholder="https://your-site.com/page"></div>
<div class="input-group"><label>Campaign Source <span class="req">*</span></label>
<div class="preset-row"><span class="preset" onclick="setVal('source','facebook')">Facebook</span><span class="preset" onclick="setVal('source','instagram')">Instagram</span><span class="preset" onclick="setVal('source','twitter')">Twitter</span><span class="preset" onclick="setVal('source','whatsapp')">WhatsApp</span><span class="preset" onclick="setVal('source','telegram')">Telegram</span><span class="preset" onclick="setVal('source','google')">Google</span></div>
<input type="text" id="source" value="whatsapp" placeholder="facebook, instagram, google"></div>
<div class="input-group"><label>Campaign Medium <span class="req">*</span></label>
<div class="preset-row"><span class="preset" onclick="setVal('medium','social')">Social</span><span class="preset" onclick="setVal('medium','email')">Email</span><span class="preset" onclick="setVal('medium','cpc')">Paid Ads</span><span class="preset" onclick="setVal('medium','referral')">Referral</span><span class="preset" onclick="setVal('medium','organic')">Organic</span></div>
<input type="text" id="medium" value="social" placeholder="social, email, cpc"></div>
<div class="input-group"><label>Campaign Name <span class="req">*</span></label><input type="text" id="campaign" value="summer_sale" placeholder="summer_sale, new_product"></div>
<div class="input-group"><label>Campaign Term (optional)</label><input type="text" id="term" placeholder="running_shoes"></div>
<div class="input-group"><label>Campaign Content (optional)</label><input type="text" id="content" placeholder="banner_ad_a"></div>
<div class="output" id="output"><div class="output-url" id="outputUrl">—</div><button class="copy-btn" onclick="copy()">📋 Copy URL</button></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | UTM Link Builder
</div>

<script>
function setVal(field,val){document.getElementById(field).value=val;build()}

function build(){
var url=document.getElementById('url').value.trim();
var source=document.getElementById('source').value.trim();
var medium=document.getElementById('medium').value.trim();
var campaign=document.getElementById('campaign').value.trim();
var term=document.getElementById('term').value.trim();
var content=document.getElementById('content').value.trim();
if(!url||!source||!medium||!campaign){document.getElementById('outputUrl').textContent='Fill required fields (*)';return}
var utm='?utm_source='+encodeURIComponent(source)+'&utm_medium='+encodeURIComponent(medium)+'&utm_campaign='+encodeURIComponent(campaign);
if(term)utm+='&utm_term='+encodeURIComponent(term);
if(content)utm+='&utm_content='+encodeURIComponent(content);
var full=url+(url.indexOf('?')>=0?'&':'')+utm.slice(1);
document.getElementById('outputUrl').textContent=full;
}

function copy(){
var text=document.getElementById('outputUrl').textContent;
if(text==='—'||text.startsWith('Fill'))return;
navigator.clipboard.writeText(text);
alert('UTM URL copied!');
}

['url','source','medium','campaign','term','content'].forEach(function(id){document.getElementById(id).addEventListener('input',build)});
build();
</script>
