<div class="slider-row"><label>Duration <span class="val" id="durVal">1s</span></label><input type="range" id="duration" min="0.1" max="5" step="0.1" value="1" oninput="gen()"></div>
<div class="slider-row"><label>Delay <span class="val" id="delayVal">0s</span></label><input type="range" id="delay" min="0" max="3" step="0.1" value="0" oninput="gen()"></div>
<div class="select-group"><label>Easing</label><select id="easing" onchange="gen()">
<option value="ease">ease</option>

<option value="ease-out">ease-out</option>
<option value="ease-in-out">ease-in-out</option>

<option value="cubic-bezier(0.68,-0.55,0.27,1.55)">bounce</option>
</select></div>
<div class="select-group"><label>Iteration Count</label><select id="iterations" onchange="gen()">
<option value="infinite">Infinite</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="5">5</option>

Harz Digital Services — RC 321424 | Animation Generator
</div>

<script>
var anim='bounce';
var keyframes={
bounce:'@keyframes bounce {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-20px); }\n}',
pulse:'@keyframes pulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.2); }\n}',
shake:'@keyframes shake {\n  0%, 100% { transform: translateX(0); }\n  25% { transform: translateX(-10px); }\n  75% { transform: translateX(10px); }\n}',
spin:'@keyframes spin {\n  from { transform: rotate(0deg); }\n  to { transform: rotate(360deg); }\n}',
float:'@keyframes float {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-15px); }\n}',
flip:'@keyframes flip {\n  0% { transform: rotateY(0); }\n  100% { transform: rotateY(360deg); }\n}',
swing:'@keyframes swing {\n  0%, 100% { transform: rotate(0deg); }\n  25% { transform: rotate(15deg); }\n  75% { transform: rotate(-15deg); }\n}',
slide:'@keyframes slide {\n  0% { transform: translateX(-100px); opacity: 0; }\n  100% { transform: translateX(0); opacity: 1; }\n}',
zoom:'@keyframes zoom {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.5); }\n}'
};

function setAnim(a){
anim=a;
document.querySelectorAll('.anim-tab').forEach(function(e){e.classList.toggle('active',e.dataset.a===a)});
gen();
}

function gen(){
var dur=document.getElementById('duration').value;
var delay=document.getElementById('delay').value;
var ease=document.getElementById('easing').value;
var iter=document.getElementById('iterations').value;
document.getElementById('durVal').textContent=dur+'s';
document.getElementById('delayVal').textContent=delay+'s';

var prop='bounce'===anim?'bounce':anim;
document.getElementById('animBox').style.animation=prop+' '+dur+'s '+ease+' '+delay+'s '+iter;
document.getElementById('animBox').style.animationFillMode='both';

// Inject keyframes
var styleId='animStyle';
var old=document.getElementById(styleId);
if(old)old.remove();
var s=document.createElement('style');
s.id=styleId;
s.textContent=keyframes[anim];
document.head.appendChild(s);

var css=keyframes[anim]+'\n\n.element {\n  animation: '+anim+' '+dur+'s '+ease+' '+delay+'s '+iter+';\n}';
document.getElementById('cssCode').textContent=css;
}

function copy(){navigator.clipboard.writeText(document.getElementById('cssCode').textContent);alert('CSS copied!')}
gen();
</script>
