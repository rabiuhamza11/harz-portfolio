.result{background:#14141e;border:1px solid #1e1e2e;border-radius:12px;padding:14px;margin-top:10px;font-size:.85rem;font-family:monospace;line-height:1.6;min-height:80px;word-break:break-all}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Regex Tester</h1></div>

<div class="card">
<h2>Pattern</h2>
<div class="patterns">
<span class="pattern-chip" onclick="setPattern('\\b\\w+@\\w+\\.\\w+')">Email</span>
<span class="pattern-chip" onclick="setPattern('\\b\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b')">Credit Card</span>
<span class="pattern-chip" onclick="setPattern('\\b(?:https?://|www\\.)\\S+\\b')">URL</span>
<span class="pattern-chip" onclick="setPattern('\\b\\d{3}-\\d{4}\\b')">Phone</span>
<span class="pattern-chip" onclick="setPattern('\\b[A-Z]{2,}\\b')">ALL CAPS</span>
<span class="pattern-chip" onclick="setPattern('\\b(?:080|070|081|090|091)\\d{8}\\b')">NG Phone</span>
<span class="pattern-chip" onclick="setPattern('#\\w+')">Hashtag</span>
<span class="pattern-chip" onclick="setPattern('\\b₦[\\d,]+\\b')">Naira Amount</span>
</div>
<div class="regex-row">
<input type="text" id="pattern" value="\\b\\w+@\\w+\\.\\w+" placeholder="Enter regex pattern..." oninput="test()">
<div class="flags">
<span class="flag-btn active" onclick="toggleFlag(this,'g')">g</span>
<span class="flag-btn" onclick="toggleFlag(this,'i')">i</span>
<span class="flag-btn" onclick="toggleFlag(this,'m')">m</span>
<span class="flag-btn" onclick="toggleFlag(this,'s')">s</span>
</div>
</div>
</div>

<div class="card">
<h2>Test Text</h2>
<textarea id="testText" oninput="test()">Contact us at harzco.business@gmail.com or rabiuhamza11@gmail.com. Visit https://rabiuhamza11.github.io for more. Call 08028687857. Budget: ₦1,580,000. Follow #HarzDigital on social media.</textarea>
</div>

<div class="card">
<h2>Results</h2>
<div class="match-info"><span class="l">Matches found</span><span class="v" id="matchCount">0</span></div>
<div class="match-info"><span class="l">Match groups</span><span class="v" id="groupCount">0</span></div>
<div class="result" id="highlightResult"></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Regex Tester
</div>

<script>
var flags='g';
function toggleFlag(btn,f){
if(btn.classList.contains('active')){btn.classList.remove('active');flags=flags.replace(f,'')}
else{btn.classList.add('active');flags+=f}
flags=flags.split('').filter(function(c,i,a){return a.indexOf(c)===i}).sort().join('');
test();
}

function setPattern(p){document.getElementById('pattern').value=p;test()}

function test(){
var pattern=document.getElementById('pattern').value;
var text=document.getElementById('testText').value;
var resultEl=document.getElementById('highlightResult');
var countEl=document.getElementById('matchCount');
var groupEl=document.getElementById('groupCount');

if(!pattern||!text){resultEl.innerHTML='<span class="no-match">Enter a pattern and text</span>';countEl.textContent='0';groupEl.textContent='0';return}

try{
var re=new RegExp(pattern,flags);
var matches=[];
var match;
if(flags.includes('g')){
while((match=re.exec(text))!==null){matches.push(match);if(match.index===re.lastIndex)re.lastIndex++}
}else{match=re.exec(text);if(match)matches.push(match)}

countEl.textContent=matches.length;
groupEl.textContent=matches.length>0?(matches[0].length-1):0;

if(matches.length===0){resultEl.innerHTML='<span class="no-match">No matches found</span>';return}

// Highlight
var highlighted='';
var lastEnd=0;
matches.forEach(function(m){
highlighted+=text.slice(lastEnd,m.index).replace(/</g,'&lt;').replace(/>/g,'&gt;');
highlighted+='<span class="match">'+m[0].replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>';
lastEnd=m.index+m[0].length;
});
highlighted+=text.slice(lastEnd).replace(/</g,'&lt;').replace(/>/g,'&gt;');
resultEl.innerHTML=highlighted;
}catch(e){
resultEl.innerHTML='<span class="no-match">⚠ '+e.message+'</span>';
countEl.textContent='0';groupEl.textContent='0';
}
}

test();
</script>
