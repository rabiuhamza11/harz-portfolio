<textarea id="sqlInput" oninput="format()">SELECT u.id, u.name, u.email, o.total_amount FROM users u LEFT JOIN orders o ON u.id = o.user_id WHERE u.status = 'active' AND o.total_amount > 1000 ORDER BY o.total_amount DESC LIMIT 10</textarea>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | SQL Formatter
</div>

<script>
var keywords=new Set(['SELECT','FROM','WHERE','INSERT','INTO','VALUES','UPDATE','SET','DELETE','JOIN','LEFT','RIGHT','INNER','OUTER','ON','GROUP','BY','ORDER','HAVING','LIMIT','OFFSET','AS','AND','OR','NOT','NULL','IS','IN','LIKE','BETWEEN','DISTINCT','UNION','ALL','CREATE','TABLE','ALTER','ADD','DROP','PRIMARY','KEY','FOREIGN','REFERENCES','INDEX','DEFAULT','CASCADE','CONSTRAINT','CHECK','UNIQUE','CASE','WHEN','THEN','ELSE','END','EXISTS','COUNT','SUM','AVG','MIN','MAX','WITH','RECURSIVE','RETURNING','TRUNCATE']);

function format(){
var sql=document.getElementById('sqlInput').value.trim();
if(!sql){document.getElementById('sqlOutput').innerHTML='<span class="com">Enter SQL above</span>';return}

// Format: add newlines before keywords
var formatted=sql
.replace(/\s+/g,' ')
.replace(/\b(SELECT|FROM|WHERE|INSERT INTO|INSERT|INTO|VALUES|UPDATE|SET|DELETE FROM|DELETE|LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN|JOIN|ON|GROUP BY|ORDER BY|HAVING|LIMIT|OFFSET|UNION ALL|UNION|WITH|CREATE TABLE|ALTER TABLE|DROP TABLE)\b/gi,function(m){return'\n'+m.toUpperCase()})
.replace(/\b(AND|OR)\b/gi,function(m){return'\n  '+m.toUpperCase()})
.replace(/\n+/g,'\n')
.replace(/^\n/,'')
.trim();

// Indent
var lines=formatted.split('\n');
var indent=0;
for(var i=0;i<lines.length;i++){
var l=lines[i].trim();
if(l.match(/^(FROM|WHERE|GROUP|ORDER|HAVING|LIMIT|UNION|WITH)/))indent=0;
else if(l.match(/^(AND|OR)/))indent=2;
else if(!l.match(/^(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP)/))indent=indent;
lines[i]='  '.repeat(indent)+l;
if(l.match(/^(SELECT)/))indent=1;
}
formatted=lines.join('\n');

// Highlight
var highlighted=formatted
.replace(/(--.*$)/gm,'<span class="com">$1</span>')
.replace(/'([^']*)'/g,'<span class="str">\'$1\'</span>')
.replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>')
.replace(/\b(SELECT|FROM|WHERE|INSERT|INTO|VALUES|UPDATE|SET|DELETE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|AS|AND|OR|NOT|NULL|IS|IN|LIKE|BETWEEN|DISTINCT|UNION|ALL|CREATE|TABLE|ALTER|ADD|DROP|PRIMARY|KEY|FOREIGN|REFERENCES|INDEX|DEFAULT|CASCADE|CONSTRAINT|CHECK|UNIQUE|CASE|WHEN|THEN|ELSE|END|EXISTS|WITH|RECURSIVE|RETURNING|TRUNCATE)\b/g,'<span class="kw">$1</span>')
.replace(/\b(COUNT|SUM|AVG|MIN|MAX)\b/g,'<span class="fn">$1</span>');

document.getElementById('sqlOutput').innerHTML=highlighted;
}

function copy(){
navigator.clipboard.writeText(document.getElementById('sqlOutput').textContent);
alert('SQL copied!');
}

function clearAll(){
document.getElementById('sqlInput').value='';
format();
}

format();
</script>
