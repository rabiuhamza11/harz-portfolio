<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}
.header{text-align:center;padding:16px 0}
.header h1{font-size:1.3rem;color:#00d4aa}
.header p{font-size:.8rem;color:#6b6b80;margin-top:4px}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:16px}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:3px}
.input-group input{width:100%;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.9rem}
.person-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.person-row input{flex:1;padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;color:#e8e8f0;font-size:.85rem}
.person-row .rm{color:#ef4444;cursor:pointer;font-size:1.2rem;padding:4px}
.btn{padding:10px 18px;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.btn.gen{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff;width:100%}
.btn.add{background:#14141e;border:1px solid #1e1e2e;color:#00d4aa;width:100%;margin-top:8px}
.result{text-align:center;padding:20px;background:linear-gradient(135deg,rgba(0,212,170,.05),rgba(124,58,237,.05));border:1px solid rgba(0,212,170,.2);border-radius:12px;margin-top:12px}
.result .big{font-size:1.8rem;font-weight:800;color:#00d4aa}
.result .label{font-size:.8rem;color:#6b6b80;margin-top:4px}
.owe-list{margin-top:12px}
.owe-item{display:flex;justify-content:space-between;padding:10px 14px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;margin-bottom:6px;font-size:.85rem}
.owe-item .name{color:#e8e8f0}
.owe-item .amount{font-weight:700}
.owe-item .amount.pos{color:#00d4aa}
.owe-item .amount.neg{color:#ef4444}
</style>
</head>
<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Expense Splitter</h1><p>Split bills fairly among friends</p></div>

<div class="card">
<h2>Bill Details</h2>
<div class="input-group"><label>Total Bill Amount (₦)</label><input type="number" id="totalBill" value="15000" min="0"></div>
<div class="input-group"><label>Tax/Service Charge (%)</label><input type="number" id="taxRate" value="7.5" min="0" step="0.5"></div>
<div class="input-group"><label>Tip (%)</label><input type="number" id="tipRate" value="10" min="0"></div>
</div>

<div class="card">
<h2>Who's Paying?</h2>
<div id="personList"></div>
<button class="btn add" onclick="addPerson()">+ Add Person</button>
</div>

<div class="card">
<h2>Split Options</h2>
<div style="display:flex;gap:8px;margin-bottom:8px">
<button class="btn" style="flex:1;background:rgba(0,212,170,.15);border:1px solid #00d4aa;color:#00d4aa" onclick="setMode('equal')">Equal Split</button>
<button class="btn" style="flex:1;background:#14141e;border:1px solid #1e1e2e;color:#c8c8d0" onclick="setMode('custom')">Custom Amounts</button>
</div>
<div id="customAmounts" style="display:none"></div>
<button class="btn gen" onclick="calculate()">Calculate Split</button>
</div>

<div class="result" id="result">
<div class="big" id="perPerson">₦0</div>
<div class="label" id="resultLabel">Click Calculate to split</div>
</div>

<div class="owe-list" id="oweList"></div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Expense Splitter
</div>

<script>
var people=[{name:'You'},{name:'Friend 1'},{name:'Friend 2'}];
var mode='equal';

function renderPeople(){
document.getElementById('personList').innerHTML=people.map(function(p,i){
return '<div class="person-row"><input type="text" value="'+p.name+'" oninput="people['+i+'].name=this.value" placeholder="Name">'+(people.length>2?'<span class="rm" onclick="rmPerson('+i+')">✕</span>':'')+'</div>';
}).join('');
}

function addPerson(){people.push({name:'Friend '+(people.length)});renderPeople()}
function rmPerson(i){people.splice(i,1);renderPeople()}

function setMode(m){
mode=m;
document.querySelectorAll('.card button').forEach(function(b){b.style.borderColor='#1e1e2e';b.style.color='#c8c8d0'});
if(m==='equal'){}else{}
document.getElementById('customAmounts').style.display=m==='custom'?'block':'none';
if(m==='custom'){
document.getElementById('customAmounts').innerHTML=people.map(function(p,i){
return '<div class="person-row"><span style="font-size:.8rem;color:#6b6b80;width:80px">'+p.name+'</span><input type="number" id="custom'+i+'" value="0" placeholder="Amount" style="flex:1"></div>';
}).join('');
}
}

function calculate(){
var bill=parseFloat(document.getElementById('totalBill').value)||0;
var tax=parseFloat(document.getElementById('taxRate').value)||0;
var tip=parseFloat(document.getElementById('tipRate').value)||0;
var taxAmount=bill*tax/100;
var tipAmount=bill*tip/100;
var grandTotal=bill+taxAmount+tipAmount;
var n=people.length;

if(mode==='equal'){
var perPerson=grandTotal/n;
document.getElementById('perPerson').textContent='₦'+Math.round(perPerson).toLocaleString();
document.getElementById('resultLabel').textContent='Each person pays (incl. '+tax+'% tax + '+tip+'% tip)';
document.getElementById('oweList').innerHTML=people.map(function(p){
return '<div class="owe-item"><span class="name">'+p.name+'</span><span class="amount pos">₦'+Math.round(perPerson).toLocaleString()+'</span></div>';
}).join('')+'<div class="owe-item" style="border-color:#00d4aa;margin-top:8px"><span class="name" style="font-weight:700">Total (Bill + Tax + Tip)</span><span class="amount pos">₦'+Math.round(grandTotal).toLocaleString()+'</span></div>';
}else{
var amounts=people.map(function(p,i){return parseFloat(document.getElementById('custom'+i).value)||0});
var totalCustom=amounts.reduce(function(a,b){return a+b},0);
if(totalCustom<grandTotal){
var diff=grandTotal-totalCustom;
document.getElementById('perPerson').textContent='₦'+Math.round(diff).toLocaleString();
document.getElementById('resultLabel').textContent='⚠️ Short by ₦'+Math.round(diff).toLocaleString()+' — adjust amounts';
}else{
document.getElementById('perPerson').textContent='₦'+Math.round(totalCustom).toLocaleString();
document.getElementById('resultLabel').textContent='Total collected matches bill ✓';
}
document.getElementById('oweList').innerHTML=people.map(function(p,i){
return '<div class="owe-item"><span class="name">'+p.name+'</span><span class="amount pos">₦'+Math.round(amounts[i]).toLocaleString()+'</span></div>';
}).join('');
}
}

renderPeople();calculate();
</script>
