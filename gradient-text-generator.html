<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:2rem;color:#fff;margin-bottom:8px}
header p{color:#888;font-size:0.95rem}
.tool{background:#1a1a1a;border-radius:16px;padding:30px;margin:20px 0;border:1px solid #333}
.input-group{margin-bottom:20px}
label{display:block;margin-bottom:8px;color:#aaa;font-size:0.9rem}
input,textarea,select{width:100%;padding:12px 16px;background:#0d0d0d;border:1px solid #333;border-radius:8px;color:#fff;font-size:1rem;font-family:inherit}
textarea{min-height:120px;resize:vertical}
button{padding:12px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:all .2s}
button:hover{background:#1d4ed8}
.output{margin-top:20px;padding:16px;background:#0d0d0d;border-radius:8px;min-height:60px;border:1px solid #333;white-space:pre-wrap;word-break:break-all;font-family:'Courier New',monospace;font-size:0.9rem;color:#0f0}
.copy-btn{margin-top:10px;padding:8px 16px;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem}
.copy-btn:hover{background:#444}
.info-box{background:#1e1e1e;border-left:3px solid #2563eb;padding:16px;border-radius:0 8px 8px 0;margin:20px 0;color:#ccc;font-size:0.9rem;line-height:1.6}
.back-link{text-align:center;margin:20px 0}
.back-link a{color:#2563eb;text-decoration:none;font-size:0.9rem}
footer{text-align:center;padding:30px;color:#555;font-size:0.8rem}
.chat-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;background:#2563eb;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;font-size:1.5rem;box-shadow:0 4px 12px rgba(37,99,235,.4);z-index:999;transition:transform .2s}
.chat-fab:hover{transform:scale(1.1)}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Gradient Text Generator</h1>
<p>Apply gradient effects to text with CSS background-clip. Customizable colors and directions.</p>
</header>
<div class="tool">
<div class="input-group"><label>Text Content</label><input type="text" id="text" value="Gradient Text" oninput="update()"></div><div class="input-group"><label>Color 1</label><input type="color" id="color1" value="#667eea" oninput="update()"></div><div class="input-group"><label>Color 2</label><input type="color" id="color2" value="#764ba2" oninput="update()"></div><div class="input-group"><label>Direction</label><select id="direction" onchange="update()"><option value="90deg">Left to Right</option><option value="180deg">Top to Bottom</option><option value="45deg">Diagonal</option><option value="135deg">Diagonal Reverse</option></select></div><div style="margin:20px 0;text-align:center;font-size:2.5rem;font-weight:bold" id="preview">Gradient Text</div><div class="output" id="output"></div><button class="copy-btn" onclick="copyText(document.getElementById('output').textContent,this)">Copy</button><script>function update(){const t=document.getElementById('text').value||'Text';const c1=document.getElementById('color1').value;const c2=document.getElementById('color2').value;const d=document.getElementById('direction').value;const grad=`linear-gradient(${d},${c1},${c2})`;document.getElementById('preview').textContent=t;document.getElementById('preview').style.background=grad;document.getElementById('preview').style.webkitBackgroundClip='text';document.getElementById('preview').style.webkitTextFillColor='transparent';document.getElementById('preview').style.backgroundClip='text';document.getElementById('output').textContent=`.gradient-text {\n  background: ${grad};\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n}`}</script>
</div>
<div class="back-link"><a href="https://rabiuhamza11.github.io/harz-portfolio/tools.html">← All Tools</a> | <a href="https://rabiuhamza11.github.io/harz-portfolio/index.html">← Home</a></div>
<div class="info-box">⚡ Part of the Harz Digital Services ecosystem — 300+ free online tools.</div>
<footer>© 2026 Harz Digital Services. All rights reserved.</footer>
</div>
<a href="https://rabiuhamza11.github.io/harz-portfolio/chat.html" class="chat-fab">💬</a>
<script>
function copyText(text,btn){
navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy',2000)});
}
</script>
</body>
</html>
