<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Hashtag Generator</h1><p>Generate hashtags for any topic or niche</p></div>

<div class="card">
<h2>Generate Hashtags</h2>
<div class="input-group"><label>Topic / Niche</label><input type="text" id="hashTopic" placeholder="e.g. digital products, AI, business, music"></div>
<div class="input-group"><label>Platform</label><select id="hashPlatform"><option value="all">All Platforms</option><option value="ig">Instagram (30 tags)</option><option value="tt">TikTok (5 tags)</option><option value="fb">Facebook (5 tags)</option><option value="x">X/Twitter (3 tags)</option><option value="yt">YouTube (10 tags)</option></select></div>
<button class="btn gen" onclick="generateTags()">Generate Hashtags</button>
<div class="tags-box" id="tagsBox">
<h3>Your Hashtags</h3>
<div class="tag-cloud" id="tagCloud"></div>
<div style="margin-top:12px">
<label style="font-size:.75rem;color:#6b6b80;display:block;margin-bottom:4px">Copy these hashtags:</label>
<div class="copy-area" id="copyArea"></div>
<button class="copy-btn" onclick="copyTags()">📋 Copy All</button>
</div>
<div class="legend">
<span><span class="dot" style="background:#00d4aa"></span>Niche (targeted)</span>
<span><span class="dot" style="background:#7c3aed"></span>Broad (high volume)</span>
<span><span class="dot" style="background:#3b82f6"></span>Local (Nigeria)</span>
</div>
</div>
</div>

<div class="card">
<h2>Pre-built Hashtag Sets</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<button onclick="loadSet('business')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">💼 Business</button>
<button onclick="loadSet('music')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">🎵 Music</button>
<button onclick="loadSet('film')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">🎬 Film</button>
<button onclick="loadSet('education')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">📚 Education</button>
<button onclick="loadSet('realestate')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">🏠 Real Estate</button>
<button onclick="loadSet('tech')" style="padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.8rem;cursor:pointer">💻 Tech & AI</button>
</div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Free Hashtag Generator
</div>

<script>
var tagSets={
business:{niche:['#BusinessTips','#EntrepreneurLife','#SmallBusinessTips','#BusinessGrowth','#DigitalBusiness','#OnlineBusiness'],broad:['#Business','#Entrepreneur','#Startup','#Hustle','#Success'],local:['#NigeriaBusiness','#NaijaBusiness','#MadeInNigeria','#LagosBusiness','#NigeriaEntrepreneur']},
music:{niche:['#NewMusic','#MusicRelease','#IndependentArtist','#MusicPromotion','#AfrobeatMusic'],broad:['#Music','#Afrobeat','#NaijaMusic','#NowPlaying','#MusicLover'],local:['#NigeriaMusic','#NaijaHits','#LagosMusic','#NigerianArtist','#AfrobeatNigeria']},
film:{niche:['#NollywoodFilms','#IndependentFilm','#FilmProduction','#NollywoodMovies','#AfricanCinema'],broad:['#Film','#Nollywood','#MovieNight','#Filmmaker','#Cinema'],local:['#NigeriaFilm','#NaijaMovies','#NollywoodNigeria','#LagosFilm','#AfricanFilm']},
education:{niche:['#OnlineCourse','#LearnOnline','#SkillAcquisition','#ProfessionalDevelopment','#DigitalSkills'],broad:['#Education','#Learning','#Courses','#Knowledge','#Study'],local:['#NigeriaEducation','#LearnInNigeria','#NaijaEducation','#SkillsNigeria','#DigitalSkillsNigeria']},
realestate:{niche:['#PropertyInvestment','#RealEstateTips','#HouseHunting','#PropertyListing','#InvestmentProperty'],broad:['#RealEstate','#Property','#Investment','#Housing'],local:['#NigeriaProperty','#AbujaRealEstate','#LagosProperty','#NaijaRealEstate','#NigeriaInvestment']},
tech:{niche:['#AITools','#AutomationTech','#SaaSTools','#TechStartup','#DigitalTransformation'],broad:['#AI','#Technology','#Tech','#Innovation','#Programming'],local:['#NigeriaTech','#NaijaTech','#LagosTech','#AfricaTech','#NigerianDeveloper']}
};

function generateTags(){
var topic=document.getElementById('hashTopic').value.toLowerCase().trim();
if(!topic){alert('Enter a topic or niche');return}
// Check if matches pre-built sets
var set=null;
for(var key in tagSets){if(topic.includes(key)||key.includes(topic)){set=tagSets[key];break}}
if(!set){
// Generate from topic
set={
niche:['#'+topic.replace(/\s/g,'')+'Tips','#'+topic.replace(/\s/g,'')+'Guide','#'+topic.replace(/\s/g,'')+'Tools','#'+topic.replace(/\s/g,'')+'Strategy','#'+topic.replace(/\s/g,'')+'Hacks'],
broad:['#'+topic.replace(/\s/g,''),'#'+topic.replace(/\s/g,'')+'Life','#'+topic.replace(/\s/g,'')+'Community','#Trending'+topic.charAt(0).toUpperCase()+topic.slice(1).replace(/\s/g,'')],
local:['#Nigeria'+topic.replace(/\s/g,''),'#Naija'+topic.replace(/\s/g,''),'#Lagos'+topic.replace(/\s/g,''),'#'+topic.replace(/\s/g,'')+'Nigeria']
};
}
displayTags(set);
}

function loadSet(key){displayTags(tagSets[key])}

function displayTags(set){
var platform=document.getElementById('hashPlatform').value;
var limits={ig:30,tt:5,fb:5,x:3,yt:10,all:999};
var limit=limits[platform]||30;
var allTags=set.niche.concat(set.broad).concat(set.local).slice(0,limit);
var cloud=allTags.map(function(t){
var cls=set.niche.includes(t)?'niche':set.broad.includes(t)?'broad':'local';
return '<span class="tag '+cls+'" onclick="toggleTag(this,\''+t+'\')">'+t+'</span>';
}).join('');
document.getElementById('tagCloud').innerHTML=cloud;
document.getElementById('copyArea').textContent=allTags.join(' ');
document.getElementById('tagsBox').classList.add('show');
}

function copyTags(){
var range=document.createRange();
range.selectNode(document.getElementById('copyArea'));
window.getSelection().removeAllRanges();
window.getSelection().addRange(range);
document.execCommand('copy');
alert('Hashtags copied!');
}

function toggleTag(el,tag){
el.style.opacity=el.style.opacity==='0.3'?'1':'0.3';
var current=document.getElementById('copyArea').textContent;
var tags=current.split(' ');
if(tags.includes(tag)){tags=tags.filter(function(t){return t!==tag})}
else{tags.push(tag)}
document.getElementById('copyArea').textContent=tags.join(' ');
}
</script>
</body>
