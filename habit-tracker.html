<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}
.header{text-align:center;padding:16px 0}
.header h1{font-size:1.3rem;color:#00d4aa}
.header p{font-size:.8rem;color:#6b6b80;margin-top:4px}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:16px}
.add-habit{display:flex;gap:8px;margin-bottom:16px}
.add-habit input{flex:1;padding:10px 14px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.85rem}
.add-habit select{padding:10px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.85rem}
.add-habit button{padding:10px 18px;background:linear-gradient(135deg,#00d4aa,#7c3aed);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer}
.habit-card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:14px;padding:14px;margin-bottom:10px}
.habit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.habit-name{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:8px}
.habit-emoji{font-size:1.3rem}
.habit-streak{font-size:.75rem;color:#f59e0b;font-weight:700}
.habit-del{color:#ef4444;cursor:pointer;font-size:1rem}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.65rem;cursor:pointer;transition:all .2s;border:1px solid #1e1e2e;background:#14141e;color:#6b6b80}
.day.done{background:rgba(0,212,170,.15);border-color:#00d4aa;color:#00d4aa}
.day.today{border:2px solid #7c3aed}
.day-label{text-align:center;font-size:.6rem;color:#6b6b80;margin-top:2px}
.week-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.stats{display:flex;justify-content:space-around;padding:10px;background:#14141e;border-radius:10px;margin-top:8px}
.stat{text-align:center}
.stat .num{font-size:1.1rem;font-weight:800;color:#00d4aa}
.stat .lbl{font-size:.6rem;color:#6b6b80;text-transform:uppercase}
.empty{text-align:center;padding:30px;color:#6b6b80;font-size:.85rem}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Habit Tracker</h1><p>Build better habits, one day at a time</p></div>

<div class="add-habit">
<input type="text" id="habitInput" placeholder="New habit (e.g. Read 30 min)" onkeypress="if(event.key==='Enter')addHabit()">
<select id="habitEmoji">
<option value="📖">📖 Read</option>
<option value="💪">💪 Exercise</option>
<option value="🧘">🧘 Meditate</option>
<option value="💧">💧 Water</option>
<option value="🏃">🏃 Run</option>
<option value="✍️">✍️ Write</option>
<option value="💻">💻 Code</option>
<option value="🥗">🥗 Healthy Food</option>
<option value="😴">😴 Sleep Early</option>
<option value="🎯">🎯 Other</option>
</select>
<button onclick="addHabit()">+ Add</button>
</div>

<div id="habitList"></div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Habit Tracker — saves to your browser
</div>

<script>
var habits=JSON.parse(localStorage.getItem('harz_habits')||'[]');
var today=new Date().toISOString().slice(0,10);
var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function getWeekDates(){
var d=new Date();
var day=d.getDay()||7;
var monday=new Date(d);
monday.setDate(d.getDate()-day+1);
var dates=[];
for(var i=0;i<7;i++){
var dt=new Date(monday);
dt.setDate(monday.getDate()+i);
dates.push(dt.toISOString().slice(0,10));
}
return dates;
}

function save(){localStorage.setItem('harz_habits',JSON.stringify(habits))}

function render(){
var weekDates=getWeekDates();
if(habits.length===0){
document.getElementById('habitList').innerHTML='<div class="empty">No habits yet. Add your first habit above! 🎯</div>';
return;
}
document.getElementById('habitList').innerHTML=habits.map(function(h){
var streak=0;
var d=new Date();
while(true){
var ds=d.toISOString().slice(0,10);
if(h.done&&h.done.includes(ds)){streak++;d.setDate(d.getDate()-1)}
else break;
}
var bestStreak=h.bestStreak||streak;
var totalDone=h.done?h.done.length:0;
var weekHtml=weekDates.map(function(ds){
var done=h.done&&h.done.includes(ds);
var isToday=ds===today;
return '<div class="day'+(done?' done':'')+(isToday?' today':'')+'" onclick="toggleDay('+h.id+',"'+ds+'")">'+(done?'✓':days[new Date(ds).getDay()||7-1])+'</div>';
}).join('');
return '<div class="habit-card"><div class="habit-header"><div class="habit-name"><span class="habit-emoji">'+h.emoji+'</span> '+h.name+' <span class="habit-streak">🔥 '+streak+' days</span></div><span class="habit-del" onclick="delHabit('+h.id+')">✕</span></div><div class="week-labels">'+days.map(function(d){return '<div class="day-label">'+d+'</div>'}).join('')+'</div><div class="week">'+weekHtml+'</div><div class="stats"><div class="stat"><div class="num">'+streak+'</div><div class="lbl">Streak</div></div><div class="stat"><div class="num">'+bestStreak+'</div><div class="lbl">Best</div></div><div class="stat"><div class="num">'+totalDone+'</div><div class="lbl">Total</div></div></div></div>';
}).join('');
}

function addHabit(){
var input=document.getElementById('habitInput');
var name=input.value.trim();
if(!name)return;
var emoji=document.getElementById('habitEmoji').value;
habits.push({id:Date.now(),name:name,emoji:emoji,done:[],bestStreak:0});
input.value='';save();render();
}

function toggleDay(id,ds){
var h=habits.find(function(h){return h.id===id});
if(!h)return;
if(!h.done)h.done=[];
if(h.done.includes(ds))h.done=h.done.filter(function(d){return d!==ds});
else h.done.push(ds);
var streak=0;var d=new Date();
while(true){var x=d.toISOString().slice(0,10);if(h.done.includes(x)){streak++;d.setDate(d.getDate()-1)}else break}
if(streak>h.bestStreak)h.bestStreak=streak;
save();render();
}

function delHabit(id){habits=habits.filter(function(h){return h.id!==id});save();render()}
render();
</script>
