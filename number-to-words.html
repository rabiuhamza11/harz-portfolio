<script>
var currency='NGN';
var curSymbol={NGN:'₦',USD:'$',EUR:'€',GBP:'£'};
var curName={NGN:'Naira',USD:'Dollars',EUR:'Euros',GBP:'Pounds'};
var curSingle={NGN:'Naira',USD:'Dollar',EUR:'Euro',GBP:'Pound'};
var curKobo={NGN:'Kobo',USD:'Cent',EUR:'Cent',GBP:'Pence'};

function setCur(c){currency=c;document.querySelectorAll('.ctab').forEach(function(e,i){e.classList.toggle('active',['NGN','USD','EUR','GBP'][i]===c)});convert()}
function setNum(n){document.getElementById('num').value=n;convert()}

function numToWords(num){
if(num===0)return'Zero';
var ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
var tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
var scales=['','Thousand','Million','Billion','Trillion'];

function threeDigits(n){
var w='';
if(n>=100){w+=ones[Math.floor(n/100)]+' Hundred';n%=100;if(n>0)w+=' and '}
if(n>=20){w+=tens[Math.floor(n/10)];if(n%10>0)w+='-'+ones[n%10]}
else if(n>0){w+=ones[n]}
return w;
}

var intPart=Math.floor(num);
var decPart=Math.round((num-intPart)*100);
var words='';
var scaleIdx=0;
while(intPart>0){
var chunk=intPart%1000;
if(chunk>0){
var chunkWords=threeDigits(chunk);
if(scaleIdx>0)chunkWords+=' '+scales[scaleIdx];
words=chunkWords+(words?' '+words:'');
}
intPart=Math.floor(intPart/1000);
scaleIdx++;
}
if(decPart>0){words+=' '+curName[currency]+' and '+threeDigits(decPart)+' '+curKobo[currency]}
else{words+=' '+curName[currency]}
return words;
}

function convert(){
var num=parseFloat(document.getElementById('num').value)||0;
var words=numToWords(num);
document.getElementById('words').textContent=words;
document.getElementById('formatted').textContent=curSymbol[currency]+num.toLocaleString();
}

function copy(){
navigator.clipboard.writeText(document.getElementById('words').textContent);
alert('Words copied!');
}

convert();
</script>
