<script>
function generate(){
var n=document.getElementById('sigName').value;
var t=document.getElementById('sigTitle').value;
var c=document.getElementById('sigCompany').value;
var p=document.getElementById('sigPhone').value;
var e=document.getElementById('sigEmail').value;
var w=document.getElementById('sigWebsite').value;
var wa=document.getElementById('sigWa').value;
var col=document.getElementById('sigColor').value;

var html='<div class="sig-name" style="color:'+col+'">'+n+'</div>';
html+='<div class="sig-title">'+t+'</div>';
html+='<div class="sig-divider" style="background:'+col+'"></div>';
html+='<div class="sig-company" style="color:'+col+'">'+c+'</div>';
html+='<div class="sig-contact">';
html+='📞 '+p+'<br>';
html+='✉️ <a href="mailto:'+e+'">'+e+'</a><br>';
html+='🌐 <a href="https://'+w+'">'+w+'</a><br>';
html+='💬 <a href="https://'+wa+'">WhatsApp</a> | CAC RC 321424';
html+='</div>';

document.getElementById('preview').innerHTML=html;
}

function copySig(){
var preview=document.getElementById('preview');
var range=document.createRange();
range.selectNode(preview);
window.getSelection().removeAllRanges();
window.getSelection().addRange(range);
document.execCommand('copy');
alert('Signature copied! Paste it in Gmail Settings > Signature');
}

generate();
</script>
