<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}

.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
textarea{width:100%;min-height:100px;padding:14px;background:#14141e;border:1px solid #1e1e2e;border-radius:12px;color:#e8e8f0;font-size:.85rem;font-family:monospace;line-height:1.6;resize:vertical}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn{padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:.85rem}
.btn.encode{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff}
.btn.decode{background:#14141e;border:1px solid #1e1e2e;color:#c8c8d0}
.btn.copy{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:#00d4aa}
.samples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sample{padding:6px 10px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px;font-size:.7rem;color:#c8c8d0;cursor:pointer}
.sample:hover{border-color:#00d4aa;color:#00d4aa}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>URL Encoder/Decoder</h1><p>Percent-encode your URLs</p></div>

<div class="card">
<h2>Input</h2>
<div class="samples">
<span class="sample" onclick="setInput('https://wa.me/2348028687857?text=Hi Magani')">WhatsApp Link</span>
<span class="sample" onclick="setInput('search?q=Harz Digital Services & price < 5000')">Search Query</span>
<span class="sample" onclick="setInput('https://api.example.com/users?name=Rabiu Hamza&role=admin')">API URL</span>
</div>
<textarea id="input" placeholder="Enter URL or text to encode...">https://wa.me/2348028687857?text=Hi Magani, I want to buy a product</textarea>
<div class="btn-row">
<button class="btn encode" onclick="encode()">🔒 Encode</button>
<button class="btn decode" onclick="decode()">🔓 Decode</button>
</div>
</div>

<div class="card">
<h2>Output</h2>
<textarea id="output" placeholder="Result..." style="min-height:100px" readonly></textarea>
<div class="btn-row">
<button class="btn copy" onclick="copy()">📋 Copy</button>
<button class="btn copy" onclick="document.getElementById('input').value='';document.getElementById('output').value=''" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444">Clear</button>
</div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | URL Encoder/Decoder
</div>

<script>
function setInput(text){document.getElementById('input').value=text;encode()}

function encode(){
var input=document.getElementById('input').value;
document.getElementById('output').value=encodeURIComponent(input);
}

function decode(){
var input=document.getElementById('input').value;
try{document.getElementById('output').value=decodeURIComponent(input)}
catch(e){alert('Invalid URL encoding')}
}

function copy(){
var text=document.getElementById('output').value;
if(!text)return;
navigator.clipboard.writeText(text);
alert('Copied!');
}

encode();
</script>
