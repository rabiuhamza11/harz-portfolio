<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Zone Converter — Global Meeting Planner | Harz</title>
<meta name="description" content="Convert time across global time zones. Plan meetings across Lagos, London, New York, Tokyo, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.converter{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px}
.converter label{font-size:13px;color:#a3a3a3;margin-bottom:4px;display:block}
.converter input,.converter select{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:8px;font-size:15px;margin-bottom:8px}
.times{display:grid;gap:8px}
.time-row{display:flex;justify-content:space-between;align-items:center;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:10px;padding:12px}
.time-city{font-weight:700;font-size:14px}
.time-zone{font-size:11px;color:#555}
.time-value{font-size:18px;font-weight:800;color:#06b6d4}
.today{font-size:11px;color:#a3a3a3;margin-top:2px}
</style>
</head>
<body>
<h1>Time Zone Converter</h1>
<div class="app">
  <div class="converter">
    <label>Your Time Zone</label>
    <select id="fromZone" onchange="convert()">
      <option value="UTC+1">Lagos (WAT, UTC+1)</option>
      <option value="UTC+0">London (GMT, UTC+0)</option>
      <option value="UTC-5">New York (EST, UTC-5)</option>
      <option value="UTC-8">Los Angeles (PST, UTC-8)</option>
      <option value="UTC+5:30">Mumbai (IST, UTC+5:30)</option>
      <option value="UTC+8">Beijing/Singapore (UTC+8)</option>
      <option value="UTC+9">Tokyo (JST, UTC+9)</option>
      <option value="UTC+2">Cairo (EET, UTC+2)</option>
      <option value="UTC-3">Buenos Aires (UTC-3)</option>
    </select>
    <label>Enter Time</label>
    <input type="time" id="timeInput" value="12:00" oninput="convert()">
  </div>
  <div class="times" id="times"></div>
</div>
<script>
const ZONES=[
  {city:'Lagos',offset:1,tz:'WAT'},
  {city:'London',offset:0,tz:'GMT'},
  {city:'New York',offset:-5,tz:'EST'},
  {city:'Los Angeles',offset:-8,tz:'PST'},
  {city:'Mumbai',offset:5.5,tz:'IST'},
  {city:'Singapore',offset:8,tz:'SGT'},
  {city:'Tokyo',offset:9,tz:'JST'},
  {city:'Dubai',offset:4,tz:'GST'},
  {city:'Cairo',offset:2,tz:'EET'},
  {city:'Berlin',offset:1,tz:'CET'},
  {city:'Sydney',offset:10,tz:'AEDT'},
];
function parseOffset(s){s=s.replace('UTC','');const n=parseFloat(s);return isNaN(n)?0:n;}
function convert(){
  const fromOffset=parseOffset(document.getElementById('fromZone').value);
  const time=document.getElementById('timeInput').value;
  const [h,m]=time.split(':').map(Number);
  const fromMinutes=h*60+m;
  document.getElementById('times').innerHTML=ZONES.map(z=>{
    const diff=(z.offset-fromOffset)*60;
    let toMinutes=(fromMinutes+diff)%(24*60);
    if(toMinutes<0)toMinutes+=24*60;
    const th=Math.floor(toMinutes/60);
    const tm=toMinutes%60;
    const ampm=th>=12?'PM':'AM';
    const th12=th%12||12;
    const dayChange=Math.floor((fromMinutes+diff)/(24*60));
    const dayLabel=dayChange>0?'+1 day':dayChange<0?'-1 day':'Today';
    return `<div class="time-row"><div><div class="time-city">${z.city}</div><div class="time-zone">${z.tz} · UTC${z.offset>=0?'+':''}${z.offset}</div></div><div style="text-align:right"><div class="time-value">${th12}:${String(tm).padStart(2,'0')} ${ampm}</div><div class="today">${dayLabel}</div></div></div>`;
  }).join('');
}
convert();
</script>
</body>
</html>
