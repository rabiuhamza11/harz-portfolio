.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:4px}

.input-row input:focus{border-color:#00d4aa;outline:none}

.btn{padding:12px 24px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%;background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Password Strength Checker</h1><p>Test and generate secure passwords</p></div>

<div class="card">
<h2>Check Your Password</h2>
<div class="input-row">
<input type="text" id="pwd" placeholder="Enter a password to check..." oninput="checkStrength()">
<button class="toggle-btn" onclick="toggleVis()">👁</button>
</div>
<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
<div class="strength-label" id="strengthLabel">Enter a password</div>
<div class="checks" id="checks"></div>
<div class="crack-time">
<div class="time" id="crackTime">—</div>
<div class="lbl">Estimated time to crack</div>
</div>
</div>

<div class="card">
<h2>Generate Strong Password</h2>
<div class="gen-length"><label>Length:</label><input type="range" id="genLen" min="8" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()"><span class="val" id="lenVal">16</span></div>
<div class="gen-options">
<label class="gen-opt"><input type="checkbox" id="useUpper" checked onchange="generate()"> A-Z Upper</label>
<label class="gen-opt"><input type="checkbox" id="useLower" checked onchange="generate()"> a-z Lower</label>
<label class="gen-opt"><input type="checkbox" id="useNums" checked onchange="generate()"> 0-9 Numbers</label>
<label class="gen-opt"><input type="checkbox" id="useSym" checked onchange="generate()"> !@# Symbols</label>
</div>
<button class="btn" onclick="generate()">🎲 Generate Password</button>
<div class="generated" id="generated">—</div>
<button class="copy-btn" onclick="copyGen()">📋 Copy Password</button>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Password Security Tool — passwords never leave your device
</div>

<script>
function toggleVis(){var inp=document.getElementById('pwd');inp.type=inp.type==='password'?'text':'password'}

function checkStrength(){
var pwd=document.getElementById('pwd').value;
var checks=[
{name:'At least 8 characters',pass:pwd.length>=8},
{name:'At least 12 characters',pass:pwd.length>=12},
{name:'Contains uppercase (A-Z)',pass:/[A-Z]/.test(pwd)},
{name:'Contains lowercase (a-z)',pass:/[a-z]/.test(pwd)},
{name:'Contains numbers (0-9)',pass:/[0-9]/.test(pwd)},
{name:'Contains symbols (!@#)',pass:/[^A-Za-z0-9]/.test(pwd)},
{name:'No common patterns',pass:!/(password|12345|qwerty|admin|abc)/i.test(pwd)},
{name:'No repeated chars (aaa)',pass:!/(.)\1{2,}/.test(pwd)}
];
var passed=checks.filter(function(c){return c.pass}).length;
var score=pwd.length===0?0:Math.min(100,Math.round((passed/checks.length)*100)+(pwd.length>=16?20:0)-50);

var fill=document.getElementById('strengthFill');
var label=document.getElementById('strengthLabel');
if(pwd.length===0){fill.style.width='0';label.textContent='Enter a password';label.style.color='#6b6b80';document.getElementById('crackTime').textContent='—';document.getElementById('checks').innerHTML='';return}

if(score<30){fill.style.background='#ef4444';label.textContent='Weak';label.style.color='#ef4444'}
else if(score<60){fill.style.background='#f59e0b';label.textContent='Fair';label.style.color='#f59e0b'}
else if(score<80){fill.style.background='#22c55e';label.textContent='Good';label.style.color='#22c55e'}
else{fill.style.background='#00d4aa';label.textContent='Strong!';label.style.color='#00d4aa'}
fill.style.width=score+'%';

document.getElementById('checks').innerHTML=checks.map(function(c){
return '<div class="check-item '+(c.pass?'pass':'fail')+'"><span class="icon">'+(c.pass?'✓':'✗')+'</span>'+c.name+'</div>';
}).join('');

// Crack time estimate
var charset=0;
if(/[a-z]/.test(pwd))charset+=26;
if(/[A-Z]/.test(pwd))charset+=26;
if(/[0-9]/.test(pwd))charset+=10;
if(/[^A-Za-z0-9]/.test(pwd))charset+=32;
var combos=Math.pow(charset||1,pwd.length);
var seconds=combos/1e10; // 10 billion guesses per second
var ct;
if(seconds<1)ct='< 1 second';
else if(seconds<60)ct=Math.round(seconds)+' seconds';
else if(seconds<3600)ct=Math.round(seconds/60)+' minutes';
else if(seconds<86400)ct=Math.round(seconds/3600)+' hours';
else if(seconds<31536000)ct=Math.round(seconds/86400)+' days';
else if(seconds<31536000*100)ct=Math.round(seconds/31536000)+' years';
else if(seconds<31536000*1e6)ct=Math.round(seconds/31536000/1000)+'K years';
else if(seconds<31536000*1e9)ct=Math.round(seconds/31536000/1e6)+'M years';
else ct='> 1 billion years';
document.getElementById('crackTime').textContent=ct;
}

function generate(){
var len=parseInt(document.getElementById('genLen').value)||16;
var upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
var lower='abcdefghijklmnopqrstuvwxyz';
var nums='0123456789';
var sym='!@#$%^&*()_+-=[]{}|;:,.<>?';
var pool='';
if(document.getElementById('useUpper').checked)pool+=upper;
if(document.getElementById('useLower').checked)pool+=lower;
if(document.getElementById('useNums').checked)pool+=nums;
if(document.getElementById('useSym').checked)pool+=sym;
if(!pool){document.getElementById('generated').textContent='Select at least one option';return}
var pwd='';
for(var i=0;i<len;i++)pwd+=pool[Math.floor(Math.random()*pool.length)];
document.getElementById('generated').textContent=pwd;
document.getElementById('pwd').value=pwd;
checkStrength();
}

function copyGen(){
navigator.clipboard.writeText(document.getElementById('generated').textContent);
alert('Password copied!');
}

generate();
</script>
