<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphism UI Generator | Harz</title>
<meta name="description" content="Generate neumorphism (soft UI) CSS effects. Soft shadows, extruded and pressed states.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.app{grid-template-columns:1fr}}
.controls{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.control{margin-bottom:10px}
.control label{font-size:12px;color:#a3a3a3;margin-bottom:3px;display:block}
.control input[type="range"]{width:100%}
.control input[type="color"]{width:100%;height:36px;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;background:#1c1c1c}
.control .val{font-size:12px;color:#3b82f6;font-weight:700;float:right}
.mode-btns{display:flex;gap:6px;margin-bottom:10px}
.mode-btn{flex:1;background:#1c1c1c;border:1px solid #2a2a2a;color:#a3a3a3;padding:6px;border-radius:6px;text-align:center;font-size:12px;cursor:pointer}
.mode-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.preview{border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;padding:30px;transition:background 0.1s}
.neu{width:120px;height:120px;border-radius:20px;transition:all 0.1s}
.code{grid-column:1/-1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:#3b82f6;word-break:break-all;white-space:pre-wrap}
.copy-btn{grid-column:1/-1;background:#3b82f6;color:#fff;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<h1>Neumorphism Generator</h1>
<div class="app">
  <div class="controls">
    <div class="mode-btns">
      <div class="mode-btn active" onclick="setMode('flat',this)">Flat</div>
      <div class="mode-btn" onclick="setMode('pressed',this)">Pressed</div>
    </div>
    <div class="control"><label>BG Color</label><input type="color" id="bgColor" value="#e0e0e0" oninput="update()"></div>
    <div class="control"><label>Shadow Distance <span class="val" id="distVal">10px</span></label><input type="range" id="dist" min="0" max="30" value="10" oninput="update()"></div>
    <div class="control"><label>Shadow Blur <span class="val" id="blurVal">20px</span></label><input type="range" id="blur" min="0" max="50" value="20" oninput="update()"></div>
    <div class="control"><label>Light Source</label><select id="light" onchange="update()"><option value="tl">Top Left</option><option value="tr">Top Right</option><option value="bl">Bottom Left</option><option value="br">Bottom Right</option></select></div>
    <div class="control"><label>Radius <span class="val" id="rVal">20px</span></label><input type="range" id="radius" min="0" max="60" value="20" oninput="update()"></div>
    <div class="control"><label>Size <span class="val" id="szVal">120px</span></label><input type="range" id="size" min="60" max="200" value="120" oninput="update()"></div>
  </div>
  <div class="preview" id="preview"><div class="neu" id="neu"></div></div>
  <div class="code" id="code"></div>
  <button class="copy-btn" onclick="copyCode()">Copy CSS</button>
</div>
<script>
let mode='flat';
function setMode(m,el){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');update();}
function lighten(hex,amt){let r=parseInt(hex.slice(1,3),16)+amt,g=parseInt(hex.slice(3,5),16)+amt,b=parseInt(hex.slice(5,7),16)+amt;r=Math.min(255,Math.max(0,r));g=Math.min(255,Math.max(0,g));b=Math.min(255,Math.max(0,b));return `rgb(${r},${g},${b})`;}
function darken(hex,amt){return lighten(hex,-amt);}
function update(){
  const bg=document.getElementById('bgColor').value;
  const d=parseInt(document.getElementById('dist').value);
  const bl=parseInt(document.getElementById('blur').value);
  const light=document.getElementById('light').value;
  const r=document.getElementById('radius').value;
  const sz=document.getElementById('size').value;
  const preview=document.getElementById('preview');
  const neu=document.getElementById('neu');
  preview.style.background=bg;
  neu.style.background=bg;
  neu.style.width=sz+'px';
  neu.style.height=sz+'px';
  neu.style.borderRadius=r+'px';
  const lightColor=lighten(bg,15);
  const darkColor=darken(bg,15);
  let dx=d,dy=d;
  if(light==='tr'){dx=-d;dy=d;}
  if(light==='bl'){dx=d;dy=-d;}
  if(light==='br'){dx=-d;dy=-d;}
  let shadow;
  if(mode==='pressed'){shadow=`inset ${dx}px ${dy}px ${bl}px ${darkColor}, inset ${-dx}px ${-dy}px ${bl}px ${lightColor}`;}
  else{shadow=`${dx}px ${dy}px ${bl}px ${darkColor}, ${-dx}px ${-dy}px ${bl}px ${lightColor}`;}
  neu.style.boxShadow=shadow;
  document.getElementById('distVal').textContent=d+'px';
  document.getElementById('blurVal').textContent=bl+'px';
  document.getElementById('rVal').textContent=r+'px';
  document.getElementById('szVal').textContent=sz+'px';
  document.getElementById('code').textContent=`background: ${bg};\nbox-shadow: ${shadow};\nborder-radius: ${r}px;`;
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent);alert('Neumorphism CSS copied!');}
update();
</script>
</body>
</html>
