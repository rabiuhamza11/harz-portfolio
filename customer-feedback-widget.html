<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Feedback Widget — Collect Reviews & Ratings | Harz</title>
<meta name="description" content="Collect customer feedback, ratings, and reviews. Simple embeddable feedback widget for Nigerian businesses.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:500px;margin:0 auto}
.feedback-form{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:24px;margin-bottom:20px}
.rating{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.star{font-size:36px;cursor:pointer;color:#2a2a2a;transition:all 0.2s}
.star.active,.star:hover{color:#fbbf24}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;margin-bottom:4px;color:#a3a3a3}
.input-group input,.input-group textarea{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit}
.input-group textarea{resize:vertical;min-height:80px}
.btn{width:100%;background:#f59e0b;color:#000;padding:14px;border-radius:8px;font-weight:700;font-size:16px;border:none;cursor:pointer}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:800;color:#f59e0b}
.stat .label{font-size:11px;color:#a3a3a3}
.reviews{display:grid;gap:10px}
.review{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-name{font-weight:600;font-size:14px}
.review-stars{color:#fbbf24;font-size:13px}
.review-text{font-size:13px;color:#a3a3a3}
.review-date{font-size:11px;color:#555;margin-top:4px}
.empty{text-align:center;color:#555;padding:20px}
</style>
</head>
<body>
<h1>Customer Feedback</h1>
<div class="app">
  <div class="stats">
    <div class="stat"><div class="num" id="avgRating">0.0</div><div class="label">Avg Rating</div></div>
    <div class="stat"><div class="num" id="totalReviews">0</div><div class="label">Reviews</div></div>
    <div class="stat"><div class="num" id="satisfied">0%</div><div class="label">Satisfied</div></div>
  </div>
  <div class="feedback-form">
    <div class="rating" id="rating">
      <span class="star" onclick="setRating(1)">★</span>
      <span class="star" onclick="setRating(2)">★</span>
      <span class="star" onclick="setRating(3)">★</span>
      <span class="star" onclick="setRating(4)">★</span>
      <span class="star" onclick="setRating(5)">★</span>
    </div>
    <div class="input-group"><label>Your Name</label><input type="text" id="name" placeholder="Enter your name"></div>
    <div class="input-group"><label>Your Review</label><textarea id="reviewText" placeholder="Tell us about your experience..."></textarea></div>
    <button class="btn" onclick="submitReview()">Submit Feedback</button>
  </div>
  <div class="reviews" id="reviewList"></div>
</div>
<script>
let rating = 0;
let reviews = JSON.parse(localStorage.getItem('feedbackReviews') || '[]');
function setRating(n) {
  rating = n;
  document.querySelectorAll('.star').forEach((s, i) => {
    s.classList.toggle('active', i < n);
  });
}
function submitReview() {
  const name = document.getElementById('name').value.trim();
  const text = document.getElementById('reviewText').value.trim();
  if (!rating) { alert('Please select a rating'); return; }
  if (!name) { alert('Please enter your name'); return; }
  reviews.unshift({name, text: text || 'No comment', rating, date: new Date().toLocaleDateString('en-NG')});
  localStorage.setItem('feedbackReviews', JSON.stringify(reviews));
  document.getElementById('name').value = '';
  document.getElementById('reviewText').value = '';
  setRating(0);
  render();
}
function render() {
  const avg = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1) : '0.0';
  const satisfied = reviews.length ? Math.round(reviews.filter(r => r.rating >= 4).length / reviews.length * 100) : 0;
  document.getElementById('avgRating').textContent = avg;
  document.getElementById('totalReviews').textContent = reviews.length;
  document.getElementById('satisfied').textContent = satisfied + '%';
  if (reviews.length === 0) {
    document.getElementById('reviewList').innerHTML = '<div class="empty">No reviews yet. Be the first!</div>';
    return;
  }
  document.getElementById('reviewList').innerHTML = reviews.map(r => `
    <div class="review">
      <div class="review-header"><span class="review-name">${r.name}</span><span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div>
      <div class="review-text">${r.text}</div>
      <div class="review-date">${r.date}</div>
    </div>
  `).join('');
}
render();
</script>
</body>
</html>
