<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:500px;margin:0 auto}
.header{text-align:center;padding:16px 0}
.header h1{font-size:1.3rem;color:#00d4aa}
.header p{font-size:.8rem;color:#6b6b80;margin-top:4px}
.nav-back{display:inline-block;padding:8px 16px;border-radius:8px;background:#0e0e16;border:1px solid #1e1e2e;color:#6b6b80;text-decoration:none;font-size:.8rem;margin-bottom:16px}
.platform-tabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{flex:1;padding:10px 4px;text-align:center;background:#0e0e16;border:1px solid #1e1e2e;border-radius:8px;font-size:.7rem;color:#6b6b80;cursor:pointer}
.ptab.active{border-color:#00d4aa;color:#00d4aa;background:rgba(0,212,170,.05)}
.card{background:#0e0e16;border:1px solid #1e1e2e;border-radius:16px;padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:.75rem;color:#6b6b80;margin-bottom:4px}
.input-group input,.input-group select{width:100%;padding:12px;background:#14141e;border:1px solid #1e1e2e;border-radius:10px;color:#e8e8f0;font-size:.9rem}
.btn{padding:12px 24px;border:none;border-radius:10px;font-weight:600;cursor:pointer;width:100%}
.btn.gen{background:linear-gradient(135deg,#00d4aa,#7c3aed);color:#fff}
.bio-result{background:#14141e;border:1px solid rgba(0,212,170,.2);border-radius:12px;padding:16px;margin-top:12px;display:none}
.bio-result.show{display:block}
.bio-result h3{font-size:.8rem;color:#00d4aa;margin-bottom:8px}
.bio-text{font-size:.9rem;color:#e8e8f0;line-height:1.6;white-space:pre-wrap}
.bio-copy{margin-top:10px;padding:8px 16px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);border-radius:8px;color:#00d4aa;font-size:.8rem;cursor:pointer}
.char-count{font-size:.7rem;color:#6b6b80;margin-top:6px;text-align:right}
</style>

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Social Media Bio Generator</h1><p>Create catchy bios in seconds</p></div>

<div class="platform-tabs">
<div class="ptab active" onclick="setPlatform('ig',150)">📷 Instagram</div>
<div class="ptab" onclick="setPlatform('x',160)">🐦 X/Twitter</div>
<div class="ptab" onclick="setPlatform('tt',80)">🎵 TikTok</div>
<div class="ptab" onclick="setPlatform('li',220)">💼 LinkedIn</div>
<div class="ptab" onclick="setPlatform('fb',101)">📘 Facebook</div>
</div>

<div class="card">
<h2>Generate Bio</h2>
<div class="input-group"><label>Your Name / Brand</label><input type="text" id="bioName" placeholder="e.g. Harz Digital Services"></div>
<div class="input-group"><label>What You Do</label><input type="text" id="bioWork" placeholder="e.g. sell digital products & tools"></div>
<div class="input-group"><label>Your Vibe</label><select id="bioVibe">
<option value="professional">Professional</option>
<option value="creative">Creative & Fun</option>
<option value="minimal">Minimal & Clean</option>
<option value="entrepreneur">Hustler/Entrepreneur</option>
<option value="luxury">Luxury & Premium</option>
</select></div>
<div class="input-group"><label>Location (optional)</label><input type="text" id="bioLoc" placeholder="e.g. Lagos, Nigeria"></div>
<button class="btn gen" onclick="generate()">Generate 3 Bios</button>
<div class="bio-result" id="bioResult">
<div id="bios"></div>
</div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Social Media Bio Generator
</div>

<script>
var platform='ig';var maxChars=150;
function setPlatform(p,mc){platform=p;maxChars=mc;document.querySelectorAll('.ptab').forEach((e,i)=>{e.classList.toggle('active',['ig','x','tt','li','fb'][i]===p)});}

function generate(){
var name=document.getElementById('bioName').value||'Your Brand';
var work=document.getElementById('bioWork').value||'business';
var vibe=document.getElementById('bioVibe').value;
var loc=document.getElementById('bioLoc').value;

var emojis={professional:'💼',creative:'✨',minimal:'▪️',entrepreneur:'🚀',luxury:'💎'};
var e=emojis[vibe];

var templates={
professional:[
`${e} ${name}\n${work} | CAC RC 321424\n${loc?loc+' | ':''}Quality you can trust\n📩 DM for orders/inquiries`,
`${name} ${e}\n${work}\n${loc?loc+' | ':''}Trusted by 1000+ customers\n📩 WhatsApp in bio\n${loc?loc:''}`,
`${e} ${name}\n${work}\n${loc?loc+' | ':''}RC 321424 | Since 2014\n📩 Contact us today`
],
creative:[
`${e} ${name} ${e}\nWe ${work} & we love it!\n${loc?loc+' 🌍 ':''}DM for orders 💬\n${e} Fast delivery ${e}`,
`${name} ${e}\nTurning ${work} into magic ✨\n${loc?loc+' ':''}📩 Slide into our DMs\n#SmallBusiness #NaijaBrand`,
`${e} ${name} ${e}\n${work}\n${loc?loc+' ':''}Just a brand doing our thing 🚀\n📩 DM to order`
],
minimal:[
`${name}\n${work}${loc?'\n'+loc:''}\n📩 DM to order`,
`${name} — ${work}\n${loc?loc+' | ':''}RC 321424\n📩 Contact us`,
`${e} ${name}\n${work}\n${loc?loc:''}\n📩 Order via DM`
],
entrepreneur:[
`${e} ${name}\n${work}\n${loc?loc+' ':''}Building the future 💪\n📩 DM for orders\n🚀 Hustle. Grind. Deliver.`,
`${name} ${e}\n${work} | ${loc?loc+' | ':''}CAC RC 321424\nBuilding since 2014 💪\n📩 WhatsApp in bio`,
`${e} ${name}\nWe ${work}\n${loc?loc+' ':''}Small team, big dreams 🚀\n📩 DM to order`
],
luxury:[
`${e} ${name} ${e}\n${work}\n${loc?loc+' ':''}Premium quality since 2014\n${e} RC 321424 ${e}\n📩 Exclusive orders via DM`,
`${name} ${e}\nPremium ${work}\n${loc?loc+' ':''}Diamond standard service 💎\n📩 By appointment only`,
`${e} ${name}\n${work}\n${loc?loc+' ':''}Where quality meets trust ${e}\n📩 DM for premium orders`
]
};

var tpls=templates[vibe];
var html=tpls.map(function(t,i){
var over=t.length>maxChars?' ⚠️ '+t.length+'/'+maxChars+' chars':' ✓ '+t.length+'/'+maxChars+' chars';
return '<h3>Bio '+(i+1)+over+'</h3><div class="bio-text">'+t+'</div><div class="bio-copy" onclick="copyBio(this,\\''+t.replace(/'/g,"\\'").replace(/\n/g,'\\n')+'\\')">Copy</div><div style="height:16px"></div>';
}).join('');
document.getElementById('bios').innerHTML=html;
document.getElementById('bioResult').classList.add('show');
}

function copyBio(btn,text){navigator.clipboard.writeText(text.replace(/\\n/g,'\n'));btn.textContent='Copied! ✓';setTimeout(function(){btn.textContent='Copy'},2000)}
</script>

<span style="font-size:1.3rem;">🧙‍♂️</span> Chat with Magani
</a>

</body>
