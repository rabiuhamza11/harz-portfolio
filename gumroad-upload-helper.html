<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gumroad Quick Upload Helper — Harz Ecosystem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding-bottom:80px}
.header{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid#30363d;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;color:#58a6ff}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;text-decoration:none;display:inline-block}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-outline{background:transparent;border:1px solid#30363d;color:#8b949e}
.btn-outline:hover{border-color:#58a6ff;color:#58a6ff}
.btn-gumroad{background:#ff90e8;color:#000}
.btn-gumroad:hover{background:#ff7de3}
.progress-bar{width:100%;height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#238636,#58a6ff);transition:.3s;width:0%}
.progress-text{font-size:11px;color:#8b949e;margin-top:4px}
.controls{padding:12px 16px;background:#161b22;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:150px;padding:8px 12px;background:#0d1117;border:1px solid#30363d;border-radius:8px;color:#e6edf3;font-size:13px}
.search-box:focus{outline:none;border-color:#58a6ff}
.filter-chip{padding:6px 12px;border-radius:20px;border:1px solid#30363d;background:#161b22;color:#8b949e;cursor:pointer;font-size:12px;white-space:nowrap}
.filter-chip.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.product-card{background:#161b22;border:1px solid#30363d;border-radius:12px;padding:14px;margin:10px 16px;transition:.2s}
.product-card.uploaded{opacity:.5;border-color:#238636}
.product-card.uploaded .product-title{text-decoration:line-through;color:#8b949e}
.product-card.hidden{display:none}
.product-header{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
.product-title{font-size:15px;font-weight:600;color:#e6edf3;flex:1}
.product-price{font-size:14px;font-weight:700;color:#3fb950;white-space:nowrap}
.product-desc{font-size:12px;color:#8b949e;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.product-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.meta-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#21262d;color:#8b949e}
.copy-row{display:flex;gap:6px;flex-wrap:wrap}
.copy-btn{padding:6px 10px;border-radius:6px;border:1px solid#30363d;background:#21262d;color:#8b949e;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;flex:1;min-width:70px;text-align:center}
.copy-btn:hover{border-color:#58a6ff;color:#58a6ff}
.copy-btn.copied{background:#238636;border-color:#238636;color:#fff}
.mark-btn{width:100%;padding:8px;border-radius:8px;border:1px solid#f0883e;background:transparent;color:#f0883e;cursor:pointer;font-size:12px;font-weight:600;margin-top:8px}
.mark-btn:hover{background:#f0883e;color:#000}
.mark-btn.marked{background:#238636;border-color:#238636;color:#fff}
.empty{padding:40px;text-align:center;color:#8b949e}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:.3s}
.toast.show{opacity:1}
.stat-box{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#8b949e}
.stat-box strong{color:#58a6ff}
</style>
</head>
<body>
<div class="header">
<div>
<h1>🚀 Gumroad Upload Helper</h1>
<div class="stat-box">USD Products: <strong id="usdCount">0</strong> | Uploaded: <strong id="uploadedCount">0</strong></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText">0 of 0 uploaded</div>
</div>
<div class="header-actions">
<a href="https://app.gumroad.com/products" target="_blank" class="btn btn-gumroad">Open Gumroad</a>
<button class="btn btn-outline" onclick="resetProgress()">Reset</button>
</div>
</div>
<div class="controls">
<input type="text" class="search-box" id="searchBox" placeholder="Search products..." oninput="filterProducts()">
<div style="display:flex;gap:6px;overflow-x:auto;flex-wrap:wrap" id="filterChips"></div>
</div>
<div id="productList"></div>
<div id="emptyState" class="empty" style="display:none">No products found</div>
<div class="toast" id="toast"></div>
<script>
let allProducts=[];
let uploaded=new Set(JSON.parse(localStorage.getItem('gumroad_uploaded')||'[]'));
let activeFilter='all';
async function loadProducts(){
try{
const res=await fetch('https://superagent-2286fb2f.base44.app/functions/harzdmCatalog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list'})});
const data=await res.json();
allProducts=(data.products||[]).filter(p=>p.currency==='USD');
buildFilters();render();
}catch(e){
allProducts=[];buildFilters();render();
}
}
function buildFilters(){
const cats={};
allProducts.forEach(p=>{cats[p.category||'Other']=(cats[p.category||'Other']||0)+1;});
const chips=document.getElementById('filterChips');
let html='<button class="filter-chip '+(activeFilter==='all'?'active':'')+'" onclick="setFilter(\'all\')">All ('+allProducts.length+')</button>';
Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([cat,count])=>{
html+='<button class="filter-chip '+(activeFilter===cat?'active':'')+'" onclick="setFilter(\''+cat.replace(/'/g,"\\'")+'\')">'+cat+' ('+count+')</button>';
});
chips.innerHTML=html;
}
function setFilter(f){activeFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));event.target.classList.add('active');render();}
function copyText(text,btn){
navigator.clipboard.writeText(text).then(()=>{
btn.classList.add('copied');
const orig=btn.textContent;btn.textContent='✓ Copied!';
setTimeout(()=>{btn.classList.remove('copied');btn.textContent=orig;},1200);
});
}
function toggleUpload(id){
if(uploaded.has(id)){uploaded.delete(id);}else{uploaded.add(id);}
localStorage.setItem('gumroad_uploaded',JSON.stringify([...uploaded]));render();
}
function resetProgress(){
if(confirm('Reset all upload tracking?')){uploaded.clear();localStorage.removeItem('gumroad_uploaded');render();}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function filterProducts(){render();}
function render(){
const search=document.getElementById('searchBox').value.toLowerCase();
let filtered=allProducts;
if(activeFilter!=='all')filtered=filtered.filter(p=>(p.category||'Other')===activeFilter);
if(search)filtered=filtered.filter(p=>p.title.toLowerCase().includes(search)||(p.description||'').toLowerCase().includes(search));
document.getElementById('usdCount').textContent=allProducts.length;
document.getElementById('uploadedCount').textContent=uploaded.size;
const pct=allProducts.length?Math.round(uploaded.size/allProducts.length*100):0;
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressText').textContent=uploaded.size+' of '+allProducts.length+' uploaded ('+pct+'%)';
const list=document.getElementById('productList');
document.getElementById('emptyState').style.display=filtered.length?'none':'block';
list.innerHTML=filtered.map(p=>{
const isUp=uploaded.has(p.id);
const price=p.price>0?'$'+p.price.toFixed(2):'FREE';
const gumroadPrice=p.price>0?(p.price*1.10).toFixed(2):'0';
return '<div class="product-card '+(isUp?'uploaded':'')+'">'+
'<div class="product-header">'+
'<div class="product-title">'+p.title+'</div>'+
'<div class="product-price">'+price+'</div>'+
'</div>'+
'<div class="product-desc">'+(p.description||'No description')+'</div>'+
'<div class="product-meta">'+
'<span class="meta-tag">'+(p.category||'Other')+'</span>'+
'<span class="meta-tag">'+(p.currency||'USD')+'</span>'+
'<span class="meta-tag">Gumroad: $'+gumroadPrice+'</span>'+
'</div>'+
'<div class="copy-row">'+
'<button class="copy-btn" onclick="copyText('+JSON.stringify(JSON.stringify(p.title))+',this)">Copy Title</button>'+
'<button class="copy-btn" onclick="copyText('+JSON.stringify(JSON.stringify((p.description||'').substring(0,200)))+',this)">Copy Desc</button>'+
'<button class="copy-btn" onclick="copyText('+JSON.stringify(JSON.stringify(price))+',this)">Copy Price</button>'+
'</div>'+
'<button class="mark-btn '+(isUp?'marked':'')+'" onclick="toggleUpload(\''+p.id+'\')">'+(isUp?'✓ Uploaded — Click to Undo':'Mark as Uploaded')+'</button>'+
'</div>';
}).join('');
}
loadProducts();
</script>
</body>
</html>
