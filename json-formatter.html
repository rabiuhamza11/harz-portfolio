.card h2{font-size:.85rem;color:#7c3aed;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
textarea{width:100%;min-height:150px;padding:14px;background:#14141e;border:1px solid #1e1e2e;border-radius:12px;color:#e8e8f0;font-size:.8rem;font-family:monospace;line-height:1.6;resize:vertical}

.status.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.status.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}

.stat{flex:1;text-align:center;padding:8px;background:#14141e;border:1px solid #1e1e2e;border-radius:8px}
.stat .num{font-size:1rem;font-weight:800;color:#00d4aa}
.stat .lbl{font-size:.6rem;color:#6b6b80;text-transform:uppercase}

<div class="header"><h1>JSON Formatter</h1></div>

<div class="card">
<h2>Input</h2>
<textarea id="input" placeholder='{"name":"Harz","products":259,"platforms":24}' oninput="autoValidate()">{"name":"Harz Digital Services","cac":"RC 321424","tin":"24550860","platforms":24,"products":259,"agents":80,"registered":"2014-08-05","services":["digital_products","consulting","music","film","fintech"]}</textarea>
<div class="btn-row">
<button class="btn format" onclick="format()">🎨 Format</button>
<button class="btn minify" onclick="minify()">📦 Minify</button>
<button class="btn validate" onclick="validate()">✓ Validate</button>
<button class="btn copy" onclick="copy()">📋 Copy</button>
</div>
<div class="status" id="status" style="display:none"></div>
<div class="stats" id="stats" style="display:none">
<div class="stat"><div class="num" id="sKeys">0</div><div class="lbl">Keys</div></div>
<div class="stat"><div class="num" id="sDepth">0</div><div class="lbl">Depth</div></div>
<div class="stat"><div class="num" id="sSize">0</div><div class="lbl">Bytes</div></div>
</div>
</div>

<div class="card">
<h2>Output</h2>
<textarea id="output" placeholder="Formatted JSON will appear here..." style="min-height:200px" readonly></textarea>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | JSON Formatter & Validator
</div>

<script>
function getDepth(obj,level){
level=level||0;
if(typeof obj!=='object'||obj===null)return level;
var max=level;
for(var k in obj){var d=getDepth(obj[k],level+1);if(d>max)max=d}
return max;
}

function countKeys(obj){
var count=0;
if(typeof obj==='object'&&obj!==null){
for(var k in obj){count++;count+=countKeys(obj[k])}
}
return count;
}

function setStatus(type,msg){
var el=document.getElementById('status');
el.style.display='block';
el.className='status '+type;
el.textContent=msg;
}

function showStats(obj){
document.getElementById('stats').style.display='flex';
document.getElementById('sKeys').textContent=countKeys(obj);
document.getElementById('sDepth').textContent=getDepth(obj);
document.getElementById('sSize').textContent=document.getElementById('output').value.length;
}

function format(){
try{
var input=document.getElementById('input').value;
var parsed=JSON.parse(input);
var output=JSON.stringify(parsed,null,2);
document.getElementById('output').value=output;
setStatus('ok','✓ Valid JSON — formatted successfully');
showStats(parsed);
}catch(e){
setStatus('err','✗ '+e.message);
document.getElementById('stats').style.display='none';
}
}

function minify(){
try{
var input=document.getElementById('input').value;
var parsed=JSON.parse(input);
var output=JSON.stringify(parsed);
document.getElementById('output').value=output;
setStatus('ok','✓ Minified — '+output.length+' bytes');
showStats(parsed);
}catch(e){
setStatus('err','✗ '+e.message);
}
}

function validate(){
try{
var input=document.getElementById('input').value;
JSON.parse(input);
setStatus('ok','✓ Valid JSON — no errors found');
}catch(e){
setStatus('err','✗ Invalid JSON: '+e.message);
}
}

function copy(){
var text=document.getElementById('output').value||document.getElementById('input').value;
if(!text)return;
navigator.clipboard.writeText(text);
alert('JSON copied!');
}

function autoValidate(){
try{
JSON.parse(document.getElementById('input').value);
document.getElementById('input').style.borderColor='#22c55e';
}catch(e){
document.getElementById('input').style.borderColor='#ef4444';
}
}

format();
</script>
