<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Projection Calculator — Forecast Your Growth | Harz</title>
<meta name="description" content="Project monthly and yearly revenue based on growth rate, customer acquisition, and pricing.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.calc{max-width:500px;margin:0 auto;background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:20px}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;margin-bottom:4px;color:#a3a3a3}
.input-group input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:10px;border-radius:8px;font-size:15px}
.btn{width:100%;background:#10b981;color:#000;padding:14px;border-radius:8px;font-weight:700;font-size:16px;border:none;cursor:pointer;margin-bottom:16px}
.chart{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px}
.chart-bar{display:flex;align-items:flex-end;height:120px;gap:4px;margin-top:12px}
.bar{flex:1;background:linear-gradient(180deg,#10b981,#059669);border-radius:4px 4px 0 0;min-height:4px;position:relative}
.bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:#555;white-space:nowrap}
.bar-value{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:#10b981;white-space:nowrap}
.results{font-size:14px}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2a2a}
.result-row span:first-child{color:#a3a3a3}
.result-row span:last-child{font-weight:700}
.highlight{color:#10b981 !important;font-size:18px}
</style>
</head>
<body>
<h1>Revenue Projection</h1>
<div class="calc">
  <div class="input-group"><label>Current Monthly Revenue (N)</label><input type="number" id="currentRev" value="100000"></div>
  <div class="input-group"><label>Monthly Growth Rate (%)</label><input type="number" id="growthRate" value="15" step="0.5"></div>
  <div class="input-group"><label>Projection Period (months)</label><input type="number" id="months" value="12"></div>
  <button class="btn" onclick="calculate()">Project Revenue</button>
  <div class="chart" id="chart" style="display:none">
    <div style="font-size:13px;color:#a3a3a3;margin-bottom:8px">Monthly Revenue Forecast</div>
    <div class="chart-bar" id="bars"></div>
    <div style="margin-top:30px"></div>
  </div>
  <div class="results" id="results"></div>
</div>
<script>
function formatN(n){return 'N'+Math.round(n).toLocaleString()}
function calculate(){
  const rev=parseFloat(document.getElementById('currentRev').value)||0;
  const rate=(parseFloat(document.getElementById('growthRate').value)||0)/100;
  const months=parseInt(document.getElementById('months').value)||12;
  const monthly=[];let total=0;let r=rev;
  for(let i=0;i<months;i++){r=r*(1+rate);monthly.push(r);total+=r;}
  const maxRev=Math.max(...monthly);
  document.getElementById('bars').innerHTML=monthly.map((m,i)=>`
    <div class="bar" style="height:${(m/maxRev*100)}%">
      <div class="bar-value">${Math.round(m/1000)}K</div>
      <div class="bar-label">M${i+1}</div>
    </div>`).join('');
  document.getElementById('chart').style.display='block';
  const lastMonth=monthly[monthly.length-1];
  const growth=((lastMonth/rev-1)*100).toFixed(0);
  document.getElementById('results').innerHTML=`
    <div class="result-row"><span>Starting Monthly Revenue</span><span>${formatN(rev)}</span></div>
    <div class="result-row"><span>Ending Monthly Revenue</span><span class="highlight">${formatN(lastMonth)}</span></div>
    <div class="result-row"><span>Growth Over Period</span><span>${growth}%</span></div>
    <div class="result-row"><span>Total Revenue (${months} months)</span><span class="highlight">${formatN(total)}</span></div>
    <div class="result-row"><span>Average Monthly Revenue</span><span>${formatN(total/months)}</span></div>`;
}
calculate();
</script>
</body>
</html>
