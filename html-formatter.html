<script>
function beautify(){
var html=document.getElementById('input').value;
if(!html){document.getElementById('output').value='';return}
// Simple beautifier
var formatted='';
var indent=0;
var tokens=html.replace(/></g,'>|||<').split('|||');
tokens.forEach(function(token){
token=token.trim();
if(!token)return;
if(token.match(/^<\/.*>/)){
indent=Math.max(0,indent-1);
formatted+='  '.repeat(indent)+token+'\n';
}else if(token.match(/^<[^/!?][^>]*[^/]>/)&&!token.match(/^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)/i)){
formatted+='  '.repeat(indent)+token+'\n';
indent++;
}else if(token.match(/^<[^/!?][^>]*\/>/)||token.match(/^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)/i)){
formatted+='  '.repeat(indent)+token+'\n';
}else{
formatted+='  '.repeat(indent)+token+'\n';
}
});
document.getElementById('output').value=formatted.trim();
document.getElementById('stats').textContent=formatted.length+' bytes · '+formatted.split('\n').length+' lines';
}

function minify(){
var html=document.getElementById('input').value;
if(!html){document.getElementById('output').value='';return}
var minified=html
.replace(/<!--[\s\S]*?-->/g,'')
.replace(/\s+/g,' ')
.replace(/>\s+</g,'><')
.replace(/\s+>/g,'>')
.replace(/<\s+/g,'<')
.trim();
document.getElementById('output').value=minified;
document.getElementById('stats').textContent=minified.length+' bytes · 1 line';
}

function copy(){navigator.clipboard.writeText(document.getElementById('output').value);alert('HTML copied!')}
beautify();
</script>
