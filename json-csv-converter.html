<script>
var mode='j2c';
function setMode(m){
mode=m;
document.querySelectorAll('.mode-tab').forEach(function(e){e.classList.toggle('active',e.dataset.m===m)});
document.getElementById('inputLabel').textContent=m==='j2c'?'JSON Input':'CSV Input';
if(m==='j2c'){
document.getElementById('input').value='[{"name":"Harz Digital","email":"harzco.business@gmail.com","phone":"08028687857","platforms":24}]';
}else{
document.getElementById('input').value='name,email,phone,platforms\nHarz Digital,harzco.business@gmail.com,08028687857,24\nRabiu Hamza,hamzarabiu390@gmail.com,07036170795,12';
}
convert();
}

function convert(){
var input=document.getElementById('input').value.trim();
if(!input){document.getElementById('output').textContent='Enter data above';return}
try{
if(mode==='j2c'){jsonToCsv(input)}else{csvToJson(input)}
}catch(e){document.getElementById('output').textContent='Error: '+e.message;document.getElementById('convertStats').textContent=''}
}

function jsonToCsv(input){
var data=JSON.parse(input);
if(!Array.isArray(data)){data=[data]}
if(data.length===0){document.getElementById('output').textContent='Empty array';return}
// Get headers
var headers=Object.keys(data[0]);
var rows=[headers.join(',')];
data.forEach(function(item){
var row=headers.map(function(h){
var val=item[h];
if(val===null||val===undefined)val='';
if(typeof val==='string'&&val.includes(','))val='"'+val.replace(/"/g,'""')+'"';
return val;
});
rows.push(row.join(','));
});
var csv=rows.join('\n');
document.getElementById('output').textContent=csv;
document.getElementById('convertStats').textContent=data.length+' records · '+headers.length+' columns';
}

function csvToJson(input){
var lines=input.split('\n');
if(lines.length<2){document.getElementById('output').textContent='Need at least header + 1 row';return}
var headers=parseCsvLine(lines[0]);
var data=[];
for(var i=1;i<lines.length;i++){
if(!lines[i].trim())continue;
var values=parseCsvLine(lines[i]);
var obj={};
headers.forEach(function(h,j){
var val=values[j]||'';
if(!isNaN(val)&&val!=='')val=Number(val);
obj[h]=val;
});
data.push(obj);
}
document.getElementById('output').textContent=JSON.stringify(data,null,2);
document.getElementById('convertStats').textContent=data.length+' records · '+headers.length+' columns';
}

function parseCsvLine(line){
var result=[],current='',inQuotes=false;
for(var i=0;i<line.length;i++){
var ch=line[i];
if(ch==='"'){
if(inQuotes&&line[i+1]==='"'){current+='"';i++}
else{inQuotes=!inQuotes}
}else if(ch===','&&!inQuotes){result.push(current);current=''}
else{current+=ch}
}
result.push(current);
return result;
}

function copy(){navigator.clipboard.writeText(document.getElementById('output').textContent);alert('Copied!')}
function download(){
var text=document.getElementById('output').textContent;
var ext=mode==='j2c'?'csv':'json';
var blob=new Blob([text],{type:'text/'+ext});
var a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='converted.'+ext;
a.click();
}
convert();
</script>
