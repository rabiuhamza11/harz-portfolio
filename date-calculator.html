<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Date Calculator</h1><p>Days between dates, add/subtract, age</p></div>

<div class="card">
<h2>Days Between Two Dates</h2>
<div class="input-row">
<div class="input-group"><label>From</label><input type="date" id="date1" value="2026-01-01"></div>
<div class="input-group"><label>To</label><input type="date" id="date2" value="2026-12-31"></div>
</div>
<button class="btn" onclick="calcDays()">Calculate</button>
<div class="result" id="daysResult">
<div class="big" id="daysNum">—</div>
<div class="label" id="daysLabel">Select dates and calculate</div>
</div>
<div id="daysDetail" style="margin-top:12px"></div>
</div>

<div class="card">
<h2>Add/Subtract Days</h2>
<div class="input-row">
<div class="input-group"><label>Start Date</label><input type="date" id="addDate" value="2026-07-18"></div>
<div class="input-group"><label>Days (+/−)</label><input type="number" id="addDays" value="30"></div>
</div>
<button class="btn" onclick="addDays()">Calculate</button>
<div class="result" id="addResult">
<div class="big" id="addResultDate">—</div>
<div class="label" id="addResultLabel">Enter date and days</div>
</div>
</div>

<div class="card">
<h2>Age Calculator</h2>
<div class="input-group"><label>Birth Date</label><input type="date" id="birthDate" value="1995-01-01"></div>
<button class="btn" onclick="calcAge()">Calculate Age</button>
<div id="ageResult" style="margin-top:12px"></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Date Calculator
</div>

<script>
function calcDays(){
var d1=new Date(document.getElementById('date1').value);
var d2=new Date(document.getElementById('date2').value);
if(isNaN(d1)||isNaN(d2))return;
var diff=Math.abs(d2-d1);
var days=Math.floor(diff/86400000);
document.getElementById('daysNum').textContent=days.toLocaleString();
document.getElementById('daysLabel').textContent=days+' days between '+d1.toDateString()+' and '+d2.toDateString();
document.getElementById('daysDetail').innerHTML=
'<div class="detail-row"><span class="l">Weeks</span><span class="v">'+Math.floor(days/7).toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Months (approx)</span><span class="v">'+Math.floor(days/30.44).toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Years (approx)</span><span class="v">'+(days/365.25).toFixed(2)+'</span></div>'+
'<div class="detail-row"><span class="l">Hours</span><span class="v">'+(days*24).toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Business days</span><span class="v">'+Math.floor(days*5/7).toLocaleString()+'</span></div>';
}

function addDays(){
var d=new Date(document.getElementById('addDate').value);
var days=parseInt(document.getElementById('addDays').value);
if(isNaN(d)||isNaN(days))return;
var result=new Date(d);
result.setDate(result.getDate()+days);
document.getElementById('addResultDate').textContent=result.toDateString();
document.getElementById('addResultLabel').textContent=days+' days from '+d.toDateString()+' is a '+['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][result.getDay()];
}

function calcAge(){
var birth=new Date(document.getElementById('birthDate').value);
var now=new Date();
if(isNaN(birth))return;
var years=now.getFullYear()-birth.getFullYear();
var months=now.getMonth()-birth.getMonth();
var days=now.getDate()-birth.getDate();
if(days<0){months--;days+=30}
if(months<0){years--;months+=12}
var totalDays=Math.floor((now-birth)/86400000);
document.getElementById('ageResult').innerHTML=
'<div class="detail-row"><span class="l">Age</span><span class="v">'+years+' years, '+months+' months, '+days+' days</span></div>'+
'<div class="detail-row"><span class="l">Total days</span><span class="v">'+totalDays.toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Total weeks</span><span class="v">'+Math.floor(totalDays/7).toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Total hours</span><span class="v">'+(totalDays*24).toLocaleString()+'</span></div>'+
'<div class="detail-row"><span class="l">Next birthday</span><span class="v">'+new Date(birth.getFullYear()+years+1,birth.getMonth(),birth.getDate()).toDateString()+'</span></div>';
}

calcDays();addDays();calcAge();
</script>
