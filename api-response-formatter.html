<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Response Formatter & Tester | Harz</title>
<meta name="description" content="Format and test API responses. Paste JSON, validate, format, and visualize the structure.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn{background:#1c1c1c;border:1px solid #2a2a2a;color:#a3a3a3;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.btn.primary{background:#10b981;color:#000;border:none;font-weight:700}
.btn:hover{border-color:#10b981;color:#10b981}
.btn.primary:hover{background:#059669}
.input-section{margin-bottom:16px}
textarea{width:100%;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:14px;border-radius:8px;font-family:monospace;font-size:13px;resize:vertical;min-height:150px}
textarea:focus{outline:none;border-color:#10b981}
.output{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:13px;min-height:100px;max-height:300px;overflow:auto}
.valid{border-color:#10b981 !important}
.invalid{border-color:#ef4444 !important}
.stats{display:flex;gap:20px;margin:8px 0;font-size:12px;color:#a3a3a3}
.stats span{font-weight:700;color:#10b981}
.error{color:#ef4444;font-size:13px;padding:8px;background:rgba(239,68,68,0.1);border-radius:6px;margin-top:8px}
.success{color:#10b981;font-size:13px;padding:8px;background:rgba(16,185,129,0.1);border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<h1>API Response Formatter</h1>
<div class="app">
  <div class="input-section">
    <textarea id="input" placeholder='Paste JSON here... e.g. {"status":"ok","data":[{"id":1}]}'></textarea>
  </div>
  <div class="controls">
    <button class="btn primary" onclick="format()">Format</button>
    <button class="btn" onclick="minify()">Minify</button>
    <button class="btn" onclick="validate()">Validate</button>
    <button class="btn" onclick="clearAll()">Clear</button>
    <button class="btn" onclick="copyOutput()">Copy Output</button>
  </div>
  <div id="status"></div>
  <div class="stats" id="stats"></div>
  <div class="output" id="output"></div>
</div>
<script>
function getVal(){try{return JSON.parse(document.getElementById('input').value)}catch(e){return null}}
function showStats(obj){
  if(!obj)return;
  const json=JSON.stringify(obj);
  const bytes=new Blob([json]).size;
  const keys=Object.keys(obj).length;
  let count=0;
  JSON.stringify(obj,(_,v)=>{if(typeof v==='object'&&v!==null)count++;return v;});
  document.getElementById('stats').innerHTML=`<span>Size: ${bytes} bytes</span><span>Keys: ${keys}</span><span>Objects: ${count}</span><span>Chars: ${json.length}</span>`;
}
function format(){
  const obj=getVal();
  if(!obj){showError('Invalid JSON — check your syntax');return;}
  const formatted=JSON.stringify(obj,null,2);
  document.getElementById('output').textContent=formatted;
  document.getElementById('output').className='output valid';
  showSuccess('JSON formatted successfully');
  showStats(obj);
}
function minify(){
  const obj=getVal();
  if(!obj){showError('Invalid JSON — check your syntax');return;}
  const minified=JSON.stringify(obj);
  document.getElementById('output').textContent=minified;
  document.getElementById('output').className='output valid';
  showSuccess('JSON minified');
  showStats(obj);
}
function validate(){
  try{JSON.parse(document.getElementById('input').value);showSuccess('Valid JSON ✅');document.getElementById('output').className='output valid';}
  catch(e){showError('Invalid JSON: '+e.message);document.getElementById('output').className='output invalid';}
}
function clearAll(){document.getElementById('input').value='';document.getElementById('output').textContent='';document.getElementById('stats').innerHTML='';document.getElementById('status').innerHTML='';}
function copyOutput(){navigator.clipboard.writeText(document.getElementById('output').textContent);alert('Output copied!');}
function showError(msg){document.getElementById('status').innerHTML='<div class="error">'+msg+'</div>';}
function showSuccess(msg){document.getElementById('status').innerHTML='<div class="success">'+msg+'</div>';}
</script>
</body>
</html>
