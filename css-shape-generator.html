<div class="input-group"><label>Shape Type</label><select id="shape" onchange="update()"><option value="circle">Circle</option><option value="triangle">Triangle</option><option value="star">Star</option><option value="pentagon">Pentagon</option><option value="hexagon">Hexagon</option><option value="heart">Heart</option><option value="diamond">Diamond</option></select></div><div style="margin:20px;text-align:center"><div id="preview" style="width:150px;height:150px;margin:0 auto;background:#667eea"></div></div><div class="output" id="output"></div><button class="copy-btn" onclick="copyText(document.getElementById('output').textContent,this)">Copy</button><script>function update(){const s=document.getElementById('shape').value;const shapes={circle:'border-radius:50%',triangle:'clip-path:polygon(50% 0%,0% 100%,100% 100%)',star:'clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)',pentagon:'clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%)',hexagon:'clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)',heart:'clip-path:path("M75,30 C65,10 0,10 0,40 C0,70 40,80 75,100 C110,80 150,70 150,40 C150,10 85,10 75,30 Z")',diamond:'clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)'};document.getElementById('preview').style.cssText='width:150px;height:150px;margin:0 auto;background:#667eea;'+shapes[s];document.getElementById('output').textContent='.shape {\n  width: 150px;\n  height: 150px;\n  background: #667eea;\n  '+shapes[s].replace(/;/g,';\n  ')+'\n}'}update()</script>
