<script>
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){
var md=document.getElementById('mdInput').value;
var html=md;
// Code blocks
html=html.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){return'<pre><code>'+escapeHtml(code)+'</code></pre>'});
// Inline code
html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
// Headers
html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
// Bold and italic
html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
// Links
html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
// Blockquote
html=html.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
// Horizontal rule
html=html.replace(/^---$/gm,'<hr>');
// Unordered list
html=html.replace(/^- (.+)$/gm,'<li>$1</li>');
html=html.replace(/(<li>.*<\/li>\n?)+/g,function(m){return'<ul>'+m+'</ul>'});
// Ordered list
html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
// Images
html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
// Paragraphs
html=html.split('\n\n').map(function(p){
if(p.match(/^<(h[1-3]|ul|ol|pre|blockquote|hr|img)/))return p;
return p.trim()?'<p>'+p.replace(/\n/g,'<br>')+'</p>':'';
}).join('\n');
document.getElementById('mdPreview').innerHTML=html;
}

function copyMD(){navigator.clipboard.writeText(document.getElementById('mdInput').value);alert('Markdown copied!')}
function copyHTML(){navigator.clipboard.writeText(document.getElementById('mdPreview').innerHTML);alert('HTML copied!')}
function clearMD(){document.getElementById('mdInput').value='';render()}
render();
</script>
