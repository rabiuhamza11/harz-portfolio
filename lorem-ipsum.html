<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>Lorem Ipsum Generator</h1><p>Placeholder text for designs</p></div>

<div class="card">
<h2>Generate</h2>
<div class="type-tabs">
<div class="type-tab active" onclick="setUnit('paragraphs')">Paragraphs</div>
<div class="type-tab" onclick="setUnit('sentences')">Sentences</div>
<div class="type-tab" onclick="setUnit('words')">Words</div>
</div>
<div class="input-row">
<label>Amount:</label><input type="number" id="count" value="3" min="1" max="50">
<label>Style:</label>
<select id="style">
<option value="lorem">Lorem Ipsum</option>
<option value="english">English Placeholder</option>
<option value="tech">Tech Startup</option>
<option value="startup">Startup Pitch</option>
</select>
</div>
<label style="font-size:.8rem;color:#6b6b80;display:flex;align-items:center;gap:6px;margin-bottom:8px">
<input type="checkbox" id="startLorem" checked> Start with "Lorem ipsum..."
</label>
<button class="btn" onclick="generate()">Generate Text</button>
</div>

<div class="card">
<h2>Output</h2>
<div class="output" id="output">Click Generate to create placeholder text...</div>
<button class="copy-btn" onclick="copy()">📋 Copy Text</button>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Lorem Ipsum Generator
</div>

<script>
var unit='paragraphs';
function setUnit(u){unit=u;document.querySelectorAll('.type-tab').forEach(function(e,i){e.classList.toggle('active',['paragraphs','sentences','words'][i]===u)})}

var words=['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];

var englishWords=['the','quick','brown','fox','jumps','over','lazy','dog','beautiful','design','requires','attention','detail','every','element','must','serve','purpose','create','meaningful','experiences','users','expect','seamless','interaction','intuitive','interfaces','modern','web','development','prioritizes','performance','accessibility','responsiveness'];

var techWords=['leverage','synergy','iterate','disrupt','scale','pivot','agile','cloud','blockchain','ai','machine','learning','data','pipeline','microservices','kubernetes','serverless','edge','compute','low','code','no','code','digital','transformation','enterprise','solution','platform','ecosystem','api','first','mobile','responsive','native','hybrid'];

var startupWords=['revolutionary','platform','connects','creators','monetize','passion','empowering','entrepreneurs','build','launch','scale','disrupt','industry','seamless','onboarding','frictionless','payments','global','reach','local','impact','community','driven','growth','metrics','traction','runway','valuation','seed','series'];

function getRandomWord(pool){return pool[Math.floor(Math.random()*pool.length)]}

function getSentence(pool){
var len=8+Math.floor(Math.random()*12);
var sent=[];
for(var i=0;i<len;i++)sent.push(getRandomWord(pool));
sent[0]=sent[0].charAt(0).toUpperCase()+sent[0].slice(1);
return sent.join(' ')+'.';
}

function getParagraph(pool){
var sentCount=3+Math.floor(Math.random()*4);
var sents=[];
for(var i=0;i<sentCount;i++)sents.push(getSentence(pool));
return sents.join(' ');
}

function generate(){
var count=parseInt(document.getElementById('count').value)||1;
var style=document.getElementById('style').value;
var startL=document.getElementById('startLorem').checked;
var pool=style==='lorem'?words:style==='english'?englishWords:style==='tech'?techWords:startupWords;
var result=[];

if(unit==='words'){
var all=[];
for(var i=0;i<count;i++)all.push(getRandomWord(pool));
all[0]=all[0].charAt(0).toUpperCase()+all[0].slice(1);
result.push(all.join(' ')+'.');
}else if(unit==='sentences'){
for(var i=0;i<count;i++){
if(startL&&i===0){result.push('Lorem ipsum dolor sit amet, consectetur adipiscing elit.')}
else result.push(getSentence(pool));
}
}else{
for(var i=0;i<count;i++){
if(startL&&i===0){result.push('Lorem ipsum dolor sit amet, consectetur adipiscing elit. '+getParagraph(pool))}
else result.push(getParagraph(pool));
}
}
document.getElementById('output').textContent=result.join('\n\n');
}

function copy(){
navigator.clipboard.writeText(document.getElementById('output').textContent);
alert('Text copied!');
}

generate();
</script>
