<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Onboarding Checklist | Harz</title>
<meta name="description" content="Track employee onboarding tasks. Equipment, access, training, and paperwork checklist for new hires.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:800;color:#10b981}
.stat .label{font-size:10px;color:#a3a3a3}
.add-bar{display:flex;gap:6px;margin-bottom:16px}
.add-bar input{flex:1;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:8px;font-size:14px}
.add-bar select{background:#141414;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:8px;font-size:14px}
.add-bar button{background:#10b981;color:#000;padding:10px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.category{margin-bottom:20px}
.cat-title{font-size:14px;font-weight:700;color:#10b981;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:4px}
.task{display:flex;align-items:center;gap:10px;background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:10px;margin-bottom:6px}
.task input[type="checkbox"]{width:20px;height:20px;cursor:pointer;accent-color:#10b981}
.task-text{flex:1;font-size:13px;text-decoration:none}
.task.done .task-text{text-decoration:line-through;color:#555}
.task-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px}
</style>
</head>
<body>
<h1>Employee Onboarding Checklist</h1>
<div class="app">
  <div class="stats">
    <div class="stat"><div class="num" id="total">0</div><div class="label">Total Tasks</div></div>
    <div class="stat"><div class="num" id="done">0</div><div class="label">Completed</div></div>
    <div class="stat"><div class="num" id="pct">0%</div><div class="label">Progress</div></div>
  </div>
  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="Add onboarding task..." onkeypress="if(event.key==='Enter')addTask()">
    <select id="catSelect"><option value="Paperwork">Paperwork</option><option value="Equipment">Equipment</option><option value="Access">Access</option><option value="Training">Training</option><option value="Intro">Introductions</option></select>
    <button onclick="addTask()">Add</button>
  </div>
  <div id="list"></div>
</div>
<script>
const defaults=[
  {text:'Sign employment contract',cat:'Paperwork',done:false},
  {text:'Collect ID and BVN',cat:'Paperwork',done:false},
  {text:'Set up payroll account',cat:'Paperwork',done:false},
  {text:'Provide laptop/desktop',cat:'Equipment',done:false},
  {text:'Provide phone/SIM',cat:'Equipment',done:false},
  {text:'Email account setup',cat:'Access',done:false},
  {text:'Slack/WhatsApp group access',cat:'Access',done:false},
  {text:'GitHub/Vercel access',cat:'Access',done:false},
  {text:'Company orientation',cat:'Training',done:false},
  {text:'Tools and software training',cat:'Training',done:false},
  {text:'Meet team members',cat:'Intro',done:false},
  {text:'Introduce to key clients',cat:'Intro',done:false},
];
let tasks=JSON.parse(localStorage.getItem('onboarding')||JSON.stringify(defaults));
function addTask(){
  const t=document.getElementById('taskInput').value.trim();
  const c=document.getElementById('catSelect').value;
  if(!t)return;
  tasks.push({text:t,cat:c,done:false,id:Date.now()});
  save();render();
  document.getElementById('taskInput').value='';
}
function toggle(i){tasks[i].done=!tasks[i].done;save();render();}
function del(i){tasks.splice(i,1);save();render();}
function save(){localStorage.setItem('onboarding',JSON.stringify(tasks));}
function render(){
  const doneCount=tasks.filter(t=>t.done).length;
  document.getElementById('total').textContent=tasks.length;
  document.getElementById('done').textContent=doneCount;
  document.getElementById('pct').textContent=tasks.length?Math.round(doneCount/tasks.length*100)+'%':'0%';
  const cats=['Paperwork','Equipment','Access','Training','Intro'];
  document.getElementById('list').innerHTML=cats.map(cat=>{
    const items=tasks.map((t,i)=>({...t,idx:i})).filter(t=>t.cat===cat);
    if(!items.length)return '';
    return `<div class="category"><div class="cat-title">${cat}</div>${items.map(t=>`<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.idx})"><span class="task-text">${t.text}</span><button class="task-del" onclick="del(${t.idx})">Del</button></div>`).join('')}</div>`;
  }).join('');
}
render();
</script>
</body>
</html>
