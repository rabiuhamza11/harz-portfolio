<div class="card">
<h2>Your Text</h2>
<textarea id="input" placeholder="Type or paste text here..." oninput="convert()">Harz Digital Services builds amazing AI tools</textarea>
<div class="results" id="results"></div>
</div>

<div style="text-align:center;padding:20px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Text Case Converter
</div>

<script>
function convert(){
var text=document.getElementById('input').value;
if(!text){document.getElementById('results').innerHTML='';return}
var conversions=[
['UPPERCASE',text.toUpperCase()],
['lowercase',text.toLowerCase()],
['Title Case',text.replace(/\w\S*/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()})],
['Sentence case',text.charAt(0).toUpperCase()+text.slice(1).toLowerCase()],
['camelCase',text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g,function(m,c){return c.toUpperCase()})],
['PascalCase',text.replace(/[^a-zA-Z0-9]+(.)/g,function(m,c){return c.toUpperCase()}).replace(/^./,function(c){return c.toUpperCase()})],
['snake_case',text.toLowerCase().replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'')],
['kebab-case',text.toLowerCase().replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'')],
['CONSTANT_CASE',text.toUpperCase().replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_|_$/g,'')],
['aLtErNaTiNg',text.split('').map(function(c,i){return i%2===0?c.toLowerCase():c.toUpperCase()}).join('')],
['Reverse',text.split('').reverse().join('')]
];
document.getElementById('results').innerHTML=conversions.map(function(c){
return '<div class="result-item"><span class="label">'+c[0]+'</span><span class="text">'+c[1].replace(/</g,'&lt;')+'</span><span class="copy" onclick="copy(this,\''+c[1].replace(/'/g,"\\'").replace(/</g,'&lt;')+'\')">Copy</span></div>';
}).join('');
}

function copy(btn,text){
navigator.clipboard.writeText(text.replace(/&lt;/g,'<'));
btn.textContent='✓';setTimeout(function(){btn.textContent='Copy'},1500);
}

convert();
</script>
