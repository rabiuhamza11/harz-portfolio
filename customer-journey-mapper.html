<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Journey Mapper — Visualize Your Sales Funnel | Harz</title>
<meta name="description" content="Map your customer journey from awareness to purchase. Identify touchpoints and optimize your funnel.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.stages{display:grid;gap:10px;margin-bottom:20px}
.stage{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;position:relative}
.stage-num{position:absolute;top:10px;right:14px;font-size:24px;font-weight:800;color:#2a2a2a}
.stage-title{font-size:15px;font-weight:700;margin-bottom:6px;color:#06b6d4}
.stage-desc{font-size:12px;color:#a3a3a3;margin-bottom:8px}
.stage-actions{font-size:12px}
.stage-actions input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:8px;border-radius:6px;font-size:12px;margin-bottom:4px}
.stage-actions input::placeholder{color:#555}
.conv-bar{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:8px;margin-top:6px}
.conv-bar label{font-size:11px;color:#a3a3a3;margin-right:8px}
.conv-bar input{width:50px;background:#0a0a0a;border:1px solid #2a2a2a;color:#fff;padding:4px;border-radius:4px;font-size:12px}
.funnel-viz{display:grid;gap:4px;margin-bottom:20px}
.funnel-bar{text-align:center;padding:10px;border-radius:6px;font-size:13px;font-weight:600}
.fb1{background:rgba(6,182,212,0.3);color:#06b6d4}
.fb2{background:rgba(6,182,212,0.25);color:#06b6d4}
.fb3{background:rgba(6,182,212,0.2);color:#06b6d4}
.fb4{background:rgba(6,182,212,0.15);color:#06b6d4}
.fb5{background:rgba(6,182,212,0.1);color:#06b6d4}
.conv-rate{font-size:13px;color:#a3a3a3;text-align:center;margin-bottom:10px}
.conv-rate strong{color:#10b981}
</style>
</head>
<body>
<h1>Customer Journey Mapper</h1>
<div class="app">
  <div class="stages" id="stages"></div>
  <div class="conv-rate" id="convRate"></div>
  <div class="funnel-viz" id="funnel"></div>
</div>
<script>
const STAGES = [
  {title:'Awareness',desc:'Customer discovers your brand',actions:['Social media post','Google search','Word of mouth','Ad campaign']},
  {title:'Interest',desc:'Customer explores your offerings',actions:['Visit website','Browse products','Read blog','Follow on social']},
  {title:'Consideration',desc:'Customer evaluates options',actions:['Compare prices','Read reviews','Request quote','Book consultation']},
  {title:'Purchase',desc:'Customer buys',actions:['Complete checkout','Pay via bank/USDT','WhatsApp order','In-person sale']},
  {title:'Retention',desc:'Customer returns and refers',actions:['Follow-up message','Newsletter signup','Referral program','Loyalty discount']},
];
let data = JSON.parse(localStorage.getItem('journey')||JSON.stringify({
  actions:STAGES.map(s=>s.actions.map(a=>'')),
  counts:[1000,300,80,20,8]
}));
function render() {
  document.getElementById('stages').innerHTML = STAGES.map((s,i) => `
    <div class="stage">
      <div class="stage-num">${i+1}</div>
      <div class="stage-title">${s.title}</div>
      <div class="stage-desc">${s.desc}</div>
      <div class="stage-actions">
        ${s.actions.map((a,j) => `<input type="text" placeholder="${a}" value="${data.actions[i][j]}" oninput="data.actions[${i}][${j}]=this.value;localStorage.setItem('journey',JSON.stringify(data))">`).join('')}
      </div>
      <div class="conv-bar">
        <label>Customers:</label><input type="number" value="${data.counts[i]}" onchange="data.counts[${i}]=parseInt(this.value)||0;localStorage.setItem('journey',JSON.stringify(data));renderViz()">
      </div>
    </div>
  `).join('');
  renderViz();
}
function renderViz() {
  const c = data.counts;
  const maxW = 100;
  document.getElementById('funnel').innerHTML = STAGES.map((s,i) => {
    const pct = c[0]>0 ? (c[i]/c[0]*100) : 0;
    const width = c[0]>0 ? Math.max(20, (c[i]/c[0]*maxW)) : 20;
    return `<div class="funnel-bar fb${i+1}" style="width:${width}%;margin:0 auto">${s.title}: ${c[i]} (${pct.toFixed(1)}%)</div>`;
  }).join('');
  const overall = c[0]>0 ? (c[4]/c[0]*100).toFixed(1) : 0;
  const purchase = c[0]>0 ? (c[3]/c[0]*100).toFixed(1) : 0;
  document.getElementById('convRate').innerHTML = `Overall Conversion: <strong>${overall}%</strong> · Purchase Rate: <strong>${purchase}%</strong>`;
}
render();
</script>
</body>
</html>
