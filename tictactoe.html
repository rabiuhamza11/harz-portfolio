<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#050508;color:#e8e8f0;padding:16px;max-width:380px;margin:0 auto}

.score{text-align:center}.score .num{font-size:1.5rem;font-weight:800;color:#00d4aa}
.score .lbl{font-size:.6rem;color:#6b6b80;text-transform:uppercase}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 auto 16px;width:240px}
.cell{aspect-ratio:1;background:#14141e;border:2px solid #1e1e2e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;cursor:pointer;transition:all .15s}
.cell:hover:empty{border-color:#7c3aed}
.cell.x{color:#00d4aa}.cell.o{color:#f59e0b}
.cell.winning{background:rgba(0,212,170,.1);border-color:#00d4aa}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>🎮 Tic Tac Toe</h1></div>
<div class="score-board"><div class="score"><div class="num" id="xWins">0</div><div class="lbl">You (X)</div></div><div class="score"><div class="num" id="ties">0</div><div class="lbl">Ties</div></div><div class="score"><div class="num" id="oWins">0</div><div class="lbl">AI (O)</div></div></div>
<div class="status" id="status">Your turn (X)</div>
<div class="board" id="board"></div>
<button class="btn" onclick="newGame()">🔄 New Game</button>
<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">Harz Digital Services — RC 321424 | Tic Tac Toe</div>
<script>
var board=[];var gameOver=false;var xW=0,oW=0,ti=0;
var lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function newGame(){board=Array(9).fill('');gameOver=false;render();document.getElementById('status').textContent='Your turn (X)'}
function render(){
document.getElementById('board').innerHTML=board.map(function(v,i){
return '<div class="cell '+(v==='X'?'x':'')+(v==='O'?'o':'')+'" onclick="move('+i+')">'+v+'</div>';
}).join('');
}
function move(i){
if(board[i]||gameOver)return;
board[i]='X';render();
var w=checkWin();
if(w){endGame('X',w);return}
if(board.every(function(c){return c})){ti++;document.getElementById('ties').textContent=ti;document.getElementById('status').textContent="It's a Tie! 🤝";gameOver=true;return}
// AI move
setTimeout(function(){
var best=bestMove();
board[best]='O';render();
var w2=checkWin();
if(w2){endGame('O',w2);return}
if(board.every(function(c){return c})){ti++;document.getElementById('ties').textContent=ti;document.getElementById('status').textContent="It's a Tie! 🤝";gameOver=true;return}
document.getElementById('status').textContent='Your turn (X)';
},400);
}
function checkWin(){
for(var i=0;i<lines.length;i++){
var[a,b,c]=lines[i];
if(board[a]&&board[a]===board[b]&&board[a]===board[c])return lines[i];
}
return null;
}
function endGame(player,winLine){
gameOver=true;
if(player==='X'){xW++;document.getElementById('xWins').textContent=xW;document.getElementById('status').textContent='🎉 You Win!'}
else{oW++;document.getElementById('oWins').textContent=oW;document.getElementById('status').textContent='😅 AI Wins!'}
winLine.forEach(function(i){document.querySelectorAll('.cell')[i].classList.add('winning')});
if(navigator.vibrate)navigator.vibrate(100);
}
function bestMove(){
// Try to win
for(var i=0;i<9;i++){if(!board[i]){board[i]='O';if(checkWin()){board[i]='';return i}board[i]=''}}
// Block player
for(var i=0;i<9;i++){if(!board[i]){board[i]='X';if(checkWin()){board[i]='';return i}board[i]=''}}
// Center
if(!board[4])return 4;
// Corners
var corners=[0,2,6,8].filter(function(i){return !board[i]});
if(corners.length)return corners[Math.floor(Math.random()*corners.length)];
// Sides
var sides=[1,3,5,7].filter(function(i){return !board[i]});
if(sides.length)return sides[Math.floor(Math.random()*sides.length)];
return -1;
}
newGame();
</script>
