.slider-row input[type=color]{width:100%;height:36px;border:1px solid #1e1e2e;border-radius:8px;cursor:pointer;background:#14141e}

<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>CSS Box Shadow Generator</h1></div>

<div class="preview"><div class="box" id="previewBox"></div></div>

<div class="card">
<h2>Shadow Settings</h2>
<div class="mode-tabs">
<div class="mode-tab active" onclick="setMode('outset')" data-mode="outset">Outer Shadow</div>
<div class="mode-tab" onclick="setMode('inset')" data-mode="inset">Inner Shadow</div>
</div>
<div class="slider-row"><label>Offset X <span class="val" id="xVal">0px</span></label><input type="range" id="x" min="-50" max="50" value="0" oninput="gen()"></div>
<div class="slider-row"><label>Offset Y <span class="val" id="yVal">10px</span></label><input type="range" id="y" min="-50" max="50" value="10" oninput="gen()"></div>
<div class="slider-row"><label>Blur <span class="val" id="blurVal">20px</span></label><input type="range" id="blur" min="0" max="100" value="20" oninput="gen()"></div>
<div class="slider-row"><label>Spread <span class="val" id="spreadVal">-3px</span></label><input type="range" id="spread" min="-50" max="50" value="-3" oninput="gen()"></div>
<div class="slider-row"><label>Shadow Color</label><input type="color" id="color" value="#00d4aa" oninput="gen()"></div>
<div class="slider-row"><label>Opacity <span class="val" id="opacityVal">0.4</span></label><input type="range" id="opacity" min="0" max="100" value="40" oninput="gen()"></div>
</div>

<div class="card">
<h2>Presets</h2>
<button class="preset-btn" onclick="preset(0,4,6,0,'#000000',30)">Soft Drop</button>
<button class="preset-btn" onclick="preset(0,10,20,-3,'#00d4aa',40)">Glow Teal</button>
<button class="preset-btn" onclick="preset(0,2,4,0,'#000000',20)">Subtle</button>
<button class="preset-btn" onclick="preset(0,20,40,-10,'#7c3aed',30)">Floating</button>
<button class="preset-btn" onclick="preset(4,4,0,0,'#000000',25)">Hard Edge</button>
</div>

<div class="card">
<h2>CSS Code</h2>
<div class="output"><div class="code" id="cssCode">box-shadow: 0px 10px 20px -3px rgba(0,212,170,0.4);</div></div>
<button class="btn" onclick="copy()">📋 Copy CSS</button>
</div>

<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">
Harz Digital Services — RC 321424 | Box Shadow Generator
</div>

<script>
var mode='outset';
function setMode(m){mode=m;document.querySelectorAll('.mode-tab').forEach(function(e){e.classList.toggle('active',e.dataset.mode===m)});gen()}

function hexToRgba(hex,opacity){
var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return 'rgba('+r+','+g+','+b+','+(opacity/100)+')';
}

function gen(){
var x=document.getElementById('x').value;
var y=document.getElementById('y').value;
var blur=document.getElementById('blur').value;
var spread=document.getElementById('spread').value;
var color=document.getElementById('color').value;
var opacity=document.getElementById('opacity').value;
document.getElementById('xVal').textContent=x+'px';
document.getElementById('yVal').textContent=y+'px';
document.getElementById('blurVal').textContent=blur+'px';
document.getElementById('spreadVal').textContent=spread+'px';
document.getElementById('opacityVal').textContent=(opacity/100).toFixed(1);
var rgba=hexToRgba(color,opacity);
var css=(mode==='inset'?'inset ':'')+x+'px '+y+'px '+blur+'px '+spread+'px '+rgba;
var boxShadow='box-shadow: '+css+';';
document.getElementById('cssCode').textContent=boxShadow;
document.getElementById('previewBox').style.boxShadow=css;
}

function preset(x,y,blur,spread,color,opacity){
document.getElementById('x').value=x;
document.getElementById('y').value=y;
document.getElementById('blur').value=blur;
document.getElementById('spread').value=spread;
document.getElementById('color').value=color;
document.getElementById('opacity').value=opacity;
gen();
}

function copy(){
navigator.clipboard.writeText(document.getElementById('cssCode').textContent);
alert('CSS copied!');
}
gen();
</script>
