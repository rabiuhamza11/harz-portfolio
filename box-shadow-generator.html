<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Shadow Generator | Harz</title>
<meta name="description" content="Generate CSS box-shadow properties visually. Multiple shadows, inset, spread, and blur controls.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.app{grid-template-columns:1fr}}
.controls{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.control{margin-bottom:10px}
.control label{font-size:12px;color:#a3a3a3;margin-bottom:3px;display:block}
.control input[type="range"]{width:100%}
.control input[type="color"]{width:100%;height:36px;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;background:#1c1c1c}
.control .val{font-size:12px;color:#06b6d4;font-weight:700;float:right}
.preview{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:30px;display:flex;align-items:center;justify-content:center;min-height:300px}
.box{width:120px;height:120px;background:#06b6d4;border-radius:8px;transition:box-shadow 0.1s}
.code{grid-column:1/-1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:13px;color:#10b981;word-break:break-all}
.copy-btn{grid-column:1/-1;background:#06b6d4;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;text-align:center}
</style>
</head>
<body>
<h1>CSS Box Shadow Generator</h1>
<div class="app">
  <div class="controls">
    <div class="control"><label>X Offset <span class="val" id="xVal">4px</span></label><input type="range" id="x" min="-50" max="50" value="4" oninput="update()"></div>
    <div class="control"><label>Y Offset <span class="val" id="yVal">4px</span></label><input type="range" id="y" min="-50" max="50" value="4" oninput="update()"></div>
    <div class="control"><label>Blur <span class="val" id="bVal">10px</span></label><input type="range" id="blur" min="0" max="100" value="10" oninput="update()"></div>
    <div class="control"><label>Spread <span class="val" id="sVal">0px</span></label><input type="range" id="spread" min="-30" max="30" value="0" oninput="update()"></div>
    <div class="control"><label>Shadow Color</label><input type="color" id="color" value="#000000" oninput="update()"></div>
    <div class="control"><label>Opacity <span class="val" id="oVal">0.3</span></label><input type="range" id="opacity" min="0" max="1" step="0.05" value="0.3" oninput="update()"></div>
    <div class="control"><label><input type="checkbox" id="inset" oninput="update()"> Inset Shadow</label></div>
  </div>
  <div class="preview"><div class="box" id="box"></div></div>
  <div class="code" id="code">box-shadow: 4px 4px 10px 0px rgba(0,0,0,0.3);</div>
  <button class="copy-btn" onclick="copyCode()">Copy CSS</button>
</div>
<script>
function update(){
  const x=document.getElementById('x').value;
  const y=document.getElementById('y').value;
  const b=document.getElementById('blur').value;
  const s=document.getElementById('spread').value;
  const c=document.getElementById('color').value;
  const o=document.getElementById('opacity').value;
  const inset=document.getElementById('inset').checked?'inset ':'';
  document.getElementById('xVal').textContent=x+'px';
  document.getElementById('yVal').textContent=y+'px';
  document.getElementById('bVal').textContent=b+'px';
  document.getElementById('sVal').textContent=s+'px';
  document.getElementById('oVal').textContent=o;
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),bl=parseInt(c.slice(5,7),16);
  const shadow=`${inset}${x}px ${y}px ${b}px ${s}px rgba(${r},${g},${bl},${o})`;
  document.getElementById('box').style.boxShadow=shadow;
  document.getElementById('code').textContent='box-shadow: '+shadow+';';
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent);alert('CSS copied!');}
update();
</script>
</body>
</html>
