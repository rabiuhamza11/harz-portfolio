<body>
<a href="tools.html" class="nav-back">← Back to Tools</a>
<div class="header"><h1>📦 Barcode Generator</h1></div>
<div class="card">
<h2>Barcode Content</h2>
<div class="input-group"><label>Text / Number</label><input type="text" id="bcText" value="HARZ321424" oninput="draw()" maxlength="40"></div>
</div>
<div class="preview"><canvas id="canvas" width="300" height="120"></canvas></div>
<button class="btn" onclick="download()">📥 Download Barcode PNG</button>
<div style="text-align:center;padding:16px;color:#6b6b80;font-size:.7rem">Harz Digital Services — RC 321424 | Barcode Generator</div>
<script>
function draw(){
var canvas=document.getElementById('canvas');var ctx=canvas.getContext('2d');
var text=document.getElementById('bcText').value||' ';
ctx.fillStyle='#fff';ctx.fillRect(0,0,300,120);
// Simple Code39-style barcode (visual only)
var w=4;var x=10;
ctx.fillStyle='#000';
for(var i=0;i<text.length;i++){
var code=text.charCodeAt(i);
for(var b=0;b<8;b++){
if((code>>b)&1){ctx.fillRect(x,10,w,70)}
x+=w+2;
}
x+=w; // gap between chars
}
// Text below
ctx.fillStyle='#000';ctx.font='14px monospace';ctx.textAlign='center';
ctx.fillText('*'+text+'*',150,105);
}
function download(){var canvas=document.getElementById('canvas');var a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='barcode-'+document.getElementById('bcText').value+'.png';a.click()}
draw();
</script>
