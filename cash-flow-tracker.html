<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Flow Tracker — Monitor Money In & Out | Harz</title>
<meta name="description" content="Track cash flow in real-time. Record income and expenses, see your net position instantly.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:500px;margin:0 auto 20px}
.stat{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:14px;text-align:center}
.stat .num{font-size:18px;font-weight:800}
.stat .label{font-size:10px;color:#a3a3a3}
.income{color:#10b981}.expense{color:#ef4444}.net{color:#06b6d4}
.add-form{max-width:500px;margin:0 auto;background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px}
.add-form select,.add-form input{background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:10px;border-radius:8px;font-size:14px;margin-bottom:8px}
.add-form select{width:100%}
.add-form input{width:100%}
.row{display:flex;gap:8px}
.row input{flex:1}
.add-btn{width:100%;background:#06b6d4;color:#000;padding:12px;border-radius:8px;border:none;font-weight:700;font-size:15px;cursor:pointer}
.list{max-width:500px;margin:0 auto;display:grid;gap:6px}
.txn{display:flex;justify-content:space-between;align-items:center;background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:10px}
.txn-info{flex:1}
.txn-desc{font-weight:600;font-size:13px}
.txn-meta{font-size:11px;color:#555}
.txn-amount{font-weight:700;font-size:14px}
.income-color{color:#10b981}.expense-color{color:#ef4444}
.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px}
</style>
</head>
<body>
<h1>Cash Flow Tracker</h1>
<div class="stats">
  <div class="stat"><div class="num income" id="totalIn">N0</div><div class="label">Income</div></div>
  <div class="stat"><div class="num expense" id="totalOut">N0</div><div class="label">Expenses</div></div>
  <div class="stat"><div class="num net" id="netFlow">N0</div><div class="label">Net Flow</div></div>
</div>
<div class="add-form">
  <select id="type"><option value="income">Income</option><option value="expense">Expense</option></select>
  <input type="text" id="desc" placeholder="Description (e.g. Web app sale, Internet bill)">
  <div class="row"><input type="number" id="amount" placeholder="Amount (N)"><button class="add-btn" style="width:auto;padding:10px 24px" onclick="addTxn()">Add</button></div>
</div>
<div class="list" id="list"></div>
<script>
let txns=JSON.parse(localStorage.getItem('cashflow')||'[]');
function formatN(n){return 'N'+Math.round(n).toLocaleString()}
function addTxn(){
  const t=document.getElementById('type').value;
  const d=document.getElementById('desc').value.trim();
  const a=parseFloat(document.getElementById('amount').value)||0;
  if(!d||!a)return;
  txns.unshift({type:t,desc:d,amount:a,date:new Date().toLocaleDateString('en-NG'),id:Date.now()});
  localStorage.setItem('cashflow',JSON.stringify(txns));
  document.getElementById('desc').value='';document.getElementById('amount').value='';
  render();
}
function delTxn(id){txns=txns.filter(t=>t.id!==id);localStorage.setItem('cashflow',JSON.stringify(txns));render();}
function render(){
  const in_total=txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const out_total=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('totalIn').textContent=formatN(in_total);
  document.getElementById('totalOut').textContent=formatN(out_total);
  document.getElementById('netFlow').textContent=formatN(in_total-out_total);
  document.getElementById('netFlow').className= in_total-out_total>=0?'net':'expense';
  if(!txns.length){document.getElementById('list').innerHTML='<p style="text-align:center;color:#555;padding:20px">No transactions yet</p>';return;}
  document.getElementById('list').innerHTML=txns.map(t=>`<div class="txn"><div class="txn-info"><div class="txn-desc">${t.desc}</div><div class="txn-meta">${t.date}</div></div><span class="txn-amount ${t.type==='income'?'income-color':'expense-color'}">${t.type==='income'?'+':'-'}${formatN(t.amount)}</span><button class="del" onclick="delTxn(${t.id})">X</button></div>`).join('');
}
render();
</script>
</body>
</html>
