<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Create & Send Invoices | Harz</title>
<meta name="description" content="Create professional invoices with line items, totals, and WhatsApp delivery. Free for Nigerian businesses.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.invoice-header{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px}
.invoice-header input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:6px}
.row{display:flex;gap:8px}
.row input{flex:1}
.invoice-num{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.invoice-num label{font-size:13px;color:#a3a3a3}
.invoice-num input{width:120px}
.items{margin-bottom:16px}
.item-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.item-row input{background:#1c1c1c;border:1px solid #2a2a2a;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px}
.item-row input:first-child{flex:2}
.item-row input:nth-child(2){flex:1}
.item-row input:nth-child(3){flex:1}
.item-row span{flex:1;font-size:12px;font-weight:700;text-align:right;color:#10b981}
.add-item-btn{background:#1c1c1c;border:1px dashed #2a2a2a;color:#a3a3a3;padding:8px;border-radius:8px;width:100%;cursor:pointer;font-size:12px}
.totals{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;margin-bottom:16px}
.total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #2a2a2a}
.total-row.grand{font-size:20px;font-weight:800;color:#10b981;border:none;padding-top:10px}
.btn{width:100%;background:#10b981;color:#000;padding:14px;border-radius:8px;border:none;font-weight:700;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>Invoice Generator</h1>
<div class="app">
  <div class="invoice-header">
    <div class="invoice-num"><label>Invoice #</label><input type="text" id="invNum" value="INV-001"></div>
    <div class="row">
      <input type="text" id="fromName" placeholder="From: Your Business Name" value="Harz Digital Services">
      <input type="date" id="invDate">
    </div>
    <input type="text" id="toName" placeholder="Bill To: Client Name">
    <input type="text" id="toEmail" placeholder="Client Email (optional)">
  </div>
  <div class="items" id="items"></div>
  <button class="add-item-btn" onclick="addItem()">+ Add Line Item</button>
  <div class="totals" id="totals"></div>
  <button class="btn" onclick="sendInvoice()">Send Invoice via WhatsApp</button>
</div>
<script>
let items=[{desc:'AI Chatbot Development',qty:1,price:50000},{desc:'WhatsApp Bot Setup',qty:1,price:40000}];
function formatN(n){return 'N'+Math.round(n).toLocaleString()}
function addItem(){items.push({desc:'',qty:1,price:0});render();}
function delItem(i){items.splice(i,1);render();}
function render(){
  document.getElementById('items').innerHTML=items.map((it,i)=>`
    <div class="item-row">
      <input type="text" placeholder="Description" value="${it.desc}" oninput="items[${i}].desc=this.value;updateTotals()">
      <input type="number" placeholder="Qty" value="${it.qty}" oninput="items[${i}].qty=parseInt(this.value)||0;updateTotals()">
      <input type="number" placeholder="Price" value="${it.price}" oninput="items[${i}].price=parseFloat(this.value)||0;updateTotals()">
      <span id="row${i}">${formatN(it.qty*it.price)}</span>
      <button onclick="delItem(${i})" style="background:none;border:1px solid #2a2a2a;color:#ef4444;padding:4px 8px;border-radius:4px;cursor:pointer">X</button>
    </div>`).join('');
  updateTotals();
}
function updateTotals(){
  items.forEach((it,i)=>{const el=document.getElementById('row'+i);if(el)el.textContent=formatN(it.qty*it.price);});
  const sub=items.reduce((s,i)=>s+i.qty*i.price,0);
  const vat=sub*0.075;
  const total=sub+vat;
  document.getElementById('totals').innerHTML=`<div class="total-row"><span>Subtotal</span><span>${formatN(sub)}</span></div><div class="total-row"><span>VAT (7.5%)</span><span>${formatN(vat)}</span></div><div class="total-row grand"><span>Total</span><span>${formatN(total)}</span></div>`;
}
function sendInvoice(){
  const num=document.getElementById('invNum').value;
  const date=document.getElementById('invDate').value||new Date().toLocaleDateString();
  const from=document.getElementById('fromName').value;
  const to=document.getElementById('toName').value;
  const sub=items.reduce((s,i)=>s+i.qty*i.price,0);
  const vat=sub*0.075;
  const total=sub+vat;
  let msg=`INVOICE ${num}\nDate: ${date}\nFrom: ${from}\nTo: ${to}\n\n`;
  items.forEach(it=>{if(it.desc)msg+=`${it.desc} x${it.qty} - ${formatN(it.qty*it.price)}\n`;});
  msg+=`\nSubtotal: ${formatN(sub)}\nVAT (7.5%): ${formatN(vat)}\nTOTAL: ${formatN(total)}\n\nPayment: UBA 2034326424\nRabiu Hamza Mohammed`;
  window.open('https://wa.me/2348028687857?text='+encodeURIComponent(msg),'_blank');
}
render();
</script>
</body>
</html>
