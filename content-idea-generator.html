<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Idea Generator — AI-Powered Post Ideas | Harz</title>
<meta name="description" content="Generate content ideas for social media, blogs, and marketing. Get instant inspiration for your next post.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:600px;margin:0 auto}
.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.controls input{flex:1;min-width:200px;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px}
.controls select{background:#141414;border:1px solid #2a2a2a;color:#fff;padding:12px 16px;border-radius:8px;font-size:14px}
.controls button{background:#8b5cf6;color:#fff;padding:12px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:14px}
.ideas{display:grid;gap:10px}
.idea-card{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px;transition:all 0.2s}
.idea-card:hover{border-color:#8b5cf6}
.idea-type{font-size:10px;color:#8b5cf6;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.idea-title{font-size:15px;font-weight:600;margin-bottom:4px}
.idea-desc{font-size:13px;color:#a3a3a3}
.idea-platforms{display:flex;gap:4px;margin-top:8px}
.idea-plat{font-size:9px;background:#1c1c1c;border:1px solid #2a2a2a;padding:2px 6px;border-radius:8px;color:#555}
.copy-idea{background:#1c1c1c;border:1px solid #2a2a2a;color:#a3a3a3;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin-top:6px}
.copy-idea:hover{border-color:#8b5cf6;color:#8b5cf6}
</style>
</head>
<body>
<h1>Content Idea Generator</h1>
<div class="app">
  <div class="controls">
    <input type="text" id="topic" placeholder="Enter your topic (e.g. AI, fashion, food)" onkeypress="if(event.key==='Enter')generate()">
    <select id="platform"><option value="all">All Platforms</option><option value="instagram">Instagram</option><option value="tiktok">TikTok</option><option value="twitter">Twitter/X</option><option value="blog">Blog</option><option value="youtube">YouTube</option></select>
    <button onclick="generate()">Generate</button>
  </div>
  <div class="ideas" id="ideas"></div>
</div>
<script>
const templates = {
  educational: ['How to {topic} in 5 simple steps','{topic} mistakes beginners make (and how to avoid them)','5 myths about {topic} debunked','The beginner\'s guide to {topic}','Why {topic} matters for your business'],
  listicle: ['7 {topic} tools you didn\'t know existed','10 {topic} tips for beginners','5 ways {topic} can save you money','Top 5 {topic} trends in 2026','3 {topic} hacks that actually work'],
  story: ['How I started with {topic} (and what I learned)','My journey from zero to {topic} pro','The day {topic} changed my business','Why I almost quit {topic}','Behind the scenes of my {topic} setup'],
  engagement: ['What\'s your favorite {topic} tool?','Hot take: {topic} is overrated. Change my mind','Vote: Which {topic} approach is better?','Comment your biggest {topic} challenge','Tag someone who needs to see this {topic} tip'],
  howto: ['Step-by-step: Setting up your first {topic} system','{topic} for free: A complete tutorial','How to automate {topic} in 10 minutes','Building a {topic} workflow from scratch','DIY {topic}: No-code setup guide'],
  promotional: ['Limited offer: Get our {topic} toolkit','How our {topic} service helped 500+ businesses','Book a {topic} consultation today','Free {topic} checklist download','Join our {topic} masterclass'],
};
const platformMap = {
  instagram: ['Reel','Carousel','Story','Post'],
  tiktok: ['TikTok video','TikTok series','TikTok trend'],
  twitter: ['Thread','Tweet','Poll'],
  blog: ['Blog post','Guide','Tutorial'],
  youtube: ['Tutorial video','Review','Case study'],
  all: ['Reel','Blog post','Thread','Video','Carousel'],
};
function generate() {
  const topic = document.getElementById('topic').value.trim() || 'business';
  const platform = document.getElementById('platform').value;
  const types = Object.keys(templates);
  let ideas = [];
  types.forEach(type => {
    templates[type].forEach(tmpl => {
      const title = tmpl.replace(/{topic}/g, topic);
      const plats = platformMap[platform] || platformMap.all;
      ideas.push({type, title, desc: getTitleDesc(type), platforms: plats.slice(0,3)});
    });
  });
  ideas = ideas.sort(() => Math.random()-0.5).slice(0,12);
  document.getElementById('ideas').innerHTML = ideas.map(idea => `
    <div class="idea-card">
      <div class="idea-type">${idea.type}</div>
      <div class="idea-title">${idea.title}</div>
      <div class="idea-desc">${idea.desc}</div>
      <div class="idea-platforms">${idea.platforms.map(p => `<span class="idea-plat">${p}</span>`).join('')}</div>
      <button class="copy-idea" onclick="copyIdea('${idea.title.replace(/'/g,"\\'")}')">Copy</button>
    </div>
  `).join('');
}
function getTitleDesc(type) {
  const desc = {educational:'Teach your audience something valuable',listicle:'Easy to consume, highly shareable format',story:'Personal stories build connection and trust',engagement:'Drive comments, shares, and interactions',howto:'Practical value that saves time',promotional:'Convert followers into customers'};
  return desc[type] || '';
}
function copyIdea(text) { navigator.clipboard.writeText(text); alert('Idea copied!'); }
generate();
</script>
</body>
</html>
