<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Glassmorphism Generator | Harz</title>
<meta name="description" content="Generate glassmorphism CSS effects. Frosted glass, blur, transparency controls with live preview.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6;padding:16px}
h1{text-align:center;font-size:22px;margin:16px 0}
.app{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.app{grid-template-columns:1fr}}
.controls{background:#141414;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.control{margin-bottom:10px}
.control label{font-size:12px;color:#a3a3a3;margin-bottom:3px;display:block}
.control input[type="range"]{width:100%}
.control input[type="color"]{width:100%;height:36px;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;background:#1c1c1c}
.control .val{font-size:12px;color:#8b5cf6;font-weight:700;float:right}
.preview{border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;padding:30px;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb)}
.glass{width:140px;height:140px;border-radius:12px;transition:all 0.1s}
.code{grid-column:1/-1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:#8b5cf6;word-break:break-all;white-space:pre-wrap}
.copy-btn{grid-column:1/-1;background:#8b5cf6;color:#fff;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<h1>Glassmorphism Generator</h1>
<div class="app">
  <div class="controls">
    <div class="control"><label>Blur <span class="val" id="blurVal">10px</span></label><input type="range" id="blur" min="0" max="30" value="10" oninput="update()"></div>
    <div class="control"><label>Opacity <span class="val" id="opVal">0.6</span></label><input type="range" id="opacity" min="0" max="1" step="0.05" value="0.6" oninput="update()"></div>
    <div class="control"><label>Saturation <span class="val" id="satVal">180%</span></label><input type="range" id="sat" min="100" max="300" value="180" oninput="update()"></div>
    <div class="control"><label>BG Color</label><input type="color" id="color" value="#ffffff" oninput="update()"></div>
    <div class="control"><label>Border Width <span class="val" id="bwVal">1px</span></label><input type="range" id="bw" min="0" max="5" value="1" oninput="update()"></div>
    <div class="control"><label>Border Color</label><input type="color" id="borderColor" value="#ffffff" oninput="update()"></div>
    <div class="control"><label>Border Opacity <span class="val" id="boVal">0.2</span></label><input type="range" id="bo" min="0" max="1" step="0.05" value="0.2" oninput="update()"></div>
    <div class="control"><label>Radius <span class="val" id="rVal">12px</span></label><input type="range" id="radius" min="0" max="50" value="12" oninput="update()"></div>
  </div>
  <div class="preview"><div class="glass" id="glass"></div></div>
  <div class="code" id="code"></div>
  <button class="copy-btn" onclick="copyCode()">Copy CSS</button>
</div>
<script>
function update(){
  const blur=document.getElementById('blur').value;
  const op=document.getElementById('opacity').value;
  const sat=document.getElementById('sat').value;
  const color=document.getElementById('color').value;
  const bw=document.getElementById('bw').value;
  const bc=document.getElementById('borderColor').value;
  const bo=document.getElementById('bo').value;
  const r=document.getElementById('radius').value;
  const rr=parseInt(color.slice(1,3),16),gg=parseInt(color.slice(3,5),16),bb=parseInt(color.slice(5,7),16);
  const brr=parseInt(bc.slice(1,3),16),bg=parseInt(bc.slice(3,5),16),bbb=parseInt(bc.slice(5,7),16);
  document.getElementById('blurVal').textContent=blur+'px';
  document.getElementById('opVal').textContent=op;
  document.getElementById('satVal').textContent=sat+'%';
  document.getElementById('bwVal').textContent=bw+'px';
  document.getElementById('boVal').textContent=bo;
  document.getElementById('rVal').textContent=r+'px';
  const css=`backdrop-filter: blur(${blur}px) saturate(${sat}%);\nbackground: rgba(${rr},${gg},${bb},${op});\nborder: ${bw}px solid rgba(${brr},${bg},${bbb},${bo});\nborder-radius: ${r}px;`;
  const g=document.getElementById('glass');
  g.style.backdropFilter=`blur(${blur}px) saturate(${sat}%)`;
  g.style.background=`rgba(${rr},${gg},${bb},${op})`;
  g.style.border=`${bw}px solid rgba(${brr},${bg},${bbb},${bo})`;
  g.style.borderRadius=r+'px';
  document.getElementById('code').textContent=css;
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent);alert('Glassmorphism CSS copied!');}
update();
</script>
</body>
</html>
