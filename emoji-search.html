var currentCat='all';
var selected='';

function renderCats(){
document.getElementById('catTabs').innerHTML='<span class="cat-tab '+(currentCat==='all'?'active':'')+'" onclick="setCat(\'all\')">All</span>'+
Object.keys(categories).map(function(k){return '<span class="cat-tab '+(currentCat===k?'active':'')+'" onclick="setCat(\''+k+'\')">'+k+' '+categories[k]+'</span>'}).join('');
}

function setCat(c){currentCat=c;render()}

function render(){
var search=document.getElementById('search').value.toLowerCase();
var filtered=emojis.filter(function(e){
if(search){
return e.slice(1).some(function(kw){return kw.includes(search)});
}
if(currentCat==='all')return true;
// Simple category mapping
var catMap={'😊':/grin|smile|happy|laugh|kiss|wink|cool|sleep|think|shrug|hug/,'🐶':/dog|cat|lion|unicorn|octopus|butterfly|animal/,'🍔':/pizza|burger|coffee|beer|watermelon|strawberry|bread|salad|cake|donut|food/,'⚽':/soccer|basket|game|guitar|headphones|mic|camera|sport|music/,'💡':/light|bulb|pencil|memo|note|folder|file|bell|pin|clip|email|chat|phone|warning|check|cross|question|exclamation/,'❤️':/love|heart|fire|sparkle|star|party|boom|bolt|money|dollar|euro|pound|yen|rocket|diamond|target|trophy|key|card|robot|wizard|shield|castle|film|music|earth|nigeria/,'🇳🇬':/nigeria/};

}).join('');
}

function select(emoji){
selected=emoji;
document.getElementById('preview').textContent=emoji;
}

function copy(){
if(!selected)return;
navigator.clipboard.writeText(selected);
alert('Copied: '+selected);
}
