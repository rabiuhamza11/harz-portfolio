<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harz WhatsApp Catalog — Share & Sell | Harz Digital Services</title>
<meta name="description" content="Browse 259 digital products. Share any product to WhatsApp with one tap. Built for mobile commerce.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;line-height:1.6}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);padding:12px 16px}
.search-bar{display:flex;gap:10px;align-items:center}
.search-bar input{flex:1;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e0e0e0;font-size:1rem;outline:none}
.search-bar select{padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none}
.hero{text-align:center;padding:30px 16px;background:linear-gradient(135deg,#0a0a0f 0%,#1a1a2e 50%,#0a0a0f 100%)}
.hero h1{font-size:1.8rem;background:linear-gradient(135deg,#25d366,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#888;font-size:.9rem;margin-top:5px}
.hero .stats{display:flex;justify-content:center;gap:20px;margin-top:15px;flex-wrap:wrap}
.hero .stats span{color:#25d366;font-size:.85rem}
.filters{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-chip{padding:8px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:50px;font-size:.85rem;white-space:nowrap;cursor:pointer;transition:all .2s}
.filter-chip.active,.filter-chip:hover{background:linear-gradient(135deg,#25d366,#10b981);color:#fff;border-color:transparent}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:10px 16px 80px}
.product{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s}
.product:hover{transform:translateY(-3px);border-color:rgba(37,211,102,.3)}
.product-img{width:100%;height:100px;object-fit:cover;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:2rem}
.product-info{padding:10px}
.product-title{font-size:.8rem;font-weight:600;margin-bottom:4px;line-height:1.3;height:2.6em;overflow:hidden}
.product-price{color:#25d366;font-weight:bold;font-size:.95rem}
.product-cat{color:#666;font-size:.7rem;margin-top:2px}
.product-actions{padding:0 10px 10px;display:flex;gap:6px}
.wa-btn{flex:1;padding:8px;background:linear-gradient(135deg,#25d366,#10b981);border:none;border-radius:8px;color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;text-align:center}
.wa-btn:active{transform:scale(.95)}
.share-btn{padding:8px 12px;background:rgba(255,255,255,.08);border:none;border-radius:8px;color:#aaa;font-size:.8rem;cursor:pointer}
.share-btn:active{transform:scale(.95)}
.load-more{text-align:center;padding:20px;color:#888;font-size:.9rem}
.load-more button{padding:10px 24px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);border-radius:10px;color:#25d366;cursor:pointer}
.empty{text-align:center;color:#666;padding:40px;font-size:.9rem}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 4px 15px rgba(0,0,0,.3);z-index:999;text-decoration:none}
@media(max-width:400px){.products{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<div class="search-bar">
<input type="text" id="search" placeholder="Search products..." oninput="filterProducts()">
<select id="sort" onchange="filterProducts()">
<option value="newest">Newest</option>
<option value="price-low">Price: Low to High</option>
<option value="price-high">Price: High to Low</option>
<option value="popular">Most Popular</option>
</select>
</div>
</div>

<div class="hero">
<h1>🛒 Harz WhatsApp Catalog</h1>
<p>259 products. Tap any product to share on WhatsApp and start selling.</p>
<div class="stats">
<span>📱 259 Products</span>
<span>💰 ₦1.58M + $2.6K</span>
<span>🚀 44 Categories</span>
</div>
</div>

<div class="filters" id="filters">
<div class="filter-chip active" onclick="setCategory('all',this)">All Products</div>
<div class="filter-chip" onclick="setCategory('Developer Tools',this)">Dev Tools</div>
<div class="filter-chip" onclick="setCategory('Construction Tools',this)">Construction</div>
<div class="filter-chip" onclick="setCategory('Template',this)">Templates</div>
<div class="filter-chip" onclick="setCategory('AI Prompts',this)">AI Prompts</div>
<div class="filter-chip" onclick="setCategory('AI Automation',this)">AI Auto</div>
<div class="filter-chip" onclick="setCategory('Ebook',this)">Ebooks</div>
<div class="filter-chip" onclick="setCategory('Notion OS',this)">Notion</div>
<div class="filter-chip" onclick="setCategory('Business-in-a-Box',this)">Biz-in-Box</div>
<div class="filter-chip" onclick="setCategory('Real Estate Tools',this)">Real Estate</div>
<div class="filter-chip" onclick="setCategory('Security',this)">Security</div>
<div class="filter-chip" onclick="setCategory('Music',this)">Music</div>
<div class="filter-chip" onclick="setCategory('FinTech',this)">FinTech</div>
<div class="filter-chip" onclick="setCategory('Health',this)">Health</div>
</div>

<div class="products" id="products"></div>
<div class="load-more" id="loadMore" style="display:none">
<button onclick="loadMore()">Load More Products</button>
</div>

<a href="https://wa.me/2348028687857?text=I%20want%20to%20buy%20from%20Harz%20Digital%20Services" class="fab">💬</a>

<script>
let allProducts=[];
let filteredProducts=[];
let currentCategory='all';
let displayCount=30;
const WA_NUMBER='2348028687857';

async function loadProducts(){
try{
const res=await fetch('https://superagent-2286fb2f.base44.app/functions/harzdmCatalog?action=products');
const data=await res.json();
if(data.ok&&data.products){
allProducts=data.products;
filteredProducts=[...allProducts];
renderProducts();
}
}catch(e){
document.getElementById('products').innerHTML='<div class="empty">Loading catalog... If this takes too long, message us on WhatsApp.</div>';
}
}

function setCategory(cat,el){
currentCategory=cat;
document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
filterProducts();
}

function filterProducts(){
const search=document.getElementById('search').value.toLowerCase();
const sort=document.getElementById('sort').value;
filteredProducts=allProducts.filter(p=>{
const matchCat=currentCategory==='all'||p.category===currentCategory;
const matchSearch=!search||p.title.toLowerCase().includes(search)||(p.description||'').toLowerCase().includes(search)||(p.category||'').toLowerCase().includes(search);
return matchCat&&matchSearch;
});
if(sort==='price-low')filteredProducts.sort((a,b)=>(a.price||0)-(b.price||0));
else if(sort==='price-high')filteredProducts.sort((a,b)=>(b.price||0)-(a.price||0));
else if(sort==='popular')filteredProducts.sort((a,b)=>(b.sales_count||0)-(a.sales_count||0));
else filteredProducts.sort((a,b)=>new Date(b.created_date||0)-new Date(a.created_date||0));
displayCount=30;
renderProducts();
}

function renderProducts(){
const container=document.getElementById('products');
const toShow=filteredProducts.slice(0,displayCount);
if(toShow.length===0){
container.innerHTML='<div class="empty">No products found. Try a different search or category.</div>';
document.getElementById('loadMore').style.display='none';
return;
}
container.innerHTML=toShow.map(p=>{
const sym=p.currency==='USD'?'$':'₦';
const val=p.currency==='USD'?(p.price/100):p.price;
const img=p.image_url?'<img src="'+p.image_url+'" class="product-img" style="padding:0" alt="'+p.title+'">':'<div class="product-img">'+getEmoji(p.category)+'</div>';
const waText=encodeURIComponent('*'+p.title+'*\n\n'+(p.description||'').substring(0,200)+'\n\n*Price:* '+sym+val.toLocaleString()+'\n\nGet it from Harz Digital Services\nWhatsApp: 08028687857');
return '<div class="product">'+
'<div class="product-img" style="'+(p.image_url?'background-image:url('+p.image_url+');background-size:cover;background-position:center':'')+'">'+(p.image_url?'':getEmoji(p.category))+'</div>'+
'<div class="product-info">'+
'<div class="product-title">'+p.title+'</div>'+
'<div class="product-price">'+sym+val.toLocaleString()+'</div>'+
'<div class="product-cat">'+(p.category||'Digital Product')+'</div>'+
'</div>'+
'<div class="product-actions">'+
'<a href="https://wa.me/'+WA_NUMBER+'?text='+waText+'" class="wa-btn">📱 Share</a>'+
'<button class="share-btn" onclick="copyLink(\''+p.id+'\',\''+encodeURIComponent(p.title)+'\')">🔗</button>'+
'</div>'+
'</div>';
}).join('');
document.getElementById('loadMore').style.display=filteredProducts.length>displayCount?'block':'none';
}

function loadMore(){
displayCount+=30;
renderProducts();
}

function copyLink(id,title){
const link='https://rabiuhamza11.github.io/harz-portfolio/whatsapp-catalog-v2.html#'+id;
navigator.clipboard.writeText(link).then(()=>alert('Link copied! Share it on WhatsApp.'));
}

function getEmoji(cat){
const emojis={'Developer Tools':'💻','Construction Tools':'🏗️','Template':'📋','AI Prompts':'🤖','AI Automation':'⚙️','Ebook':'📚','Notion OS':'📝','Business-in-a-Box':'📦','Real Estate Tools':'🏠','Security':'🔒','Music':'🎵','FinTech':'💳','Health':'🏥','Micro-Niche':'🎯','SOPs & Swipe Files':'📑','Cheat Sheet':'📖','Done-For-You':'✅','Productivity':'⚡','Finance':'💰','UI/UX Kits':'🎨','Marketplace':'🏪','Creator Economy':'🎥','Agriculture':'🌾','Technology':'🔧','Course':'🎓','Software':'💿','CAD/BIM Tools':'📐','Lead Magnet':'🧲','AI Agents':'🤖','Construction Tech':'🏗️','Education':'📚','Business Software':'💼','SaaS':'☁️','Mini-Course':'📖','Interactive Workbook':'📓','Niche Data Sets':'📊','Membership':'👑','Subscription':'🔄','Career Resources':'💼','Photo':'📸','Plugin':'🔌','Business Templates':'📋','Courses':'🎓','Guide':'🗺️'};
return emojis[cat]||'📦';
}

loadProducts();
</script>
</body>
</html>
